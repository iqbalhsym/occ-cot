<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Command Center — COT RSUI</title>
    <style>
      :root {
        --navy-950: #0b1b2b;
        --navy-900: #102a43;
        --navy-800: #1b3a5c;
        --navy-700: #28527a;
        --teal-500: #1f8a8c;
        --teal-400: #2aa9ab;
        --teal-100: #e3f4f4;
        --amber-500: #c98a1c;
        --amber-100: #fbf0dc;
        --red-500: #b3413c;
        --red-100: #fbe6e4;
        --green-600: #2e7d5b;
        --green-100: #e2f3ea;
        --purple-600: #5b3fa0;
        --purple-100: #e6e0fb;
        --blue-600: #2b4f9c;
        --blue-100: #e4ecfb;
        --slate-50: #f6f8fa;
        --slate-100: #eef1f4;
        --slate-200: #dde3e9;
        --slate-300: #c7d0da;
        --slate-400: #93a1b0;
        --slate-500: #66768a;
        --slate-700: #3a4b5e;
        --slate-900: #1c2733;
        --white: #ffffff;
        --radius: 6px;
        --font-ui:
          "Segoe UI", -apple-system, "Helvetica Neue", Arial, sans-serif;
        --font-mono: "Consolas", "SFMono-Regular", Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family: var(--font-ui);
        background: var(--slate-50);
        color: var(--slate-900);
        font-size: 14px;
        line-height: 1.5;
      }
      #app {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 252px;
        flex: 0 0 252px;
        background: linear-gradient(180deg, var(--navy-950), var(--navy-900));
        color: var(--slate-50);
        display: flex;
        flex-direction: column;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .brand {
        padding: 20px 18px 14px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .brand .mark {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }
      .brand .mark .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--teal-400);
        box-shadow: 0 0 0 3px rgba(42, 169, 171, 0.25);
      }
      .brand h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .brand p {
        margin: 2px 0 0 0;
        font-size: 11px;
        color: var(--slate-400);
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .role-box {
        margin: 14px 14px 6px 14px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .role-box label {
        display: block;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--slate-400);
        margin-bottom: 6px;
      }
      .role-box select {
        width: 100%;
        padding: 7px 8px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: var(--navy-800);
        color: var(--white);
        font-size: 13px;
        font-family: inherit;
      }
      .role-box select:focus {
        outline: 2px solid var(--teal-400);
        outline-offset: 1px;
      }
      nav {
        flex: 1;
        padding: 10px 10px;
        overflow-y: auto;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        margin-bottom: 2px;
        border-radius: var(--radius);
        color: var(--slate-100);
        cursor: pointer;
        font-size: 13.5px;
        font-weight: 500;
        border: 1px solid transparent;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .nav-item.active {
        background: var(--teal-500);
        color: var(--white);
      }
      .nav-item .badge {
        margin-left: auto;
        background: rgba(255, 255, 255, 0.18);
        color: var(--white);
        font-size: 10.5px;
        padding: 1px 7px;
        border-radius: 20px;
        font-weight: 700;
      }
      .nav-item.active .badge {
        background: rgba(255, 255, 255, 0.28);
      }
      .sidebar-foot {
        padding: 12px 16px;
        font-size: 10.5px;
        color: var(--slate-400);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        height: 56px;
        flex: 0 0 56px;
        background: var(--white);
        border-bottom: 1px solid var(--slate-200);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .topbar h2 {
        font-size: 16px;
        margin: 0;
        font-weight: 700;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .clock {
        font-family: var(--font-mono);
        font-size: 12.5px;
        color: var(--slate-500);
      }
      .content {
        padding: 22px;
        flex: 1;
        overflow-y: auto;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      .btn {
        padding: 8px 14px;
        border-radius: 5px;
        border: 1px solid var(--slate-200);
        background: var(--white);
        color: var(--slate-900);
        font-size: 13px;
        font-weight: 600;
      }
      .btn:hover {
        border-color: var(--slate-400);
      }
      .btn-primary {
        background: var(--teal-500);
        border-color: var(--teal-500);
        color: var(--white);
      }
      .btn-primary:hover {
        background: var(--teal-400);
        border-color: var(--teal-400);
      }
      .btn-danger {
        background: var(--white);
        border-color: var(--red-500);
        color: var(--red-500);
      }
      .btn-danger:hover {
        background: var(--red-100);
      }
      .btn-pending {
        background: var(--white);
        border-color: #d97706;
        color: #d97706;
      }
      .btn-pending:hover {
        background: #fef3c7;
      }
      .btn-info {
        background: var(--white);
        border-color: #2563eb;
        color: #2563eb;
      }
      .btn-info:hover {
        background: #dbeafe;
      }
      .btn-revisi {
        background: var(--white);
        border-color: #ea580c;
        color: #ea580c;
      }
      .btn-revisi:hover {
        background: #ffedd5;
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
        color: var(--teal-500);
      }
      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
      }
      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .card {
        background: var(--white);
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        padding: 18px;
        margin-bottom: 18px;
      }
      .card h3 {
        margin: 0 0 14px 0;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card h4 {
        margin: 16px 0 8px 0;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-500);
        border-top: 1px solid var(--slate-100);
        padding-top: 14px;
      }
      .card h4:first-child {
        border-top: none;
        padding-top: 0;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--white);
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        padding: 14px 16px;
      }
      .stat-card .num {
        font-size: 26px;
        font-weight: 800;
        color: var(--navy-900);
      }
      .stat-card .lbl {
        font-size: 11.5px;
        color: var(--slate-500);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-top: 2px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead th {
        text-align: left;
        padding: 9px 10px;
        border-bottom: 2px solid var(--slate-200);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-500);
        background: var(--slate-50);
      }
      tbody td {
        padding: 10px;
        border-bottom: 1px solid var(--slate-100);
        vertical-align: middle;
      }
      tbody tr:hover {
        background: var(--slate-50);
      }
      tbody tr {
        cursor: pointer;
      }
      .empty-row td {
        text-align: center;
        padding: 30px;
        color: var(--slate-400);
      }
      .badge-status {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }
      .st-Draft {
        background: var(--slate-100);
        color: var(--slate-700);
      }
      .st-Submitted {
        background: var(--blue-100);
        color: var(--blue-600);
      }
      .st-Returned {
        background: var(--red-100);
        color: var(--red-500);
      }
      .st-InProgress {
        background: var(--blue-100);
        color: var(--blue-600);
      }
      .st-Completed {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Cancelled {
        background: var(--slate-200);
        color: var(--slate-500);
        text-decoration: line-through;
      }
      .st-Menunggu {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-op-hijau {
        background: #dcfce7;
        color: #16a34a;
      }
      .st-op-biru {
        background: #dbeafe;
        color: #2563eb;
      }
      .st-op-kuning {
        background: #fef9c3;
        color: #ca8a04;
      }
      .st-op-merah {
        background: #fee2e2;
        color: #dc2626;
      }
      .st-Pending {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-Approved {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Disetujui {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Revisi {
        background: var(--red-100);
        color: var(--red-500);
      }
      .st-Ditolak {
        background: var(--red-100);
        color: var(--red-500);
      }
      .st-DalamKonfirmasi {
        background: var(--purple-100);
        color: var(--purple-600);
      }
      .st-DokumenBelumLengkap {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-Terjadwal {
        background: var(--purple-100);
        color: var(--purple-600);
      }
      .st-Reschedule {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-Selesai {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Batal {
        background: var(--slate-200);
        color: var(--slate-500);
        text-decoration: line-through;
      }
      .st-Belum {
        background: var(--slate-100);
        color: var(--slate-400);
      }
      .chip {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        background: var(--slate-100);
        color: var(--slate-700);
        margin: 2px 4px 2px 0;
      }
      .chip-flow {
        background: var(--navy-900);
        color: var(--white);
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .form-grid .full {
        grid-column: 1 / -1;
      }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: var(--slate-700);
        margin-bottom: 5px;
      }
      .field .hint {
        font-weight: 400;
        color: var(--slate-400);
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--slate-200);
        border-radius: 5px;
        font-size: 13px;
        font-family: inherit;
        background: var(--white);
        color: var(--slate-900);
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        outline: 2px solid var(--teal-400);
        outline-offset: 0;
        border-color: var(--teal-400);
      }
      .field textarea {
        resize: vertical;
        min-height: 60px;
      }
      .req::after {
        content: " *";
        color: var(--red-500);
      }
      .dyn-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
      }
      .dyn-row input,
      .dyn-row select {
        flex: 1;
      }
      .dyn-row .tag {
        font-size: 11px;
        font-weight: 700;
        color: var(--slate-400);
        width: 70px;
        flex: 0 0 70px;
      }
      .checkbox-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .checkbox-grid label {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--slate-50);
        border: 1px solid var(--slate-200);
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
      }
      /* --- Autocomplete widget --- */
      .ac-wrap { position: relative; }
      .ac-wrap input { width: 100%; padding: 8px 10px; border: 1px solid var(--slate-200); border-radius: 5px; font-size: 13px; font-family: inherit; }
      .ac-wrap input:focus { outline: 2px solid var(--teal-400); border-color: var(--teal-400); }
      .ac-menu { display: none; position: absolute; z-index: 20; top: 100%; left: 0; right: 0; background: var(--white); border: 1px solid var(--slate-200); border-radius: 6px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); max-height: 220px; overflow-y: auto; margin-top: 2px; }
      .ac-item { padding: 7px 10px; font-size: 13px; cursor: pointer; }
      .ac-item:hover { background: var(--teal-100); }
      /* --- Auto-fill info panel (paket/golongan/estimasi) --- */
      .autofill-box { background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 6px; padding: 12px 14px; margin-top: 4px; }
      .autofill-box .af-head { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 8px; }
      .af-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: var(--navy-900); color: var(--white); }
      .af-pill.gol { background: var(--purple-600); }
      .af-pill.spes { background: var(--teal-500); }
      .af-pill.harga { background: var(--green-600); }
      .af-table { width: 100%; font-size: 12px; border-collapse: collapse; }
      .af-table td { padding: 3px 6px; border-bottom: 1px solid var(--slate-100); }
      .af-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
      .af-empty { font-size: 12px; color: var(--slate-400); font-style: italic; }
      .case-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 18px;
      }
      .case-header h2 {
        margin: 0 0 4px 0;
        font-size: 19px;
      }
      .case-header .meta {
        color: var(--slate-500);
        font-size: 12.5px;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 18px;
        align-items: start;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        grid-template-rows: auto auto;
        gap: 18px;
        align-items: start;
      }
      .detail-grid .col-data { grid-column: 1; grid-row: 1 / 3; }
      .detail-grid .col-aksi { grid-column: 2; grid-row: 1; }
      .detail-grid .col-log { grid-column: 2; grid-row: 2; }
      @media (max-width: 980px) {
        .detail-grid {
          grid-template-columns: 1fr;
          grid-template-rows: auto;
        }
        .detail-grid .col-data,
        .detail-grid .col-aksi,
        .detail-grid .col-log {
          grid-column: 1;
          grid-row: auto;
        }
      }
      @media (max-width: 980px) {
        .two-col {
          grid-template-columns: 1fr;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 18px;
        font-size: 13px;
      }
      .info-grid dt {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-400);
        margin-bottom: 1px;
      }
      .info-grid dd {
        margin: 0 0 8px 0;
        font-weight: 600;
        color: var(--slate-900);
      }
      .section-lbl {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-400);
        margin-top: 8px;
      }
      .stepper {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 0;
        margin-bottom: 4px;
        padding: 10px 4px 4px;
      }
      .step {
        flex: 1;
        min-width: 96px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        padding: 0 6px;
      }
      .step:not(:first-child)::before {
        content: "";
        position: absolute;
        top: 15px;
        left: -50%;
        width: 100%;
        height: 3px;
        background: var(--slate-200);
        z-index: 0;
        border-radius: 2px;
      }
      .step.done:not(:first-child)::before,
      .step.current:not(:first-child)::before {
        background: linear-gradient(90deg, var(--teal-500), var(--teal-400));
      }
      .step .circle {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 800;
        position: relative;
        z-index: 1;
        border: 2px solid var(--slate-200);
        background: #fff;
        color: var(--slate-400);
        flex-shrink: 0;
        transition: all 0.2s ease;
      }
      .step.done .circle {
        background: var(--teal-500);
        border-color: var(--teal-500);
        color: #fff;
      }
      .step.current .circle {
        background: var(--navy-900);
        border-color: var(--navy-900);
        color: #fff;
        box-shadow: 0 0 0 4px rgba(27, 58, 92, 0.15);
        animation: stepPulse 1.8s ease-in-out infinite;
      }
      @keyframes stepPulse {
        0%, 100% { box-shadow: 0 0 0 4px rgba(27, 58, 92, 0.15); }
        50% { box-shadow: 0 0 0 7px rgba(27, 58, 92, 0.08); }
      }
      .step.skip .circle {
        background: var(--slate-100);
        border-color: var(--slate-100);
        color: var(--slate-300);
      }
      .step .label {
        margin-top: 7px;
        font-size: 11px;
        font-weight: 700;
        text-align: center;
        color: var(--slate-400);
        line-height: 1.3;
      }
      .step.done .label,
      .step.current .label {
        color: var(--navy-900);
      }
      .step.skip .label {
        color: var(--slate-300);
        font-weight: 400;
        font-style: italic;
      }
      .gantt-table {
        border-collapse: collapse;
        width: 100%;
        min-width: 900px;
      }
      .gantt-table th {
        background: var(--slate-50, #f8fafc);
        border: 1px solid var(--slate-200);
        padding: 8px 6px;
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--slate-500);
        position: sticky;
        top: 0;
      }
      .gantt-hour {
        border: 1px solid var(--slate-200);
        background: var(--slate-50, #f8fafc);
        font-size: 11.5px;
        font-weight: 700;
        color: var(--slate-500);
        text-align: center;
        vertical-align: top;
        padding: 6px 4px;
        white-space: nowrap;
      }
      .gantt-cell {
        border: 1px solid var(--slate-200);
        vertical-align: top;
        padding: 4px;
        min-width: 130px;
        height: 100%;
        transition: background 0.1s ease, outline 0.1s ease;
      }
      .gantt-cell.drag-over {
        background: var(--teal-100, #e3f4f4) !important;
        outline: 2px dashed var(--teal-500);
        outline-offset: -2px;
      }
      .op-block {
        background: var(--teal-100, #e3f4f4);
        border: 1px solid var(--teal-400);
        border-radius: 6px;
        padding: 6px 7px;
        margin-bottom: 5px;
        cursor: pointer;
        font-size: 11px;
        line-height: 1.3;
        transition: transform 0.1s ease;
      }
      .op-block.op-draggable {
        cursor: grab;
      }
      .op-block.op-draggable:active {
        cursor: grabbing;
      }
      .op-block.op-dragging {
        opacity: 0.4;
      }
      .op-block:hover {
        transform: translateY(-1px);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      }
      .op-block.op-conflict {
        background: var(--red-100, #fee2e2);
        border-color: var(--red-500, #ef4444);
      }
      .op-block.op-lock {
        background: repeating-linear-gradient(45deg, #e5e7eb, #e5e7eb 8px, #f3f4f6 8px, #f3f4f6 16px);
        border: 1px dashed #6b7280;
        color: #374151;
      }
      .op-block-time {
        font-weight: 800;
        color: var(--navy-900);
      }
      .op-block-name {
        font-weight: 700;
        margin-top: 2px;
      }
      .op-block-sub {
        color: var(--slate-500);
        margin-top: 1px;
      }
      .note-inline {
        font-size: 11.5px;
        color: var(--slate-500);
        font-weight: 400;
        margin-top: 4px;
        line-height: 1.35;
        text-align: left;
        word-break: break-word;
      }
      .usulan-warning {
        font-size: 11.5px;
        font-weight: 700;
        color: #b45309;
        background: #fef3c7;
        border: 1px solid #fcd34d;
        border-radius: 6px;
        padding: 5px 8px;
        margin-top: 6px;
        line-height: 1.35;
        text-align: left;
        word-break: break-word;
      }
      .unit-status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 6px;
      }
      .unit-status-card {
        border: 1px solid var(--slate-200);
        border-radius: 6px;
        padding: 8px 10px;
        text-align: center;
      }
      .unit-status-card .u-name {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--slate-500);
        margin-bottom: 4px;
      }
      .audit-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border-left: 2px solid var(--slate-200);
        margin-left: 6px;
      }
      .audit-item {
        position: relative;
        padding: 0 0 16px 20px;
      }
      .audit-item::before {
        content: "";
        position: absolute;
        left: -7px;
        top: 2px;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--teal-500);
        border: 2px solid var(--white);
        box-shadow: 0 0 0 1px var(--slate-200);
      }
      .audit-item .when {
        font-size: 11px;
        color: var(--slate-400);
        font-family: var(--font-mono);
      }
      .audit-item .who {
        font-size: 11.5px;
        font-weight: 700;
        color: var(--navy-900);
      }
      .audit-item .what {
        font-size: 13px;
        margin: 2px 0;
      }
      .audit-item .note {
        font-size: 12.5px;
        color: var(--slate-500);
        font-style: italic;
      }
      .permission-note {
        background: var(--amber-100);
        border: 1px solid #f0dcae;
        color: #7a5610;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 12.5px;
        margin-bottom: 16px;
      }
      .locked-note {
        background: var(--slate-100);
        border: 1px solid var(--slate-200);
        color: var(--slate-500);
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 12.5px;
        margin-bottom: 16px;
      }
      .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .search-bar input,
      .search-bar select {
        padding: 8px 10px;
        border: 1px solid var(--slate-200);
        border-radius: 5px;
        font-size: 13px;
      }
      .search-bar input {
        flex: 1;
        min-width: 180px;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(11, 27, 43, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
        overflow-y: auto;
      }
      .modal {
        background: var(--white);
        border-radius: 10px;
        max-width: 640px;
        width: 100%;
        padding: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal h3 {
        margin-top: 0;
      }
      .modal .btn-row {
        justify-content: flex-end;
        margin-top: 16px;
      }
      .toast-wrap {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 60;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: var(--navy-900);
        color: var(--white);
        padding: 10px 16px;
        border-radius: 6px;
        font-size: 13px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        animation: fadein 0.2s ease;
      }
      .toast.warn {
        background: var(--red-500);
      }
      .toast.ok {
        background: var(--green-600);
      }
      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .footer-hint {
        font-size: 11.5px;
        color: var(--slate-400);
        margin-top: 6px;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--slate-200);
        border-radius: 6px;
      }
    </style>
  </head>

      /* ---------------- COT_DB helpers (Tahap Nurse) ---------------- */
      function rupiah(n) {

      function findTindakan(nama) {
        if (!nama) return null;
        return COT_DB.tindakan.find((t) => t.nama.toLowerCase() === String(nama).toLowerCase()) || null;
      }
      // Urutan golongan dari ringan ke berat, sesuai COT_DB.golonganList (dipakai untuk menentukan golongan tertinggi bila ada >1 tindakan)
      function golonganRank(g) {
        const base = String(g || "").toUpperCase().replace(/ CITO$| PENYULIT$/, "");
        const idx = COT_DB.golonganList.indexOf(base);
        return idx === -1 ? -1 : idx;
      }
      // Daftar golongan untuk dropdown yang mengizinkan pemilihan manual varian CITO/Penyulit langsung
      // (mis. "BESAR CITO", "SEDANG PENYULIT") — dipakai di dropdown per-Operator (VA & Case Manager).
      function golonganOptionsExpanded() {
        const opts = [];
        COT_DB.golonganList.forEach((g) => {
          if (g === "NON GOLONGAN") { opts.push(g); return; }
          opts.push(g);
          if (COT_DB.estimasi[g + " CITO"]) opts.push(g + " CITO");
          if (COT_DB.estimasi[g + " PENYULIT"]) opts.push(g + " PENYULIT");
        });
        return opts;
      }
      // Membentuk kunci golongan efektif untuk pencarian tarif, sesuai baris yang memang ada di database
      // (mis. "SEDANG CITO", "BESAR PENYULIT") — bukan hasil hitung manual, tapi tarif resmi per baris tersebut.
      // Prioritas bila kondisi CITO dan Penyulit sama-sama terjadi: CITO (karena tabel tidak punya baris gabungan keduanya).
      function golonganEfektif(baseGolongan, opts) {
        const base = String(baseGolongan || "").toUpperCase();
        if (!base || base === "NON GOLONGAN") return base;
        if (/ CITO$| PENYULIT$/.test(base)) return base; // sudah varian eksplisit (dipilih manual di dropdown), jangan ditambah lagi
        const isCito = !!(opts && opts.cito);
        const isPenyulit = !!(opts && opts.penyulit);
        if (isCito && COT_DB.estimasi[base + " CITO"]) return base + " CITO";
        if (isPenyulit && COT_DB.estimasi[base + " PENYULIT"]) return base + " PENYULIT";
        return base;
      }
      // Status CITO diambil dari checkbox Jenis Operasi (form Nurse, live) atau dari data case tersimpan (c.jenisOperasi).
      function isCitoChecked(c) {
        const chkEl = document.querySelector(".jenisOperasiChk[value=\"CITO\"]");
        if (chkEl) return chkEl.checked;
        return !!(c && Array.isArray(c.jenisOperasi) && c.jenisOperasi.includes("CITO"));
      }
      // Resolusi golongan untuk >=1 tindakan dalam satu pengajuan.
      // Jika hanya 1 tindakan yang cocok di database paket -> pakai golongan tindakan itu.
      // Jika >=2 tindakan cocok (golongan berbeda) -> pakai golongan TERTINGGI + tandai Penyulit
      // (mengikuti Catatan Penggolongan Tarif: operasi dengan penyulit dikenakan tambahan 20% dari tarif elektif).
      function resolveGolonganMultiTindakan(tindakanListArr) {
        const matches = (tindakanListArr || []).map(findTindakan).filter(Boolean);
        if (!matches.length) return { matched: [], highest: null, penyulit: false };
        let highest = matches[0];
        for (const m of matches) { if (golonganRank(m.golongan) > golonganRank(highest.golongan)) highest = m; }
        const distinctCount = matches.length;
        return { matched: matches, highest, penyulit: distinctCount > 1 };
      }
      function tindakanNames() {
        return COT_DB.tindakan.map((t) => t.nama);
      }
      // Peta kategori dropdown Operator (judul sheet excel) -> kata kunci yang dicocokkan ke field spesialisasi tindakan di database.
      const SPESIALISASI_KATEGORI_MAP = {
        "PENGGOLONGAN OPERASI KEBIDANAN & KANDUNGAN": ["obgyn"],
        "PENGGOLONGAN OPERASI MATA": ["mata"],
        "PENGGOLONGAN OPERASI THT": ["tht"],
        "PENGGOLONGAN OPERASI UROLOGI": ["urologi"],
        "PENGGOLONGAN OPERASI BEDAH": ["bedah (spb)", "bedah anak", "bedah onkologi", "bedah digestif", "anestesiologi", "gastroenterologi", "kardiologi", "pulmonologi"],
        "PENGGOLONGAN OPERASI SARAF": ["bedah saraf"],
        "PENGGOLONGAN OPERASI BTKV": ["bedah toraks"],
        "PENGGOLONGAN OPERASI BEDAH PLASTIK": ["bedah plastik"],
        "PENGGOLONGAN OPERASI ORTHOPEDI": ["ortopedi"],
        "PENGGOLONGAN OPERASI BEDAH MULUT": ["bedah mulut"],
        "PENGGOLONGAN OPERASI KEDOKTERAN GIGI ANAK": ["gigi anak", "kedokteran gigi"],
      };
      // Nama tindakan yang ditampilkan sebagai saran, difilter berdasarkan kategori penggolongan (jika dipilih).
      // Tetap bisa ketik bebas — filter ini hanya mempersempit daftar saran, bukan membatasi input.
      function tindakanNamesByKategori(kategori) {
        const keywords = SPESIALISASI_KATEGORI_MAP[kategori];
        if (!kategori || !keywords) return tindakanNames();
        return COT_DB.tindakan
          .filter((t) => keywords.some((kw) => String(t.spesialisasi || "").toLowerCase().includes(kw)))
          .map((t) => t.nama);
      }
      // Untuk kasus dengan >=2 Operator dari kategori/spesialisasi penggolongan yang BERBEDA (operasi gabungan lintas
      // spesialisasi): masing-masing operator dibayar sesuai golongan tindakan pada spesialisasinya sendiri
      // (Catatan No. 6). Biaya bersama (Sewa Kamar, Dokter Anestesi, Jasa Layanan Operasi) memakai golongan TERTINGGI.
      // Mengembalikan null bila kasus ini tidak berlaku (hanya 1 kategori / tidak ada operator berperan Operator I-V).
            // Pasangkan tiap Operator (peran Operator I-V, urutan kemunculan) dengan Tindakan pada urutan yang sama.
      // 2 operator yang sama2 berperan "Operator I" (operator setara/berbeda spesialisasi, Catatan No.6) tetap
      // dipasangkan ke Tindakan 1 & Tindakan 2 masing-masing, bukan keduanya ke Tindakan 1.
      function pairOperatorGolongan(c) {
        const roles = c.operatorRoles || [];
        const roleRe = /^Operator (I|II|III|IV|V)$/;
        const entries = [];
        roles.forEach((role) => { if (roleRe.test(role || "")) entries.push({ role }); });
        const tindakanMatches = (c.tindakanList || []).map(findTindakan);
        entries.forEach((e, seq) => {
          e.tindakan = tindakanMatches[seq] || null;
          e.tindakanNama = e.tindakan ? e.tindakan.nama : ((c.tindakanList || [])[seq] || "");
          // Golongan final = override manual VA/CM (c.operatorGolonganFinal) bila ada, else golongan tindakan asli.
          e.golongan = (c.operatorGolonganFinal && c.operatorGolonganFinal[seq]) || (e.tindakan ? e.tindakan.golongan : "");
        });
        return entries;
      }
      // Kasus ini berlaku (>=2 golongan berbeda) hanya bila belum ada override manual yang menyamakannya,
      // ATAU bila override manual memang masih menghasilkan >=2 golongan berbeda.
      function isMultiGolonganCase(c) {
        const entries = pairOperatorGolongan(c);
        if (entries.length < 2) return false;
        // Kuncinya BUKAN golongan berbeda, tapi apakah >=2 operator masing-masing punya Tindakan sendiri
        // (2 tindakan terisi). Kalau golongannya kebetulan sama, kedua operator tetap dapat baris jasa
        // sendiri-sendiri (bukan aturan 30% Operator II) — itu tetap Catatan No.6, bukan Catatan No.1.
        const filledCount = entries.filter((e, i) => (c.tindakanList || [])[i] && String((c.tindakanList || [])[i]).trim()).length;
        return filledCount >= 2;
      }
      function computeMultiOperatorJasaRincian(c, golonganDefault, kelas) {
        const operatorEntries = pairOperatorGolongan(c);
        if (operatorEntries.length < 2) return null;
        const filledCount = operatorEntries.filter((e, i) => (c.tindakanList || [])[i] && String((c.tindakanList || [])[i]).trim()).length;
        if (filledCount < 2) return null; // cuma 1 Tindakan (operator asisten pada prosedur yang sama) -> pakai alur normal (30% rule)

        const allGolongan = operatorEntries.map((e) => e.golongan).filter(Boolean);
        let highestGol = golonganDefault;
        allGolongan.forEach((g) => { if (golonganRank(g) > golonganRank(highestGol)) highestGol = g; });
        // Catatan No.6: operator berbeda yang setara keahliannya -> honor sesuai golongan masing-masing,
        // TANPA tambahan Penyulit (Penyulit/No.7-8 hanya untuk 1 operator yang mengerjakan >1 tindakan).
        const modOpts = { cito: isCitoChecked(c), penyulit: false };
        const baseEst = estimasiJasaMedis(golonganEfektif(highestGol, modOpts), kelas, 1);
        if (!baseEst) return null;
        const rincian = baseEst.rincian.filter((r) => !/dokter operator/i.test(r.komponen));

        operatorEntries.forEach((e) => {
          const gol = e.golongan || highestGol;
          const est = estimasiJasaMedis(golonganEfektif(gol, modOpts), kelas, 1);
          const opFeeRow = est && est.rincian.find((r) => /^dokter operator i$/i.test(String(r.komponen).trim()));
          if (opFeeRow) {
            const tindakanLabel = e.tindakanNama ? ` — ${e.tindakanNama}` : "";
            rincian.push({ komponen: `Dokter ${e.role}${tindakanLabel}`, nilai: opFeeRow.nilai });
          }
        });
        const total = rincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
        return { rincian, total, kelasKey: baseEst.kelasKey };
      }
      // Estimasi jasa medis (asuransi) per golongan + kelas. Mengembalikan {rincian:[{komponen,nilai}], total}.
      /* Total gabungan: jasa medis/estimasi (VA/ADRU/Kasir) + BMHP (paket+tambahan) + Alat (Admin COT, itemized) */
      function computeBmhpAlatTotal(c) {
        let bmhpTotal = 0;
        (c.paketBMHPItems || []).forEach((it) => {
          const h = Number(it.h) || 0;
          const q = typeof it.q === "number" ? it.q : (Number(it.q) || 1);
          if (h) bmhpTotal += h * q;
        });
        (c.tambahanBMHP || []).forEach((t) => {
          const h = Number(t.harga) || 0;
          const q = Number(t.qty) || 1;
          if (h) bmhpTotal += h * q;
        });
        const alatItems = ((c.adminCot && c.adminCot.alat) || [])
          .map((a) => (typeof a === "string" ? { nama: a, harga: 0 } : { nama: a.nama, harga: Number(a.harga) || 0 }))
          .filter((a) => a.nama);
        const alatTotal = alatItems.reduce((s, a) => s + (a.harga || 0), 0);
        return { bmhpTotal, alatItems, alatTotal, total: bmhpTotal + alatTotal };
      }
      function computeGrandTotal(c) {
        let jasaTotal = 0;
        if (c.va.active) jasaTotal = c.va.estimasiTotal || 0;
        else jasaTotal = Number(c.adru.estimasi || c.kasir.estimasi || 0) || 0;
        const ba = computeBmhpAlatTotal(c);
        return { jasaTotal, bmhpTotal: ba.bmhpTotal, alatItems: ba.alatItems, alatTotal: ba.alatTotal, grandTotal: jasaTotal + ba.total };
      }

      function extractStandardRincian(rincianArr) {
        const arr = rincianArr || [];
        const norm = (s) => String(s || "").toLowerCase().replace(/\s+/g, " ").trim();
        const findEndsWith = (suffix, excludeSuffix) => {
          const item = arr.find((r) => {
            const k = norm(r.komponen);
            if (excludeSuffix && k.endsWith(excludeSuffix)) return false;
            return k.endsWith(suffix);

          const item = arr.find((r) => norm(r.komponen).includes(needle));
          return item ? Number(item.nilai) || 0 : 0;

          sewaKamar: findContains("sewa kamar"),
          operatorI: findEndsWith("operator i", "operator ii"),

        let total = 0;
        const seen = new Set();
        Object.keys(map).forEach((komp) => {
          const key = komp.toLowerCase().replace(/\s+/g, "");

          }

000,"k1":14500000,"vip":14500000,"vvip":14500000}],"BEDAH JANTUNG":[{"komponen":"Sewa kamar Operasi","k3":12100000,"k2":16940000,"k1":19360000,"vip":24200000,"vvip":27225000},{"komponen":"Dokter operator I","k3":23000000,"k2":32200000,"k1":36800000,"vip":46000000,"vvip":51750000},{"komponen":"Dokter operator II","k3":10350000,"k2":14490000,"k1":16560000,"vip":20700000,"vvip":23288000},{"komponen":"Dokter anestesi","k3":10350000,"k2":14490000,"k1":16560000,"vip":20700000,"vvip":23288000},{"komponen":"Dokter intensifis","k3":3623000,"k2":5072000,"k1":5796000,"vip":7245000,"vvip":8151000},{"komponen":"Jasa Layanan Operasi","k3":4626000,"k2":6476000,"k1":7401000,"vip":9251000,"vvip":10408000}],"BEDAH JANTUNG CITO":[{"komponen":"Sewa kamar Operasi","k3":15125000,"k2":21175000,"k1":24200000,"vip":30250000,"vvip":34032000},{"komponen":"Dokter operator I","k3":28750000,"k2":40250000,"k1":46000000,"vip":57500000,"vvip":64688000},{"komponen":"Dokter operator II","k3":12938000,"k2":18113000,"k1":20700000,"vip":25875000,"vvip":29110000},{"komponen":"Dokter anestesi","k3":12938000,"k2":18113000,"k1":20700000,"vip":25875000,"vvip":29110000},{"komponen":"Dokter intensifis","k3":4529000,"k2":6340000,"k1":7245000,"vip":9057000,"vvip":10189000},{"komponen":"Jasa Layanan Operasi","k3":5782000,"k2":8095000,"k1":9251000,"vip":11564000,"vvip":13010000}],"BEDAH JANTUNG PENYULIT":[{"komponen":"Sewa kamar Operasi","k3":14520000,"k2":20328000,"k1":23232000,"vip":29040000,"vvip":32670000},{"komponen":"Dokter operator I","k3":27600000,"k2":38640000,"k1":44160000,"vip":55200000,"vvip":62100000},{"komponen":"Dokter operator II","k3":12420000,"k2":17388000,"k1":19872000,"vip":24840000,"vvip":27945000},{"komponen":"Dokter anestesi","k3":12420000,"k2":17388000,"k1":19872000,"vip":24840000,"vvip":27945000},{"komponen":"Dokter intensifis","k3":4347000,"k2":6086000,"k1":6956000,"vip":8694000,"vvip":9781000},{"komponen":"Jasa Layanan Operasi","k3":5551000,"k2":7771000,"k1":8881000,"vip":11102000,"vvip":12489000}]},"COB":{"KECIL":[{"komponen":"Dokter Operator I","cob":4830000},{"komponen":"Dokter Operator II","cob":1449000},{"komponen":"Dokter Anestesi","cob":1690500},{"komponen":"Jasa Layanan Operasi","cob":1619000}],"SEDANG":[{"komponen":"Dokter Operator I","cob":9660000},{"komponen":"Dokter Operator II","cob":2898000},{"komponen":"Dokter Anestesi","cob":3381000},{"komponen":"Jasa Layanan Operasi","cob":3122000}],"BESAR":[{"komponen":"Dokter Operator I","cob":14490000},{"komponen":"Dokter Operator II","cob":4347000},{"komponen":"Dokter Anestesi","cob":5071500},{"komponen":"Jasa Layanan Operasi","cob":4626000}],"KHUSUS A":[{"komponen":"Dokter Operator I","cob":19320000},{"komponen":"Dokter Operator II","cob":5796000},{"komponen":"Dokter Anestesi","cob":6762000},{"komponen":"Jasa Layanan Operasi","cob":6129000}],"KHUSUS B":[{"komponen":"Dokter Operator I","cob":24150000},{"komponen":"Dokter Operator II","cob":7245000},{"komponen":"Dokter Anestesi","cob":8452500},{"komponen":"Jasa Layanan Operasi","cob":7633000}],"KHUSUS C":[{"komponen":"Dokter Operator I","cob":28980000},{"komponen":"Dokter Operator II","cob":8694000},{"komponen":"Dokter Anestesi","cob":10143000},{"komponen":"Jasa Layanan Operasi","cob":9251000}],"OK < 3 JAM":[{"komponen":"Sewa Kamar Operasi","cob":12100000}],"OK > 3 JAM":[{"komponen":"Sewa Kamar Operasi","cob":24200000}]}};
      const TAHUN_BERJALAN = "2026"; // Kelompok Tarif dipakai sebagai fallback untuk guarantor yang tidak dipetakan / tahun berjalan

      const GUARANTOR_MAPPING_KEY = "occ_cot_rsui_guarantor_mapping";
      // Seed default sesuai spesifikasi: "Inhealth/YKKBI=2023, COB Inhealth/KAI/BRI=2023 (COB), COB lain=COB,
      // ADMEDIKA=2026, BPJSTK/NAYAKA/Allianz/PT KAI=2025, UMUM=UMUM, Asuransi lainnya=Tarif sesuai tahun berjalan."
      // Tiap entri: { pola (dicocokkan sebagai substring, case-insensitive, terhadap Nama Guarantor/Asuransi
      // yang diinput Nurse), kelompokTarif, cob (true bila entri ini memakai kolom Tarif COB, bukan kolom kelas) }.
      const GUARANTOR_MAPPING_SEED = [
        { pola: "Inhealth", kelompokTarif: "2023", cob: false },
        { pola: "YKKBI", kelompokTarif: "2023", cob: false },
        { pola: "COB Inhealth", kelompokTarif: "2023", cob: true },
        { pola: "COB KAI", kelompokTarif: "2023", cob: true },
        { pola: "COB BRI", kelompokTarif: "2023", cob: true },
        { pola: "ADMEDIKA", kelompokTarif: "2026", cob: false },
        { pola: "BPJSTK", kelompokTarif: "2025", cob: false },
        { pola: "NAYAKA", kelompokTarif: "2025", cob: false },
        { pola: "Allianz", kelompokTarif: "2025", cob: false },
        { pola: "PT KAI", kelompokTarif: "2025", cob: false },
        { pola: "UMUM", kelompokTarif: "UMUM", cob: false },
      ];
      function loadGuarantorMapping() {
        try {
          const raw = localStorage.getItem(GUARANTOR_MAPPING_KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) { /* fallback ke seed */ }
        saveGuarantorMapping(GUARANTOR_MAPPING_SEED);
        return GUARANTOR_MAPPING_SEED.slice();
      }
      function saveGuarantorMapping(list) { localStorage.setItem(GUARANTOR_MAPPING_KEY, JSON.stringify(list)); }
      // Cocokkan Nama Guarantor/Asuransi (input bebas Nurse) ke satu Kelompok Tarif. Pola COB dicek lebih
      // dulu (lebih spesifik) daripada pola non-COB dari penjamin yang sama, lalu pola-pola lain berurutan
      // sesuai daftar tersimpan (entri "COB lain" umumnya diletakkan di akhir sebagai fallback COB generik).
      function resolveKelompokTarif(namaGuarantor) {
        const nama = String(namaGuarantor || "").toLowerCase();
        const mapping = loadGuarantorMapping();
        const cobEntries = mapping.filter((m) => m.cob);
        const nonCobEntries = mapping.filter((m) => !m.cob);
        for (const m of cobEntries) { if (nama.includes(String(m.pola).toLowerCase())) return { kelompokTarif: m.kelompokTarif, cob: true, matched: m.pola }; }
        for (const m of nonCobEntries) { if (nama.includes(String(m.pola).toLowerCase())) return { kelompokTarif: m.kelompokTarif, cob: false, matched: m.pola }; }
        return { kelompokTarif: TAHUN_BERJALAN, cob: false, matched: null }; // "Asuransi lainnya = Tarif sesuai tahun berjalan"
      }

      // Kelas Perhitungan: ODC selalu memakai Kelas 3 sebagai dasar tarif, apapun Kelas Perawatan pasien
      // sesungguhnya (kelasPerawatan tidak diubah, hanya dasar pencarian tarif yang disesuaikan).
      function resolveKelasUntukTarif(kelasPerawatan, jenisOperasiArr) {
        const jo = (jenisOperasiArr || []).map((x) => String(x || "").toUpperCase());
        if (jo.includes("ODC")) return "KELAS 3";
        return kelasPerawatan || "KELAS 3";
      }
      const KELAS_KEY_MAP = { VVIP: "vvip", VIP: "vip", "KELAS 1": "k1", "KELAS 2": "k2", "KELAS 3": "k3" };

      // Cari baris Master Tarif untuk Kelompok Tarif + Golongan tertentu. Golongan Efektif memakai urutan
      // prioritas Kecil→Sedang→Besar→Khusus A/B/C, lalu varian +Penyulit, lalu +CITO; bila keduanya berlaku,
      // prioritas CITO > Penyulit > Normal (sama seperti golonganEfektif() yang sudah ada di 6.5).
      function getMasterTarifRows(kelompokTarif, golongan) {
        const grp = MASTER_TARIF_DB[kelompokTarif];
        if (!grp) return [];
        const gol = String(golongan || "").toUpperCase();
        return grp[gol] || [];
      }
      // Komponen "terkait" BPJSTK untuk business rule "BPJSTK +50%": diasumsikan berlaku pada komponen jasa
      // medis (Dokter Operator I/II, Dokter Anestesi, Jasa Layanan Operasi / Dokter asisten), TIDAK pada Sewa
      // Kamar Operasi (sewa kamar bersifat fasilitas, bukan jasa medis). Asumsi ini perlu dikonfirmasi ulang
      // dengan pemberi spesifikasi bila keliru — lihat catatan pada SDS Bab 12A.
      function isBpjstkRelatedComponent(komponen) {
        const k = String(komponen || "").toLowerCase();
        return !k.includes("sewa kamar");
      }
      // Mesin hitung utama: mengembalikan { kelompokTarif, cob, rincian:[{komponen,nilai}], total }.
      // operatorIIValid = false -> seluruh baris komponen Operator II dikecualikan dari perhitungan (bukan
      // hanya diberi nilai 0), sesuai spesifikasi "Operator II bersifat opsional; jika tidak valid maka
      // seluruh komponen Operator II tidak dihitung."
      function computeTarifRincianBaru(namaGuarantor, golonganEfektifStr, kelasPerawatan, jenisOperasiArr, operatorIIValid) {
        const resolved = resolveKelompokTarif(namaGuarantor);
        const isBpjstk = String(namaGuarantor || "").toLowerCase().includes("bpjstk");
        const kelasTarif = resolveKelasUntukTarif(kelasPerawatan, jenisOperasiArr);
        const kelasKey = KELAS_KEY_MAP[String(kelasTarif).toUpperCase()] || "k3";
        const isOdc = (jenisOperasiArr || []).map((x) => String(x || "").toUpperCase()).includes("ODC");
        const rows = getMasterTarifRows(resolved.kelompokTarif, golonganEfektifStr);
        const rincian = [];
        rows.forEach((row) => {
          if (!operatorIIValid && /operator\s*ii\b/i.test(row.komponen)) return; // Operator II opsional — komponen dikecualikan bila tidak valid
          let nilai = resolved.cob ? Number(row.cob || 0) : Number(row[kelasKey] || 0);
          if (!nilai) return;
          if (isOdc && /sewa kamar/i.test(row.komponen)) nilai = 500000; // ODC: Sewa Kamar Operasi dipaksa Rp500.000
          if (isBpjstk && isBpjstkRelatedComponent(row.komponen)) nilai = Math.round(nilai * 1.5); // BPJSTK +50% komponen terkait
          rincian.push({ komponen: row.komponen, nilai });
        });
        const total = rincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
        return { kelompokTarif: resolved.kelompokTarif, cob: resolved.cob, matchedPola: resolved.matched, kelasTarif, rincian, total };
      }

      /* Riwayat Estimasi (Audit Trail) — menyimpan histori perubahan estimasi (siapa, kapan, status, nilai
         sebelum/sesudah). Dapat diakses/diedit/diunduh maksimal 6 bulan lewat menu History Estimasi. */
      const ESTIMASI_HISTORY_KEY = "occ_cot_rsui_estimasi_history";
      const ESTIMASI_HISTORY_RETENTION_DAYS = 182; // ~6 bulan
      function loadEstimasiHistory() {
        try { return JSON.parse(localStorage.getItem(ESTIMASI_HISTORY_KEY) || "[]"); } catch (e) { return []; }
      }
      function saveEstimasiHistory(list) { localStorage.setItem(ESTIMASI_HISTORY_KEY, JSON.stringify(list)); }
      function pruneEstimasiHistory(list) {
        const cutoff = Date.now() - ESTIMASI_HISTORY_RETENTION_DAYS * 24 * 60 * 60 * 1000;
        return list.filter((h) => new Date(h.waktu).getTime() >= cutoff);
      }
      // Mencatat satu entri histori perubahan estimasi. status: "Dibuat"/"Diedit"/"Disetujui"/dst.
      function addEstimasiHistory(caseId, status, sebelum, sesudah) {
        let list = loadEstimasiHistory();
        list.push({ caseId, status, sebelum, sesudah, waktu: new Date().toISOString(), oleh: state.role });
        list = pruneEstimasiHistory(list);
        saveEstimasiHistory(list);
      }

      /* Autocomplete sederhana: input bebas + saran dari daftar (datalist-like, tapi tetap free text). */
      let _acSeq = 0;
      function autocompleteInput(opts) {
        // opts: {name, value, list, placeholder, onPick}
        const id = "ac" + ++_acSeq;
        const wrap = document.createElement("div");
        wrap.className = "ac-wrap";
        wrap.innerHTML =
          `<input autocomplete="off" id="${id}" name="${opts.name || ""}" placeholder="${esc(opts.placeholder || "")}" value="${esc(opts.value || "")}"${opts.required ? " required" : ""}>` +
          `<div class="ac-menu" id="${id}menu"></div>`;
        const input = wrap.querySelector("input");
        const menu = wrap.querySelector(".ac-menu");
        function close() { menu.style.display = "none"; }
        function open(items) {
          if (!items.length) { close(); return; }
          menu.innerHTML = items.slice(0, 30).map((v) => `<div class="ac-item">${esc(v)}</div>`).join("");
          menu.style.display = "block";
          menu.querySelectorAll(".ac-item").forEach((el) =>
            (el.onmousedown = (e) => { e.preventDefault(); input.value = el.textContent; close(); if (opts.onPick) opts.onPick(el.textContent); })
          );
        }
        input.oninput = () => {
          const q = input.value.toLowerCase().trim();
          if (opts.onInput) opts.onInput(input.value);
          if (!q) { close(); return; }
          open(opts.list.filter((v) => v.toLowerCase().includes(q)));
        };
        input.onfocus = () => { const q = input.value.toLowerCase().trim(); if (q) open(opts.list.filter((v) => v.toLowerCase().includes(q))); };
        input.onblur = () => setTimeout(close, 150);
        return wrap;
      }

      /* master pasien: simpan/tarik data pasien per No. RM */
      const PATIENT_KEY = "occ_cot_rsui_patients_v2";
      function loadPatients() { try { return JSON.parse(localStorage.getItem(PATIENT_KEY) || "{}"); } catch (e) { return {}; } }
      function savePatient(rm, data) {
        if (!rm) return;
        const p = loadPatients();
        p[rm] = { nama: data.nama, jenisKelamin: data.jenisKelamin, tglLahir: data.tglLahir };
        localStorage.setItem(PATIENT_KEY, JSON.stringify(p));
      }

      /* history alat khusus Admin COT (dapat dipanggil ulang) */
      const ALAT_HISTORY_KEY = "occ_cot_rsui_alat_history_v2";
      const ALAT_SEED = ["Tower", "Microscope", "C-Arm", "Arthroscopy Tower", "Laser", "Instrumen Khusus"];
      const ALAT_PRICE_DB = { "Tower": 1000000, "C-Arm": 8000000, "Microscope": 1852000, "Arthroscopy Tower": 1920000, "Laser": 0, "Instrumen Khusus": 0 };
      // Master data Resource Monitor (jumlah unit per alat) — sementara diseed manual, nanti diganti database
      // resource sungguhan. Admin COT bisa tambah/ubah/hapus lewat panel Resource Monitor.
      const RESOURCE_MASTER_KEY = "occ_cot_rsui_resource_master";
      // Naikkan versi ini setiap kali seed alat diperbarui dari sumber master (mis. Excel Daftar Alkes Khusus COT),
      // supaya browser yang sudah punya data lama di localStorage otomatis migrasi ke daftar terbaru.
      const RESOURCE_MASTER_SEED_VERSION = "2025-07-alkes-excel-v1";
      const RESOURCE_MASTER_VERSION_KEY = "occ_cot_rsui_resource_master_seed_version";
      // ============================================================================================
      // KONFIGURASI ALOKASI SLOT OPERASI — Master Data (BUKAN jadwal pasien)
      // ============================================================================================
      // Ini adalah master konfigurasi operasional yang menjadi ACUAN SISTEM saat menjadwalkan operasi
      // (business rule), bukan sekadar tampilan spreadsheet. Setiap entri konfigurasi terdiri dari:
      //   1. Ruang operasi (satu ruang per entri)
      //   2. Slot waktu (jam mulai – jam selesai, jendela operasional ruang tsb pada periode ini)
      //   3. Daftar alat yang dialokasikan pada ruang tsb selama periode ini (TIDAK ADA default alat
      //      yang melekat permanen pada suatu ruang — daftar ini murni ditentukan Admin COT per periode)
      //   4. Status slot: "Tersedia", "Standby / Buffer", atau "Tidak Digunakan"
      // Konfigurasi bisa berlaku untuk 1 hari saja (tanggalMulai === tanggalSelesai) atau berulang di
      // sepanjang rentang tanggal tertentu (mis. 1 bulan). Ruang yang sama bisa punya kombinasi alat
      // berbeda pada periode berbeda — sistem SELALU membaca konfigurasi sesuai tanggal operasi yang
      // dipilih, tidak pernah memakai daftar alat tetap/bawaan.
      const SLOT_CONFIG_KEY = "occ_cot_rsui_slot_config";
      const SLOT_CONFIG_STATUS = ["Tersedia", "Standby / Buffer", "Tidak Digunakan"];
      function loadSlotConfig() {
        try { return JSON.parse(localStorage.getItem(SLOT_CONFIG_KEY) || "[]"); } catch (e) { return []; }
      }
      function saveSlotConfig(list) { localStorage.setItem(SLOT_CONFIG_KEY, JSON.stringify(list)); }
      // Ambil seluruh entri konfigurasi yang berlaku untuk ruang+tanggal tertentu (inklusif rentang tanggal).
      function getSlotConfigsFor(ruang, tanggal) {
        return loadSlotConfig().filter((cfg) => cfg.ruang === ruang && cfg.tanggalMulai <= tanggal && tanggal <= (cfg.tanggalSelesai || cfg.tanggalMulai));
      }
      // Alat yang dialokasikan ke ruang tsb pada tanggal tsb (union dari semua konfigurasi yang statusnya
      // BUKAN "Tidak Digunakan"). Bila belum ada konfigurasi sama sekali → dianggap TIDAK ADA alat teralokasi.
      function getAlokasiAlatUntukRuang(ruang, tanggal) {
        const norm = (s) => String(s || "").toLowerCase().trim();
        const set = new Set();
        getSlotConfigsFor(ruang, tanggal).filter((c) => c.status !== "Tidak Digunakan").forEach((c) => (c.alat || []).forEach((a) => a && set.add(norm(a))));
        return set;
      }
      // Validasi HARD sebuah pilihan ruang+jam+alat terhadap Konfigurasi Alokasi Slot Operasi.
      // Dipakai baik oleh pencarian otomatis (cariRuangUntukCase) maupun saat Admin COT memilih ruang secara
      // manual (acSetJadwal / reschedule) — supaya keduanya tunduk pada aturan yang persis sama.
      function validasiAlokasiSlot(ruang, tanggal, alatNamesNeeded, jamMulai, durasiSlotMenit, excludeCaseId) {
        const norm = (s) => String(s || "").toLowerCase().trim();
        const needed = (alatNamesNeeded || []).map(norm).filter(Boolean);
        const cfgs = getSlotConfigsFor(ruang, tanggal);
        if (!cfgs.length) return { ok: false, alasan: `Ruang ${ruang} belum memiliki Konfigurasi Alokasi Slot Operasi pada ${tanggal}.` };
        const cfgAktif = cfgs.filter((c) => c.status !== "Tidak Digunakan");
        if (!cfgAktif.length) return { ok: false, alasan: `Ruang ${ruang} berstatus "Tidak Digunakan" pada ${tanggal}.` };
        if (needed.length) {
          const allocated = getAlokasiAlatUntukRuang(ruang, tanggal);
          const missing = needed.filter((n) => !allocated.has(n));
          if (missing.length) return { ok: false, alasan: `Alat ${missing.join(", ")} tidak dialokasikan ke ruang ${ruang} pada ${tanggal} sesuai Konfigurasi Alokasi Slot Operasi.` };
        }
        const start = new Date(`${tanggal}T${jamMulai}:00`).getTime();
        const end = start + durasiSlotMenit * 60000;
        const withinWindow = cfgAktif.some((c) => start >= new Date(`${tanggal}T${c.jamMulai}:00`).getTime() && end <= new Date(`${tanggal}T${c.jamSelesai}:00`).getTime());
        if (!withinWindow) return { ok: false, alasan: `Jam ${jamMulai} (durasi operasi + 1 jam buffer = ${Math.round(durasiSlotMenit)} menit) berada di luar jam operasional yang dikonfigurasi untuk ruang ${ruang} pada ${tanggal}.` };
        const clash = cases.some((c) => {
          if (c.id === excludeCaseId || !c.adminCot.finalDone || c.adminCot.jadwal.tanggal !== tanggal || c.adminCot.jadwal.ruang !== ruang) return false;
          try { const [s, e] = slotRange(c); return start < e && s < end; } catch (e) { return false; }
        });
        if (clash) return { ok: false, alasan: `Slot ${jamMulai} di ruang ${ruang} pada ${tanggal} sudah terpakai case lain (konflik jadwal).` };
        return { ok: true };
      }
      // Cari slot kosong (jam) di SATU ruang tertentu, menyusuri seluruh jendela konfigurasi aktif ruang itu
      // pada tanggal tsb. Dipakai oleh cariRuangUntukCase per ruang kandidat.
      function cariSlotDiRuang(ruang, tanggal, alatNamesNeeded, jamPreferred, durasiSlotMenit, excludeCaseId) {
        const norm = (s) => String(s || "").toLowerCase().trim();
        const needed = (alatNamesNeeded || []).map(norm).filter(Boolean);
        const cfgs = getSlotConfigsFor(ruang, tanggal);
        if (!cfgs.length) return { ok: false, alasan: `belum ada Konfigurasi Alokasi Slot Operasi pada ${tanggal}` };
        const cfgAktif = cfgs.filter((c) => c.status !== "Tidak Digunakan");
        if (!cfgAktif.length) return { ok: false, alasan: `berstatus "Tidak Digunakan" pada ${tanggal}` };
        if (needed.length) {
          const allocated = getAlokasiAlatUntukRuang(ruang, tanggal);
          const missing = needed.filter((n) => !allocated.has(n));
          if (missing.length) return { ok: false, alasan: `alat ${missing.join(", ")} tidak dialokasikan pada ${tanggal}` };
        }
        let sebabWaktu = null;
        for (const cfg of cfgAktif.slice().sort((a, b) => a.jamMulai.localeCompare(b.jamMulai))) {
          const windowStart = new Date(`${tanggal}T${cfg.jamMulai}:00`).getTime();
          const windowEnd = new Date(`${tanggal}T${cfg.jamSelesai}:00`).getTime();
          const preferredMs = jamPreferred ? new Date(`${tanggal}T${jamPreferred}:00`).getTime() : windowStart;
          let cursor = Math.max(windowStart, preferredMs);
          let adaRuangWaktu = false;
          while (cursor + durasiSlotMenit * 60000 <= windowEnd) {
            adaRuangWaktu = true;
            const candEnd = cursor + durasiSlotMenit * 60000;
            const clash = cases.some((c) => {
              if (c.id === excludeCaseId || !c.adminCot.finalDone || c.adminCot.jadwal.tanggal !== tanggal || c.adminCot.jadwal.ruang !== ruang) return false;
              try { const [s, e] = slotRange(c); return cursor < e && s < candEnd; } catch (e) { return false; }
            });
            if (!clash) return { ok: true, jam: fmtHHMM(cursor) };
            sebabWaktu = "konflik jadwal — slot sudah terpakai case lain";
            cursor += 30 * 60000;
          }
          if (!adaRuangWaktu && !sebabWaktu) sebabWaktu = "durasi operasi + 1 jam buffer tidak mencukupi jam operasional yang dikonfigurasi";
        }
        return { ok: false, alasan: sebabWaktu || "slot tidak tersedia pada jam operasional yang dikonfigurasi" };
      }
      // Business rule utama: pencarian ruang untuk PENJADWALAN PASIEN (bukan konfigurasi itu sendiri).
      // Langkah: (1) ambil konfigurasi ruang pada tanggal, (2) ambil alat yang dialokasikan, (3) cari ruang
      // yang punya seluruh alat dibutuhkan, (4) pastikan slot waktu tersedia, (5) pastikan tidak ada konflik
      // jadwal, (6) blok slot sesuai durasi operasi + 1 jam buffer (default Turn Over Time = 60 menit).
      // Jika tidak ada ruang yang memenuhi syarat, mengembalikan alasan spesifik per ruang.
      function cariRuangUntukCase(tanggal, alatNamesNeeded, jamPreferred, estimasiJam, excludeCaseId) {
        const durasiSlotMenit = (Number(estimasiJam) || 1) * 60 + getTOT(); // buffer standar 1 jam (default TOT = 60 menit)
        const alasanPerRuang = [];
        for (const ruang of OK_ROOM_LIST) {
          const r = cariSlotDiRuang(ruang, tanggal, alatNamesNeeded, jamPreferred, durasiSlotMenit, excludeCaseId);
          if (r.ok) return { ruang, jam: r.jam, durasiSlotMenit };
          alasanPerRuang.push(`${ruang}: ${r.alasan}`);
        }
        return { ruang: null, alasanPerRuang, durasiSlotMenit };
      }

          const r = localStorage.getItem(RESOURCE_MASTER_KEY);
          if (r && savedVersion === RESOURCE_MASTER_SEED_VERSION) return JSON.parse(r);
        } catch (e) { /* fallback ke default */ }
        // Diperbarui sesuai "Daftar Alkes Khusus COT" (master alkes rumah sakit) — total unit riil per alat,
        // dengan keterangan KSM/spesialisasi pengguna agar Admin COT tahu siapa yang berhak memakai.
        const seed = [

          { nama: "HSD Medtronic", total: 1, maintenance: 0, harga: 0, keterangan: "Bedah Saraf" },

        localStorage.setItem(RESOURCE_MASTER_KEY, JSON.stringify(seed));

      }
      function saveResourceMaster(list) {
        localStorage.setItem(RESOURCE_MASTER_KEY, JSON.stringify(list));
        localStorage.setItem(RESOURCE_MASTER_VERSION_KEY, RESOURCE_MASTER_SEED_VERSION);
      }
      // Cari harga alat dari database master Resource Monitor (kalau ada), fallback ke ALAT_PRICE_DB lama.
      function getResourcePrice(nama) {
        const norm = (s) => String(s || "").toLowerCase().trim();
        const master = loadResourceMaster().find((r) => norm(r.nama) === norm(nama));
        if (master && master.harga) return Number(master.harga) || 0;
        return ALAT_PRICE_DB[nama] || 0;
      }
      // Template estimasi manual — untuk tindakan non-golongan (Kasir/ADRU COT/VA), supaya rincian jasa medis
      // yang sudah pernah diketik tidak perlu diulang dari nol tiap kali, tinggal muat dari template tersimpan.
      const ESTIMASI_TEMPLATE_KEY = "occ_cot_rsui_estimasi_templates";
      function loadEstimasiTemplates() {
        try { return JSON.parse(localStorage.getItem(ESTIMASI_TEMPLATE_KEY) || "[]"); } catch (e) { return []; }
      }
      function saveEstimasiTemplates(list) {
        localStorage.setItem(ESTIMASI_TEMPLATE_KEY, JSON.stringify(list));
      }
      // Cek ketersediaan alat terhadap database master Resource Monitor, untuk HARI + JAM tertentu (booking slot-aware).
      // Mengembalikan array pesan peringatan (kosong = semua cukup). Alat yang TIDAK terdaftar di master
      // (mis. alat non-inventaris/sekali pakai) dilewati saja — tidak dianggap kurang.
      // jam & estimasiJam bersifat opsional: bila keduanya diisi, konflik dihitung berdasarkan jam operasi yang
      // benar-benar tumpang tindih (bukan sekadar sama-sama pada tanggal itu). Bila belum ada (mis. saat tahap
      // "kebutuhan alat awal" sebelum jadwal ditentukan), dilakukan pengecekan konservatif satu hari penuh.
      function checkAlatAvailability(c, alatNames, tanggal, jam, estimasiJam) {
        if (!tanggal || !alatNames || !alatNames.length) return [];
        const resourceMaster = loadResourceMaster();
        const normNama = (s) => String(s || "").toLowerCase().trim();
        const rangeStart = new Date(`${tanggal}T${jam && estimasiJam ? jam : "00:00"}:00`).getTime();
        const rangeEnd = jam && estimasiJam ? rangeStart + Number(estimasiJam) * 3600000 : new Date(`${tanggal}T23:59:59`).getTime();
        const overlap = (aStart, aEnd) => aStart < rangeEnd && rangeStart < aEnd;
        const others = cases.filter((x) => {
          if (x.id === c.id || !x.adminCot || !x.adminCot.finalDone || !x.adminCot.jadwal || x.adminCot.jadwal.tanggal !== tanggal) return false;
          if (!x.adminCot.jadwal.jam) return true; // belum ada jam pasti → anggap konservatif, bisa tumpang tindih
          try {
            const [xStart, xEnd] = operationRange(x);
            return overlap(xStart, xEnd);
          } catch (e) { return true; }
        });
        const neededCounts = {};
        alatNames.forEach((n) => { const k = normNama(n); if (k) neededCounts[k] = (neededCounts[k] || 0) + 1; });
        const warnings = [];
        const jamInfo = jam && estimasiJam ? ` pukul ${jam}–${fmtHHMM(rangeEnd)}` : "";
        Object.keys(neededCounts).forEach((k) => {
          const master = resourceMaster.find((r) => normNama(r.nama) === k);
          if (!master) return;
          const usedByOthers = others.filter((x) => (x.adminCot.alat || []).some((a) => normNama(typeof a === "string" ? a : a.nama) === k)).length;
          const maintenance = Number(master.maintenance) || 0;
          const availableTotal = Math.max(0, (Number(master.total) || 0) - maintenance);
          const remaining = availableTotal - usedByOthers;
          if (neededCounts[k] > remaining) {
            warnings.push(`⚠️ ${master.nama}: butuh ${neededCounts[k]}, tersisa ${Math.max(0, remaining)} dari total ${master.total} pada ${tanggal}${jamInfo} (sudah dipakai ${usedByOthers} case lain yang jadwalnya tumpang tindih${maintenance ? `, ${maintenance} maintenance` : ""}).`);
          }
        });
        return warnings;
      }
      function loadAlatHistory() {
        try {
          const saved = JSON.parse(localStorage.getItem(ALAT_HISTORY_KEY) || "[]");
          return Array.from(new Set([...ALAT_SEED, ...saved]));
        } catch (e) { return ALAT_SEED.slice(); }
      }
      function saveAlatHistory(list) {
        const cur = loadAlatHistory();
        const merged = Array.from(new Set([...cur, ...list.filter((x) => x && x.trim())]));
        localStorage.setItem(ALAT_HISTORY_KEY, JSON.stringify(merged.filter((x) => !ALAT_SEED.includes(x))));
      }

      /* Status efektif Admin COT: Reschedule tetap sampai tanggal LAMA lewat, lalu jadi Terjadwal */
      function adminCotEffectiveStatus(c) {
        if (!c.adminCot.finalDone) return null;
        if (c.adminCot.decision === "Reschedule" && c.adminCot.prevJadwal && c.adminCot.prevJadwal.tanggal) {
          const oldDate = new Date(c.adminCot.prevJadwal.tanggal + "T23:59:59");
          if (Date.now() < oldDate.getTime()) return "Reschedule"; // tanggal lama belum lewat
          return "Terjadwal"; // sudah lewat → berlaku jadwal baru
        }
        if (c.adminCot.decision === "DalamKonfirmasi") return "DalamKonfirmasi";
        return "Terjadwal";
      }

      /* ---------------- workflow engine ---------------- */
      function recompute(c) {
        c.va.active = c.penjamin === "Asuransi";
        // Rev2 BRD: pasien Umum di lokasi COT -> ADRU COT; pasien Umum di luar COT (ODC/Poli) -> Kasir.
        // BPJS Kesehatan: alur disamakan Umum, TAPI selalu lewat ADRU COT (tanpa proses Kasir sama sekali).
        c.adru.active = c.penjamin === "BPJS" || (c.penjamin === "Umum" && c.lokasiTindakan === "COT");
        c.kasir.active = c.penjamin === "Umum" && c.lokasiTindakan !== "COT";
        // Rev2 BRD: CS aktif untuk pasien Asuransi (setelah VA) DAN pasien Umum non-COT (setelah Kasir/ODC-Poli).
        c.cs.active = c.penjamin === "Asuransi" || c.kasir.active;
        c.adminCot.required = c.lokasiTindakan === "COT";

        if (c.status === "Cancelled" || c.status === "Draft") {
          return;
        }

        const stage1Done = c.va.active
          ? c.va.stage1Done
          : (c.adru.active ? c.adru.stage1Done : true) && (c.kasir.active ? c.kasir.stage1Done : true);
        const cmGateReady =
          stage1Done &&
          c.farmasi.done &&
          (!c.adminCot.required || c.adminCot.prelimDone);
        const stage2Done = c.va.active
          ? c.va.stage2Done
          : (c.adru.active ? c.adru.stage2Done : true) && (c.kasir.active ? c.kasir.stage2Done : true);
        const routeDone = c.va.active ? c.cs.done : stage2Done; // asuransi butuh CS, umum tidak
        const allDone =
          routeDone && (!c.adminCot.required || c.adminCot.finalDone);

        // TAT: catat waktu case MASUK antrian tiap unit (sekali saja, saat kondisi baru terpenuhi).
        if (!c.stageEnteredAt) c.stageEnteredAt = {};
        const nowIso = new Date().toISOString();
        if (cmGateReady && !c.caseManager.done && !c.stageEnteredAt.CaseManager) c.stageEnteredAt.CaseManager = nowIso;
        const csGateReady = c.va.active ? c.va.stage2Done : (c.kasir.active ? c.kasir.stage2Done : true);
        if (c.cs.active && csGateReady && !c.cs.done && !c.stageEnteredAt.CS) c.stageEnteredAt.CS = nowIso;
        if (c.adminCot.required && (c.va.active ? c.cs.done : stage2Done) && !c.adminCot.finalDone && !c.stageEnteredAt.AdminCOT) c.stageEnteredAt.AdminCOT = nowIso;
        // Fase "review asuransi" VA (di luar kendali RS, maks 7 hari) dimulai begitu Case Manager approve.
        if (c.va.active && c.va.stage1Done && c.caseManager.done && !c.va.stage2Done && !c.stageEnteredAt.VAReview) c.stageEnteredAt.VAReview = nowIso;

        if (
          c.status !== "Returned" &&
          c.status !== "Cancelled" &&
          c.status !== "Completed"
        ) {
          if (c.caseManager.done && allDone) {
            c.status = "Completed";
          } else {
            c.status = "InProgress";
          }
        }

        // current flow label for dashboard chip
        if (!c.caseManager.done) {
          if (!cmGateReady) {
            c.currentFlow = c.va.active
              ? "VA/Farmasi/AdminCOT"
              : "Kasir/ADRUCOT/Farmasi/AdminCOT";
          } else {
            c.currentFlow = "CaseManager";
          }
        } else if (!routeDone) {
          c.currentFlow = c.va.active ? "VA→CS" : "Kasir/ADRUCOT";
        } else if (c.adminCot.required && !c.adminCot.finalDone) {
          c.currentFlow = "AdminCOT (Final)";
        } else {
          c.currentFlow = "Selesai";
        }
      }

      function stepStatusFor(c, key) {
        if (c.status === "Draft") return key === "Nurse" ? "current" : "";
        if (c.status === "Cancelled") return "";
        const stage1Done = c.va.active
          ? c.va.stage1Done
          : c.kasir.stage1Done && c.adru.stage1Done;
        const stage2Done = c.va.active
          ? c.va.stage2Done
          : c.kasir.stage2Done && c.adru.stage2Done;
        const routeDone = c.va.active ? c.cs.done : stage2Done;
        const map = {
          Nurse: true,
          Unit1: stage1Done,
          CaseManager: c.caseManager.done,
          Unit2: c.caseManager.done ? stage2Done : false,
          CS: c.va.active ? c.cs.done : null,
          AdminCOTFinal: c.adminCot.required ? c.adminCot.finalDone : null,
          Selesai: c.status === "Completed",
        };
        const v = map[key];
        if (v === null) return "skip";
        if (v === true) return "done";
        // determine current
        if (key === "Unit1" && !stage1Done) return "current";
        if (key === "CaseManager" && stage1Done && !c.caseManager.done)
          return "current";
        if (key === "Unit2" && c.caseManager.done && !stage2Done)
          return "current";
        if (key === "CS" && c.va.active && stage2Done && !c.cs.done)
          return "current";
        if (
          key === "AdminCOTFinal" &&
          c.adminCot.required &&
          routeDone &&
          !c.adminCot.finalDone
        )
          return "current";
        return "";
      }

      function roleQueueMatch(c, role) {
        if (role === "Nurse") return c.status === "Draft" || c.status === "Returned";
        if (c.status === "Cancelled" || c.status === "Draft") return false;
        if (role === "VA")
          return c.va.active && !c.va.stage2Done;
        if (role === "Kasir")
          return (
            c.kasir.active &&
            (!c.kasir.stage1Done || (c.caseManager.done && !c.kasir.stage2Done))
          );
        if (role === "ADRUCOT")
          return (
            c.adru.active &&
            (!c.adru.stage1Done || (c.caseManager.done && !c.adru.stage2Done))
          );
        if (role === "Farmasi") return !c.farmasi.done;
        if (role === "AdminCOT") {
          if (!c.adminCot.required) return false;
          if (!c.adminCot.prelimDone) return true;
          const stage2Done = c.va.active
            ? c.va.stage2Done
            : (c.adru.active ? c.adru.stage2Done : true) && (c.kasir.active ? c.kasir.stage2Done : true);
          const routeDone = c.va.active ? c.cs.done : stage2Done;
          return routeDone && !c.adminCot.finalDone;
        }
        if (role === "CaseManager") {
          const stage1Done = c.va.active
            ? c.va.stage1Done
            : (c.adru.active ? c.adru.stage1Done : true) && (c.kasir.active ? c.kasir.stage1Done : true);
          return (
            stage1Done &&
            c.farmasi.done &&
            (!c.adminCot.required || c.adminCot.prelimDone) &&
            !c.caseManager.done
          );
        }
        if (role === "CS") return c.cs.active && (c.va.active ? c.va.stage2Done : (c.kasir.active ? c.kasir.stage2Done : true)) && !c.cs.done;
        return false;
      }

        const now = new Date().toISOString();
        if (!c.stageEnteredAt) c.stageEnteredAt = {};
        if (c.va.active) c.stageEnteredAt.VA = now;
        if (c.kasir.active) c.stageEnteredAt.Kasir = now;

      const RETURN_UNITS = [
        { id: "Nurse", label: "Nurse (data awal)" },

        { id: "Kasir", label: "Kasir (administrasi umum)" },

        { id: "Farmasi", label: "Farmasi (paket BMHP)" },

      function returnUnitLabel(id) {
        const u = RETURN_UNITS.find((x) => x.id === id);
        return u ? u.label : id;
      }
      // Opsi tujuan "Kembalikan untuk Revisi" untuk role X — sama seperti dropdown Case Manager,
      // tapi mengecualikan role X sendiri (role tidak bisa kirim revisi ke dirinya sendiri).
      function buildRevisiOptions(excludeRoleId, c) {
        return RETURN_UNITS.filter((u) => {
          if (u.id === excludeRoleId) return false;
          if (u.id === "VA") return c.va.active;
          if (u.id === "Kasir") return c.kasir.active;
          if (u.id === "ADRUCOT") return c.adru.active;
          if (u.id === "AdminCOT") return c.adminCot.required;

      const CS_FOLLOWUP_HOURS = 8; // reminder follow-up ke pasien tiap pergantian shift (tidak berubah)
      const VA_REVIEW_REMINDER_HOURS = 24; // VA wajib update status keputusan asuransi (Disetujui/Pending/Ditolak) tiap 24 jam
      const VA_REVIEW_MAX_HOURS = 7 * 24; // maksimal 7 hari menunggu keputusan asuransi (di luar kendali RS)
      // TAT per unit (jam). Catatan pembagian:
      // - Pasien UMUM: total tetap target 3 hari (Kasir/ADRU 24 + Farmasi 24 + CM 8 + AdminCOT 8 ≈ dalam 3 hari kerja).
      // - Pasien ASURANSI: proses INTERNAL sampai pengajuan ke asuransi ditarget 3 hari (VA 24 + Farmasi 24 + CM 8),
      //   SETELAH itu masuk fase "review asuransi" (di luar kendali RS) — dipisah, lihat VA_REVIEW_* di atas,
      //   VA wajib update status tiap 24 jam, maksimal 7 hari.
      // - Farmasi dinaikkan jadi 24 jam karena ada proses konfirmasi ke vendor BMHP/alat.
      // - CS ditarget 3x24 jam (72 jam) untuk memastikan kelanjutan rencana tindakan, tapi tetap diingatkan
      //   follow-up ke pasien tiap pergantian shift (8 jam, CS_FOLLOWUP_HOURS) supaya tidak menunggu pasif sampai 72 jam.
      // - Admin COT & Case Manager tidak berubah (8 jam, proses administratif cepat).
      const UNIT_TAT_HOURS = { VA: 24, Kasir: 24, ADRUCOT: 24, Farmasi: 24, CaseManager: 8, CS: 72, AdminCOT: 8 };

        const text = (d > 0 ? `${String(d).padStart(2, "0")}:` : "") + `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
