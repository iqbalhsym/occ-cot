1<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Command Center — COT RSUI</title>
    <style>
      :root {
        --navy-950: #0b1b2b;
        --navy-900: #102a43;
        --navy-800: #1b3a5c;
        --navy-700: #28527a;
        --teal-500: #1f8a8c;
        --teal-400: #2aa9ab;
        --teal-100: #e3f4f4;
        --amber-500: #c98a1c;
        --amber-100: #fbf0dc;
        --red-500: #b3413c;
        --red-100: #fbe6e4;
        --green-600: #2e7d5b;
        --green-100: #e2f3ea;
        --purple-600: #5b3fa0;
        --purple-100: #e6e0fb;
        --blue-600: #2b4f9c;
        --blue-100: #e4ecfb;
        --slate-50: #f6f8fa;
        --slate-100: #eef1f4;
        --slate-200: #dde3e9;
        --slate-300: #c7d0da;
        --slate-400: #93a1b0;
        --slate-500: #66768a;
        --slate-700: #3a4b5e;
        --slate-900: #1c2733;
        --white: #ffffff;
        --radius: 6px;
        --font-ui:
          "Segoe UI", -apple-system, "Helvetica Neue", Arial, sans-serif;
        --font-mono: "Consolas", "SFMono-Regular", Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family: var(--font-ui);
        background: var(--slate-50);
        color: var(--slate-900);
        font-size: 14px;
        line-height: 1.5;
      }
      #app {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 252px;
        flex: 0 0 252px;
        background: linear-gradient(180deg, var(--navy-950), var(--navy-900));
        color: var(--slate-50);
        display: flex;
        flex-direction: column;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .brand {
        padding: 20px 18px 14px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .brand .mark {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }
      .brand .mark .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--teal-400);
        box-shadow: 0 0 0 3px rgba(42, 169, 171, 0.25);
      }
      .brand h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .brand p {
        margin: 2px 0 0 0;
        font-size: 11px;
        color: var(--slate-400);
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .role-box {
        margin: 14px 14px 6px 14px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .role-box label {
        display: block;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--slate-400);
        margin-bottom: 6px;
      }
      .role-box select {
        width: 100%;
        padding: 7px 8px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: var(--navy-800);
        color: var(--white);
        font-size: 13px;
        font-family: inherit;
      }
      .role-box select:focus {
        outline: 2px solid var(--teal-400);
        outline-offset: 1px;
      }
      nav {
        flex: 1;
        padding: 10px 10px;
        overflow-y: auto;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        margin-bottom: 2px;
        border-radius: var(--radius);
        color: var(--slate-100);
        cursor: pointer;
        font-size: 13.5px;
        font-weight: 500;
        border: 1px solid transparent;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .nav-item.active {
        background: var(--teal-500);
        color: var(--white);
      }
      .nav-item .badge {
        margin-left: auto;
        background: rgba(255, 255, 255, 0.18);
        color: var(--white);
        font-size: 10.5px;
        padding: 1px 7px;
        border-radius: 20px;
        font-weight: 700;
      }
      .nav-item.active .badge {
        background: rgba(255, 255, 255, 0.28);
      }
      .sidebar-foot {
        padding: 12px 16px;
        font-size: 10.5px;
        color: var(--slate-400);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        height: 56px;
        flex: 0 0 56px;
        background: var(--white);
        border-bottom: 1px solid var(--slate-200);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .topbar h2 {
        font-size: 16px;
        margin: 0;
        font-weight: 700;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .clock {
        font-family: var(--font-mono);
        font-size: 12.5px;
        color: var(--slate-500);
      }
      .content {
        padding: 22px;
        flex: 1;
        overflow-y: auto;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      .btn {
        padding: 8px 14px;
        border-radius: 5px;
        border: 1px solid var(--slate-200);
        background: var(--white);
        color: var(--slate-900);
        font-size: 13px;
        font-weight: 600;
      }
      .btn:hover {
        border-color: var(--slate-400);
      }
      .btn-primary {
        background: var(--teal-500);
        border-color: var(--teal-500);
        color: var(--white);
      }
      .btn-primary:hover {
        background: var(--teal-400);
        border-color: var(--teal-400);
      }
      .btn-danger {
        background: var(--white);
        border-color: var(--red-500);
        color: var(--red-500);
      }
      .btn-danger:hover {
        background: var(--red-100);
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
        color: var(--teal-500);
      }
      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
      }
      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .card {
        background: var(--white);
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        padding: 18px;
        margin-bottom: 18px;
      }
      .card h3 {
        margin: 0 0 14px 0;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card h4 {
        margin: 16px 0 8px 0;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-500);
        border-top: 1px solid var(--slate-100);
        padding-top: 14px;
      }
      .card h4:first-child {
        border-top: none;
        padding-top: 0;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--white);
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        padding: 14px 16px;
      }
      .stat-card .num {
        font-size: 26px;
        font-weight: 800;
        color: var(--navy-900);
      }
      .stat-card .lbl {
        font-size: 11.5px;
        color: var(--slate-500);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-top: 2px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead th {
        text-align: left;
        padding: 9px 10px;
        border-bottom: 2px solid var(--slate-200);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-500);
        background: var(--slate-50);
      }
      tbody td {
        padding: 10px;
        border-bottom: 1px solid var(--slate-100);
        vertical-align: middle;
      }
      tbody tr:hover {
        background: var(--slate-50);
      }
      tbody tr {
        cursor: pointer;
      }
      .empty-row td {
        text-align: center;
        padding: 30px;
        color: var(--slate-400);
      }
      .badge-status {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }
      .st-Draft {
        background: var(--slate-100);
        color: var(--slate-700);
      }
      .st-Submitted {
        background: var(--blue-100);
        color: var(--blue-600);
      }
      .st-Returned {
        background: var(--red-100);
        color: var(--red-500);
      }
      .st-InProgress {
        background: var(--blue-100);
        color: var(--blue-600);
      }
      .st-Completed {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Cancelled {
        background: var(--slate-200);
        color: var(--slate-500);
        text-decoration: line-through;
      }
      .st-Menunggu {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-Pending {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-Approved {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Disetujui {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Revisi {
        background: var(--red-100);
        color: var(--red-500);
      }
      .st-Ditolak {
        background: var(--red-100);
        color: var(--red-500);
      }
      .st-DalamKonfirmasi {
        background: var(--purple-100);
        color: var(--purple-600);
      }
      .st-DokumenBelumLengkap {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-Terjadwal {
        background: var(--purple-100);
        color: var(--purple-600);
      }
      .st-Reschedule {
        background: var(--amber-100);
        color: var(--amber-500);
      }
      .st-Selesai {
        background: var(--green-100);
        color: var(--green-600);
      }
      .st-Batal {
        background: var(--slate-200);
        color: var(--slate-500);
        text-decoration: line-through;
      }
      .st-Belum {
        background: var(--slate-100);
        color: var(--slate-400);
      }
      .chip {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        background: var(--slate-100);
        color: var(--slate-700);
        margin: 2px 4px 2px 0;
      }
      .chip-flow {
        background: var(--navy-900);
        color: var(--white);
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .form-grid .full {
        grid-column: 1 / -1;
      }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: var(--slate-700);
        margin-bottom: 5px;
      }
      .field .hint {
        font-weight: 400;
        color: var(--slate-400);
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--slate-200);
        border-radius: 5px;
        font-size: 13px;
        font-family: inherit;
        background: var(--white);
        color: var(--slate-900);
      }
      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        outline: 2px solid var(--teal-400);
        outline-offset: 0;
        border-color: var(--teal-400);
      }
      .field textarea {
        resize: vertical;
        min-height: 60px;
      }
      .req::after {
        content: " *";
        color: var(--red-500);
      }
      .dyn-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
      }
      .dyn-row input,
      .dyn-row select {
        flex: 1;
      }
      .dyn-row .tag {
        font-size: 11px;
        font-weight: 700;
        color: var(--slate-400);
        width: 70px;
        flex: 0 0 70px;
      }
      .checkbox-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .checkbox-grid label {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--slate-50);
        border: 1px solid var(--slate-200);
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
      }
      /* --- Autocomplete widget --- */
      .ac-wrap { position: relative; }
      .ac-wrap input { width: 100%; padding: 8px 10px; border: 1px solid var(--slate-200); border-radius: 5px; font-size: 13px; font-family: inherit; }
      .ac-wrap input:focus { outline: 2px solid var(--teal-400); border-color: var(--teal-400); }
      .ac-menu { display: none; position: absolute; z-index: 20; top: 100%; left: 0; right: 0; background: var(--white); border: 1px solid var(--slate-200); border-radius: 6px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); max-height: 220px; overflow-y: auto; margin-top: 2px; }
      .ac-item { padding: 7px 10px; font-size: 13px; cursor: pointer; }
      .ac-item:hover { background: var(--teal-100); }
      /* --- Auto-fill info panel (paket/golongan/estimasi) --- */
      .autofill-box { background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 6px; padding: 12px 14px; margin-top: 4px; }
      .autofill-box .af-head { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 8px; }
      .af-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 20px; background: var(--navy-900); color: var(--white); }
      .af-pill.gol { background: var(--purple-600); }
      .af-pill.spes { background: var(--teal-500); }
      .af-pill.harga { background: var(--green-600); }
      .af-table { width: 100%; font-size: 12px; border-collapse: collapse; }
      .af-table td { padding: 3px 6px; border-bottom: 1px solid var(--slate-100); }
      .af-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
      .af-empty { font-size: 12px; color: var(--slate-400); font-style: italic; }
      .case-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 18px;
      }
      .case-header h2 {
        margin: 0 0 4px 0;
        font-size: 19px;
      }
      .case-header .meta {
        color: var(--slate-500);
        font-size: 12.5px;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 18px;
        align-items: start;
      }
      @media (max-width: 980px) {
        .two-col {
          grid-template-columns: 1fr;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 18px;
        font-size: 13px;
      }
      .info-grid dt {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-400);
        margin-bottom: 1px;
      }
      .info-grid dd {
        margin: 0 0 8px 0;
        font-weight: 600;
        color: var(--slate-900);
      }
      .section-lbl {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--slate-400);
        margin-top: 8px;
      }
      .stepper {
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        margin-bottom: 4px;
      }
      .step {
        flex: 1;
        min-width: 100px;
        text-align: center;
        padding: 10px 6px;
        position: relative;
        border-bottom: 3px solid var(--slate-200);
        font-size: 11px;
        font-weight: 700;
        color: var(--slate-400);
      }
      .step.done {
        border-color: var(--teal-500);
        color: var(--teal-500);
      }
      .step.current {
        border-color: var(--navy-900);
        color: var(--navy-900);
      }
      .step.skip {
        border-color: var(--slate-100);
        color: var(--slate-300);
      }
      .unit-status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 6px;
      }
      .unit-status-card {
        border: 1px solid var(--slate-200);
        border-radius: 6px;
        padding: 8px 10px;
        text-align: center;
      }
      .unit-status-card .u-name {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--slate-500);
        margin-bottom: 4px;
      }
      .audit-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border-left: 2px solid var(--slate-200);
        margin-left: 6px;
      }
      .audit-item {
        position: relative;
        padding: 0 0 16px 20px;
      }
      .audit-item::before {
        content: "";
        position: absolute;
        left: -7px;
        top: 2px;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: var(--teal-500);
        border: 2px solid var(--white);
        box-shadow: 0 0 0 1px var(--slate-200);
      }
      .audit-item .when {
        font-size: 11px;
        color: var(--slate-400);
        font-family: var(--font-mono);
      }
      .audit-item .who {
        font-size: 11.5px;
        font-weight: 700;
        color: var(--navy-900);
      }
      .audit-item .what {
        font-size: 13px;
        margin: 2px 0;
      }
      .audit-item .note {
        font-size: 12.5px;
        color: var(--slate-500);
        font-style: italic;
      }
      .permission-note {
        background: var(--amber-100);
        border: 1px solid #f0dcae;
        color: #7a5610;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 12.5px;
        margin-bottom: 16px;
      }
      .locked-note {
        background: var(--slate-100);
        border: 1px solid var(--slate-200);
        color: var(--slate-500);
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 12.5px;
        margin-bottom: 16px;
      }
      .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .search-bar input,
      .search-bar select {
        padding: 8px 10px;
        border: 1px solid var(--slate-200);
        border-radius: 5px;
        font-size: 13px;
      }
      .search-bar input {
        flex: 1;
        min-width: 180px;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(11, 27, 43, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
        overflow-y: auto;
      }
      .modal {
        background: var(--white);
        border-radius: 10px;
        max-width: 640px;
        width: 100%;
        padding: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal h3 {
        margin-top: 0;
      }
      .modal .btn-row {
        justify-content: flex-end;
        margin-top: 16px;
      }
      .toast-wrap {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 60;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: var(--navy-900);
        color: var(--white);
        padding: 10px 16px;
        border-radius: 6px;
        font-size: 13px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        animation: fadein 0.2s ease;
      }
      .toast.warn {
        background: var(--red-500);
      }
      .toast.ok {
        background: var(--green-600);
      }
      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .footer-hint {
        font-size: 11.5px;
        color: var(--slate-400);
        margin-top: 6px;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--slate-200);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">
            <span class="dot"></span>
            <h1>Operation Command Center</h1>
          </div>
          <p>COT RSUI &middot; Offline Mode</p>
        </div>
        <div class="role-box">
          <label>Login sebagai role</label
          ><select id="roleSelect"></select>
        </div>

      // Estimasi jasa medis (asuransi) per golongan + kelas. Mengembalikan {rincian:[{komponen,nilai}], total}.
      function estimasiJasaMedis(golongan, kelas) {
        const gol = String(golongan || "").toUpperCase();
        const map = COT_DB.estimasi[gol];
        if (!map) return null;
        const kelasKey = { VVIP: "vvip", VIP: "vip", "KELAS 1": "k1", "KELAS 2": "k2", "KELAS 3": "k3" }[String(kelas || "").toUpperCase()] || "k1";
        const rincian = [];
        let total = 0;
        const seen = new Set();
        Object.keys(map).forEach((komp) => {
          const key = komp.toLowerCase().replace(/\s+/g, "");
          if (seen.has(key)) return; // hindari duplikat (kapitalisasi berbeda di sumber)
          seen.add(key);
          const nilai = map[komp][kelasKey];
          if (nilai) {
            rincian.push({ komponen: komp, nilai });
            total += Number(nilai) || 0;
          }
        });
        return { rincian, total, kelasKey };
      }

      /* Autocomplete sederhana: input bebas + saran dari daftar (datalist-like, tapi tetap free text). */
      let _acSeq = 0;
      function autocompleteInput(opts) {
        // opts: {name, value, list, placeholder, onPick}
        const id = "ac" + ++_acSeq;
        const wrap = document.createElement("div");
        wrap.className = "ac-wrap";
        wrap.innerHTML =
          `<input autocomplete="off" id="${id}" name="${opts.name || ""}" placeholder="${esc(opts.placeholder || "")}" value="${esc(opts.value || "")}">` +
          `<div class="ac-menu" id="${id}menu"></div>`;
        const input = wrap.querySelector("input");
        const menu = wrap.querySelector(".ac-menu");
        function close() { menu.style.display = "none"; }
        function open(items) {
          if (!items.length) { close(); return; }
          menu.innerHTML = items.slice(0, 30).map((v) => `<div class="ac-item">${esc(v)}</div>`).join("");
          menu.style.display = "block";
          menu.querySelectorAll(".ac-item").forEach((el) =>
            (el.onmousedown = (e) => { e.preventDefault(); input.value = el.textContent; close(); if (opts.onPick) opts.onPick(el.textContent); })
          );
        }
        input.oninput = () => {
          const q = input.value.toLowerCase().trim();
          if (opts.onInput) opts.onInput(input.value);
          if (!q) { close(); return; }
          open(opts.list.filter((v) => v.toLowerCase().includes(q)));
        };
        input.onfocus = () => { const q = input.value.toLowerCase().trim(); if (q) open(opts.list.filter((v) => v.toLowerCase().includes(q))); };
        input.onblur = () => setTimeout(close, 150);
        return wrap;

          ? c.va.stage2Done
          : c.kasir.stage2Done && c.adru.stage2Done;
        const routeDone = c.va.active ? c.cs.done : stage2Done; // asuransi butuh CS, umum tidak
        const allDone =
          routeDone && (!c.adminCot.required || c.adminCot.finalDone);

        if (
          c.status !== "Returned" &&
          c.status !== "Cancelled" &&
          c.status !== "Completed"
        ) {
          if (c.caseManager.done && allDone) {
            c.status = "Completed";
          } else {
            c.status = "InProgress";
          }
        }

        // current flow label for dashboard chip
        if (!c.caseManager.done) {
          if (!cmGateReady) {
            c.currentFlow = c.va.active
              ? "VA/Farmasi/AdminCOT"
              : "Kasir/ADRUCOT/Farmasi/AdminCOT";
          } else {
            c.currentFlow = "CaseManager";
          }
        } else if (!routeDone) {
          c.currentFlow = c.va.active ? "VA→CS" : "Kasir/ADRUCOT";
        } else if (c.adminCot.required && !c.adminCot.finalDone) {
          c.currentFlow = "AdminCOT (Final)";
        } else {
          c.currentFlow = "Selesai";
        }
      }

      function stepStatusFor(c, key) {
        if (c.status === "Draft") return key === "Nurse" ? "current" : "";
        if (c.status === "Cancelled") return "";
        const stage1Done = c.va.active
          ? c.va.stage1Done
          : c.kasir.stage1Done && c.adru.stage1Done;
        const stage2Done = c.va.active
          ? c.va.stage2Done
          : c.kasir.stage2Done && c.adru.stage2Done;
        const routeDone = c.va.active ? c.cs.done : stage2Done;
        const map = {
          Nurse: true,
          Unit1: stage1Done,
          CaseManager: c.caseManager.done,
          Unit2: c.caseManager.done ? stage2Done : false,
          CS: c.va.active ? c.cs.done : null,
          AdminCOTFinal: c.adminCot.required ? c.adminCot.finalDone : null,
          Selesai: c.status === "Completed",
        };
        const v = map[key];
        if (v === null) return "skip";
        if (v === true) return "done";
        // determine current
        if (key === "Unit1" && !stage1Done) return "current";
        if (key === "CaseManager" && stage1Done && !c.caseManager.done)
          return "current";
        if (key === "Unit2" && c.caseManager.done && !stage2Done)
          return "current";
        if (key === "CS" && c.va.active && stage2Done && !c.cs.done)
          return "current";
        if (
          key === "AdminCOTFinal" &&
          c.adminCot.required &&
          routeDone &&
          !c.adminCot.finalDone
        )
          return "current";
        return "";
      }

      function roleQueueMatch(c, role) {
        if (role === "Nurse") return true;
        if (c.status === "Cancelled" || c.status === "Draft") return false;
        if (role === "VA")
          return (
            (c.va.active && !c.va.stage1Done) ||
            (c.va.active && c.caseManager.done && !c.va.stage2Done)
          );
        if (role === "Kasir")
          return (
            c.kasir.active &&
            (!c.kasir.stage1Done || (c.caseManager.done && !c.kasir.stage2Done))
          );
        if (role === "ADRUCOT")
          return (
            c.adru.active &&
            (!c.adru.stage1Done || (c.caseManager.done && !c.adru.stage2Done))
          );
        if (role === "Farmasi") return !c.farmasi.done;
        if (role === "AdminCOT") {
          if (!c.adminCot.required) return false;
          if (!c.adminCot.prelimDone) return true;
          const stage2Done = c.va.active
            ? c.va.stage2Done
            : c.kasir.stage2Done && c.adru.stage2Done;
          const routeDone = c.va.active ? c.cs.done : stage2Done;
          return routeDone && !c.adminCot.finalDone;
        }
        if (role === "CaseManager") {
          const stage1Done = c.va.active
            ? c.va.stage1Done
            : c.kasir.stage1Done && c.adru.stage1Done;
          return (
            stage1Done &&
            c.farmasi.done &&
            (!c.adminCot.required || c.adminCot.prelimDone) &&
            !c.caseManager.done
          );
        }
        if (role === "CS") return c.cs.active && c.va.stage2Done && !c.cs.done;
        return false;
      }

      function submitCase(c) {

          units.push("Kasir");
          units.push("ADRU COT");

        units.push("Farmasi");
        if (c.adminCot.required) units.push("Admin COT");

      function vaAction(c, action, payload) {
        // VA-1: susun & ajukan estimasi ke Case Manager (estimasi ditarik dari DB, dapat diedit VA)
        if (action === "ajukan1") {
          c.va.stage1Done = true;
          c.va.golongan = payload.golongan || c.golongan || "";
          c.va.kelas = payload.kelas || c.kelasPerawatan || "";
          c.va.estimasiRincian = payload.rincian || [];
          c.va.estimasiTotal = payload.total || 0;
          c.va.estimasi = rupiah(payload.total || 0);
          c.va.stage1Note = payload.note || "";
          addAudit(
            c,
            "VA mengajukan estimasi biaya ke Case Manager",

          );
          recompute(c);
        }
        if (action === "revisi1") {
          c.va.stage1Done = false;
          c.status = "Returned";
          addAudit(c, "VA meminta revisi data ke Nurse", payload.note || "");
        }

        // VA-2: setelah acc Case Manager. "Mulai Verifikasi" = ajukan ke asuransi.
        if (action === "mulai") {
          c.va.decision = "DalamKonfirmasi";
          c.va.decisionNote = payload.note || "Pengajuan estimasi dikirim ke pihak asuransi.";
          addAudit(c, "VA mulai verifikasi — pengajuan estimasi ke asuransi", c.va.decisionNote);
        }
        if (action === "berkasBelumLengkap") {
          c.va.berkasBelumLengkap = true;
          c.va.decision = "DalamKonfirmasi";
          c.va.decisionNote = payload.note || "Menunggu kelengkapan berkas.";
          addAudit(c, "VA menandai berkas belum lengkap", `${payload.note || ""} (${(c.va.attachments || []).length} lampiran)`);
        }
        if (action === "berkasLengkap") {
          c.va.berkasBelumLengkap = false;
          addAudit(c, "Berkas dilengkapi — kembali ke VA untuk diproses", payload.note || "");
        }
        if (action === "disetujui") {
          c.va.decision = "Disetujui";
          c.va.decisionNote = payload.note || "";
          c.va.stage2Done = true;
          c.va.stage2Note = payload.note || "";

            `${payload.note || ""} | Notifikasi: Case Manager (in-app) & Operator (Telegram).`);
          recompute(c);
        }
        if (action === "pending") {
          c.va.decision = "Pending";
          c.va.decisionNote = payload.note || "";
          addAudit(c, "Asuransi: Pending (masih di pihak asuransi)", payload.note || "");
        }
        if (action === "ditolak") {
          c.va.decision = "Ditolak";
          c.va.decisionNote = payload.note || "";
          addAudit(c, "Asuransi menolak pengajuan (Ditolak)", payload.note || "");
        }
        if (action === "dalamKonfirmasi") {
          c.va.decision = "DalamKonfirmasi";
          c.va.decisionNote = payload.note || "";
          addAudit(c, "VA: Dalam Konfirmasi", payload.note || "");
        }
        if (action === "addAttachment") {
          c.va.attachments = c.va.attachments || [];
          c.va.attachments.push(payload.file);
          addAudit(c, "VA melampirkan berkas", payload.file.name);
        }
        if (action === "removeAttachment") {
          c.va.attachments.splice(payload.index, 1);

        saveCases();
      }
      function kasirAction(c, action, payload) {

      function farmasiAction(c, action, payload) {

      function adminCotAction(c, action, payload) {
        if (action === "prelim") {
          c.adminCot.alat = payload.alat || [];
          c.adminCot.prelimDone = true;
          saveAlatHistory(c.adminCot.alat); // simpan alat free-text ke history
          addAudit(
            c,
            "Admin COT menentukan kebutuhan alat (awal)",
            `Alat: ${(payload.alat || []).join(", ") || "-"}`,
          );
          recompute(c);
        }
        if (action === "final") {
          c.adminCot.jadwal = { tanggal: payload.tanggal, jam: payload.jam, ruang: payload.ruang };
          c.adminCot.finalDone = true;
          c.adminCot.decision = "Terjadwal";
          c.adminCot.prevJadwal = null;
          const edited = payload.edited ? ` (diubah dari permintaan awal: ${payload.note || "-"})` : " (sesuai permintaan awal)";
          addAudit(
            c,
            "Admin COT menetapkan jadwal final operasi",
            `${payload.tanggal || ""} ${payload.jam || ""} @ ${payload.ruang || ""}${edited}`,
          );
          recompute(c);
        }
        if (action === "dalamKonfirmasi") {
          c.adminCot.decision = "DalamKonfirmasi";
          c.adminCot.decisionNote = payload.note || "";
          addAudit(c, "Admin COT: Dalam Konfirmasi ke operator/unit terkait", payload.note || "");
        }
        if (action === "revisi") {
          // ada tambahan alat / perubahan golongan → kembalikan ke unit untuk revisi estimasi
          c.adminCot.decision = "Revisi";
          c.adminCot.decisionNote = payload.note || "";
          const target = payload.returnTo || (c.va.active ? "VA" : "Kasir");
          c.caseManager.done = false;
          if (target === "VA") c.va.stage1Done = false;
          else if (target === "Kasir") c.kasir.stage1Done = false;
          else if (target === "ADRUCOT") c.adru.stage1Done = false;
          addAudit(c, `Admin COT meminta revisi estimasi (tambahan alat/perubahan golongan) → ${returnUnitLabel(target)}`, payload.note || "");
          recompute(c);
        }
        if (action === "reschedule") {
          // simpan jadwal LAMA; status tetap Reschedule sampai tanggal lama lewat
          c.adminCot.prevJadwal = Object.assign({}, c.adminCot.jadwal);
          c.adminCot.jadwal = { tanggal: payload.tanggal, jam: payload.jam, ruang: payload.ruang };
          c.adminCot.decision = "Reschedule";
          c.adminCot.decisionNote = payload.note || "";
          addAudit(
            c,
            "Admin COT melakukan reschedule jadwal",
            `Dari ${c.adminCot.prevJadwal.tanggal || "-"} → ${payload.tanggal || "-"}. ${payload.note || ""} (status Reschedule hingga tanggal lama lewat)`,

      const RETURN_UNITS = [
        { id: "Nurse", label: "Nurse (data awal)" },

        { id: "Kasir", label: "Kasir (administrasi umum)" },

        const u = RETURN_UNITS.find((x) => x.id === id);

      const CS_FOLLOWUP_HOURS = 8; // TAT follow-up per pergantian shift
      function csAction(c, action, payload) {

          c.cs.decisionNote = payload.note || "Menunggu respon pasien.";
          addAudit(c, "CS menghubungi pasien — menunggu respon", `${payload.note || ""} (follow-up ≤ ${CS_FOLLOWUP_HOURS} jam)`);

          c.cs.done = true;
          c.cs.decision = "Disetujui";
          c.cs.decisionNote = payload.note || "";

        if (action === "dalamKonfirmasi") {
          // keberatan pasien → kembali ke Case Manager; status tetap Dalam Konfirmasi selama negosiasi

          c.cs.decisionNote = payload.note || "";
          c.caseManager.done = false;
          c.caseManager.decision = "DalamKonfirmasi";
          c.caseManager.instruksi = `Keberatan pasien (dari CS): ${payload.note || ""}`;
          c.caseManager.returnTo = "";
          addAudit(c, "CS: keberatan pasien — berkas dikembalikan ke Case Manager", payload.note || "");
          recompute(c);
        }
        if (action === "updateKeterangan") {
          c.cs.decisionNote = payload.note || "";
          const now = new Date();
          c.cs.contactAt = now.toISOString();
          c.cs.followUpDue = new Date(now.getTime() + CS_FOLLOWUP_HOURS * 3600 * 1000).toISOString();
          addAudit(c, "CS memperbarui keterangan follow-up (negosiasi)", payload.note || "");

        if (action === "batal") {
          c.cs.decision = "Batal";
          c.cs.decisionNote = payload.note || "";
          c.status = "Cancelled";
          addAudit(c, "CS: pasien membatalkan — proses dihentikan", payload.note || "");

        saveCases();

      /* ---------------- dynamic field helpers ---------------- */
      function dynListEditor(containerId, items, placeholder, labelPrefix) {
        function render() {
          const el = document.getElementById(containerId);
          el.innerHTML = items
            .map(
              (v, i) => `
      <div class="dyn-row">
        <span class="tag">${labelPrefix} ${i + 1}</span>
        <input value="${esc(v)}" data-i="${i}" placeholder="${placeholder}">
        ${items.length > 1 ? `<button type="button" class="btn btn-sm btn-danger" data-rm="${i}">Hapus</button>` : ""}
      </div>`,
            )
            .join("");
          el.querySelectorAll("input").forEach(
            (inp) =>
              (inp.oninput = () => {
                items[inp.dataset.i] = inp.value;
              }),
          );
          el.querySelectorAll("[data-rm]").forEach(
            (btn) =>
              (btn.onclick = () => {
                items.splice(parseInt(btn.dataset.rm), 1);
                render();
              }),
          );
        }
        render();
        return render;
      }

            id: "queue",

      function statusBadge(status, label) {
        return `<span class="badge-status st-${status}">${label || status}</span>`;
      }
      function caseStatusBadge(status) {
        return statusBadge(status, CASE_STATUS_LABEL[status] || status);
      }
      function flowChip(flow) {
        return `<span class="chip chip-flow">${esc(flow)}</span>`;
      }
      const VA_DECISION_LABEL = { Disetujui: "Disetujui", Pending: "Pending", Ditolak: "Ditolak", DalamKonfirmasi: "Dalam Konfirmasi" };
      // Badge keputusan VA + hover keterangan (title)
      function vaDecisionBadge(c) {
        if (!c.va.decision) return statusBadge("Menunggu");
        const lbl = VA_DECISION_LABEL[c.va.decision] || c.va.decision;
        const note = c.va.decisionNote ? ` title="${esc(c.va.decisionNote)}"` : "";
        return `<span class="badge-status st-${c.va.decision}"${note}>${lbl}${c.va.decisionNote ? " ⓘ" : ""}</span>`;
      }
      const CM_DECISION_LABEL = { Disetujui: "Disetujui", Revisi: "Revisi", DokumenBelumLengkap: "Dokumen Belum Lengkap" };
      function cmDecisionBadge(c) {
        if (!c.caseManager.decision) return statusBadge("Menunggu");
        const lbl = CM_DECISION_LABEL[c.caseManager.decision] || c.caseManager.decision;
        let tip = c.caseManager.instruksi || "";
        if (c.caseManager.decision === "Revisi" && c.caseManager.returnTo) tip = `→ ${returnUnitLabel(c.caseManager.returnTo)}. ${tip}`;
        const attr = tip ? ` title="${esc(tip)}"` : "";
        return `<span class="badge-status st-${c.caseManager.decision}"${attr}>${lbl}${tip ? " ⓘ" : ""}</span>`;
      }
      const ADMINCOT_LABEL = { Terjadwal: "Terjadwal", Reschedule: "Reschedule", DalamKonfirmasi: "Dalam Konfirmasi", Revisi: "Revisi" };
      function adminCotBadge(c) {
        if (!c.adminCot.required) return statusBadge("Belum", "Tidak diperlukan");
        if (!c.adminCot.finalDone) {
          if (c.adminCot.decision === "Revisi") return `<span class="badge-status st-Revisi"${c.adminCot.decisionNote ? ` title="${esc(c.adminCot.decisionNote)}"` : ""}>Revisi${c.adminCot.decisionNote ? " ⓘ" : ""}</span>`;
          return statusBadge(c.adminCot.prelimDone ? "DalamKonfirmasi" : "Menunggu", c.adminCot.prelimDone ? "Dalam Konfirmasi" : "Menunggu");
        }
        const eff = adminCotEffectiveStatus(c); // Terjadwal / Reschedule / DalamKonfirmasi
        const lbl = ADMINCOT_LABEL[eff] || eff;
        const attr = c.adminCot.decisionNote ? ` title="${esc(c.adminCot.decisionNote)}"` : "";
        return `<span class="badge-status st-${eff}"${attr}>${lbl}${c.adminCot.decisionNote ? " ⓘ" : ""}</span>`;
      }
      const CS_DECISION_LABEL = { Disetujui: "Disetujui", Reschedule: "Reschedule", DalamKonfirmasi: "Dalam Konfirmasi", Batal: "Batal" };

      }
      // Hitung estimasi jasa medis dari DB dan render tabel yang bisa diedit
      function renderVaEstimasi(c, golongan, kelas) {
        const est = estimasiJasaMedis(golongan, kelas);
        const box = document.getElementById("vaEstimasiBox");
        if (!box) return;
        if (!est) {
          box.innerHTML = `<div class="autofill-box"><span class="hint">Golongan <strong>${esc(golongan)}</strong> tidak ada di database tarif asuransi. Isi estimasi manual di bawah.</span>
            <div class="field" style="margin-top:8px;"><label>Total Estimasi (Rp)</label><input id="vaTotalManual" value="${c.va.estimasiTotal || ""}"></div></div>`;
          return;
        }
        const rows = est.rincian
          .map((r, i) => `<tr><td>${esc(r.komponen)}</td><td style="text-align:right;"><input class="vaKomp" data-i="${i}" data-komp="${esc(r.komponen)}" value="${r.nilai}" style="width:130px; text-align:right; padding:4px 6px;"></td></tr>`)
          .join("");
        box.innerHTML = `<div class="autofill-box"><table class="af-table">
            <tr style="font-weight:700;"><td>Komponen Jasa Medis</td><td style="text-align:right;">Nilai (Rp)</td></tr>${rows}
            <tr style="font-weight:800;"><td>TOTAL</td><td style="text-align:right;" id="vaTotalCell">${rupiah(est.total)}</td></tr>
          </table><span class="hint">Nilai dapat diedit VA. Total dihitung ulang otomatis.</span></div>`;
        box.querySelectorAll(".vaKomp").forEach((inp) => (inp.oninput = () => {
          let t = 0;
          box.querySelectorAll(".vaKomp").forEach((x) => (t += Number(x.value) || 0));
          document.getElementById("vaTotalCell").textContent = rupiah(t);
        }));
      }
      function collectVaEstimasi() {
        const box = document.getElementById("vaEstimasiBox");
        const manual = document.getElementById("vaTotalManual");
        if (manual) { const t = Number(manual.value) || 0; return { rincian: [{ komponen: "Estimasi Manual", nilai: t }], total: t }; }
        const rincian = [];
        let total = 0;
        box.querySelectorAll(".vaKomp").forEach((x) => { const v = Number(x.value) || 0; rincian.push({ komponen: x.dataset.komp, nilai: v }); total += v; });
        return { rincian, total };
      }

          box.appendChild(w);
        })();

        /* --- DPJP: autocomplete nama (list bebas, sementara belum ada DB nama) --- */
        function renderDpjpRows() {
          const el = document.getElementById("dpjpEditor");
          el.innerHTML = "";
          dpjpList.forEach((v, i) => {
            const row = document.createElement("div");
            row.className = "dyn-row";
            row.innerHTML = `<span class="tag">DPJP ${i + 1}</span>`;
            const ac = autocompleteInput({ value: v, list: [], placeholder: "Nama DPJP (mis. dr. Andi, Sp.B)", onInput: (val) => (dpjpList[i] = val) });
            ac.style.flex = "1";
            row.appendChild(ac);
            if (dpjpList.length > 1) {
              const rm = document.createElement("button");
              rm.type = "button"; rm.className = "btn btn-sm btn-danger"; rm.textContent = "Hapus";
              rm.onclick = () => { dpjpList.splice(i, 1); renderDpjpRows(); };
              row.appendChild(rm);
            }
            el.appendChild(row);
          });
        }
        renderDpjpRows();
        document.getElementById("addDpjp").onclick = () => { dpjpList.push(""); renderDpjpRows(); };

        /* --- Operator: nama + spesialisasi (autocomplete dari master spesialisasi) --- */
        function renderOpRows() {
          const el = document.getElementById("opEditor");
          el.innerHTML = "";
          opList.forEach((v, i) => {
            const row = document.createElement("div");
            row.className = "dyn-row";
            row.innerHTML = `<span class="tag">Op ${i + 1}</span>`;
            const acN = autocompleteInput({ value: v, list: [], placeholder: "Nama Operator", onInput: (val) => (opList[i] = val) });
            acN.style.flex = "1";
            const acS = autocompleteInput({ value: opSpesList[i] || "", list: COT_DB.master.spesialisasi, placeholder: "Spesialisasi", onInput: (val) => (opSpesList[i] = val), onPick: (val) => { opSpesList[i] = val; } });
            acS.style.flex = "1";
            row.appendChild(acN);
            row.appendChild(acS);
            if (opList.length > 1) {
              const rm = document.createElement("button");
              rm.type = "button"; rm.className = "btn btn-sm btn-danger"; rm.textContent = "Hapus";
              rm.onclick = () => { opList.splice(i, 1); opSpesList.splice(i, 1); renderOpRows(); };
              row.appendChild(rm);
            }
            el.appendChild(row);
          });
        }
        renderOpRows();
        document.getElementById("addOp").onclick = () => { opList.push(""); opSpesList.push(""); renderOpRows(); };

        /* --- Tindakan: baris pertama = dropdown paket (auto-fill), baris tambahan = free text --- */
        function renderTindakanRows() {
          const el = document.getElementById("tindakanEditor");
          el.innerHTML = "";
          tindakanList.forEach((v, i) => {
            const row = document.createElement("div");
            row.className = "dyn-row";
            row.innerHTML = `<span class="tag">Tindakan ${i + 1}</span>`;
            const ac = autocompleteInput({
              value: v, list: tindakanNames(), placeholder: "Pilih paket atau ketik bebas (non-paket)",
              onInput: (val) => { tindakanList[i] = val; applyTindakan(); },
              onPick: (val) => { tindakanList[i] = val; applyTindakan(); },
            });
            ac.style.flex = "1";
            row.appendChild(ac);
            if (tindakanList.length > 1) {
              const rm = document.createElement("button");
              rm.type = "button"; rm.className = "btn btn-sm btn-danger"; rm.textContent = "Hapus";
              rm.onclick = () => { tindakanList.splice(i, 1); renderTindakanRows(); applyTindakan(); };
              row.appendChild(rm);
            }
            el.appendChild(row);
          });
        }
        renderTindakanRows();
        document.getElementById("addTindakan").onclick = () => { tindakanList.push(""); renderTindakanRows(); };

        /* --- Auto-fill golongan, spesialisasi, paket BMHP dari tindakan pertama yang cocok --- */
        function applyTindakan() {
          const matched = tindakanList.map(findTindakan).find(Boolean);
          const golSel = document.getElementById("golonganSel");
          const spesInput = document.getElementById("spesialisasiInput");
          const bmhpBox = document.getElementById("bmhpAutofill");
          const afBox = document.getElementById("tindakanAutofill");

          if (matched) {
            golSel.value = matched.golongan;
            if (!spesInput.value.trim()) spesInput.value = matched.spesialisasi;
            const hargaText = matched.hargaUmum ? `${rupiah(matched.hargaUmum)} (Umum) · ${rupiah(matched.hargaBPJS)} (BPJS)` : "harga paket tidak tersedia";
            afBox.innerHTML = `<div class="autofill-box"><div class="af-head">
                <span class="af-pill gol">Golongan: ${esc(matched.golongan)}</span>
                <span class="af-pill spes">${esc(matched.spesialisasi)}</span>
                <span class="af-pill harga">Paket ${esc(matched.paket)}: ${hargaText}</span>
              </div><span class="hint">Data ini otomatis mengikuti Tindakan berpaket. Nurse cukup melengkapi Alat Khusus &amp; Tambahan di luar paket.</span></div>`;
            const rows = matched.bmhp.map((it) => `<tr><td>${esc(it.n)}</td><td>${it.q || "-"}</td><td>${rupiah(it.h)}</td></tr>`).join("");
            bmhpBox.innerHTML = `<div class="autofill-box"><table class="af-table">
                <tr style="font-weight:700;"><td>Item BMHP (paket ${esc(matched.paket)})</td><td>Qty</td><td>Harga satuan</td></tr>${rows}
              </table></div>`;
          } else {
            const anyText = tindakanList.some((x) => x && x.trim());
            if (anyText) {
              golSel.value = "NON GOLONGAN";
              afBox.innerHTML = `<div class="autofill-box"><span class="hint">Tindakan tidak terdaftar di database paket → <strong>Non Golongan</strong>. Estimasi biaya akan diproses oleh <strong>Kasir</strong>.</span></div>`;
            } else {
              afBox.innerHTML = "";
            }
            bmhpBox.innerHTML = `<span class="af-empty">Pilih Tindakan berpaket untuk menampilkan paket BMHP.</span>`;
          }
        }

        /* --- No. RM lookup dari master pasien --- */
        function doRmLookup() {
          const rm = document.getElementById("rmInput").value.trim();
          const hint = document.getElementById("rmHint");
          if (!rm) { hint.textContent = ""; return; }
          const p = lookupPatient(rm);
          if (p) {
            document.getElementById("namaInput").value = p.nama || "";
            document.getElementById("jkInput").value = p.jenisKelamin || "L";
            if (p.tglLahir) { const [y, m, d] = p.tglLahir.split("-"); document.getElementById("dobY").value = y || ""; document.getElementById("dobM").value = m || ""; document.getElementById("dobD").value = d || ""; }
            hint.textContent = "✓ Data pasien ditemukan & diisi otomatis.";
          } else {
            hint.textContent = "Pasien baru (belum ada di master).";
          }
        }
        document.getElementById("rmLookup").onclick = doRmLookup;
        document.getElementById("rmInput").onblur = doRmLookup;

        /* --- Anestesi: tampilkan free text bila "Lainnya" --- */
        const anestesiSel = document.getElementById("anestesiSel");
        anestesiSel.onchange = () => { document.getElementById("anestesiLainnyaWrap").style.display = anestesiSel.value === "Lainnya" ? "block" : "none"; };

        /* --- Alat Khusus editor --- */
        function renderAlat() {
          document.getElementById("alatEditor").innerHTML =
            alat.map((a, i) => `<div class="dyn-row"><span class="tag">Alat ${i + 1}</span><input value="${esc(a)}" data-i="${i}" placeholder="Nama alat khusus"><button type="button" class="btn btn-sm btn-danger" data-rm="${i}">Hapus</button></div>`).join("") ||
            `<span class="footer-hint">Belum ada alat khusus. (Umumnya ditambahkan Admin COT)</span>`;
          document.querySelectorAll("#alatEditor input").forEach((inp) => (inp.oninput = () => { alat[inp.dataset.i] = inp.value; }));
          document.querySelectorAll("#alatEditor [data-rm]").forEach((btn) => (btn.onclick = () => { alat.splice(parseInt(btn.dataset.rm), 1); renderAlat(); }));
        }
        renderAlat();
        document.getElementById("addAlat").onclick = () => { alat.push(""); renderAlat(); };

        function renderTambahan() {
          document.getElementById("tambahanEditor").innerHTML =
            tambahan
              .map(
                (t, i) => `
      <div class="dyn-row">
        <span class="tag">No. ${i + 1}</span>
        <input value="${esc(t.jenis)}" data-f="jenis" data-i="${i}" placeholder="Jenis Obat/BMHP">
        <input value="${esc(t.spesifikasi)}" data-f="spesifikasi" data-i="${i}" placeholder="Spesifikasi/Merk">
        <button type="button" class="btn btn-sm btn-danger" data-rm="${i}">Hapus</button>
      </div>`,
              )
              .join("") ||
            `<span class="footer-hint">Belum ada item tambahan.</span>`;
          document.querySelectorAll("#tambahanEditor input").forEach(
            (inp) =>
              (inp.oninput = () => {
                tambahan[inp.dataset.i][inp.dataset.f] = inp.value;
              }),
          );
          document.querySelectorAll("#tambahanEditor [data-rm]").forEach(
            (btn) =>
              (btn.onclick = () => {
                tambahan.splice(parseInt(btn.dataset.rm), 1);
                renderTambahan();
              }),
          );
        }
        renderTambahan();
        document.getElementById("addTambahan").onclick = () => {
          tambahan.push({ jenis: "", spesifikasi: "" });
          renderTambahan();
        };

        function toggleWrap(selId, wrapId, triggerValue) {
          const sel = document.getElementById(selId),
            wrap = document.getElementById(wrapId);
          const fn = () => {
            wrap.style.display = sel.value === triggerValue ? "block" : "none";
          };
          sel.onchange = fn;
          fn();
        }
        toggleWrap("lokasiTindakanSel", "lokasiLainnyaWrap", "Lainnya");
        toggleWrap("asalPasienSel", "asalLainnyaWrap", "Lainnya");
        toggleWrap("ruangPascaSel", "ruangPascaLainnyaWrap", "Lainnya");
        toggleWrap("penjaminSel", "guarantorWrap", "Asuransi");

        document.getElementById("caseForm").onsubmit = (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const data = Object.fromEntries(fd.entries());
          data.dpjpList = dpjpList.filter((x) => x.trim());
          // gabungkan nama operator + spesialisasi
          data.operatorList = opList.map((n) => n.trim()).filter(Boolean);
          data.operatorSpesialisasi = opSpesList.map((s) => (s || "").trim());
          data.tindakanList = tindakanList.filter((x) => x.trim());

          // Tanggal lahir dari 3 kolom ketik -> ISO yyyy-mm-dd
          const dY = document.getElementById("dobY").value.trim();
          const dM = document.getElementById("dobM").value.trim();
          const dD = document.getElementById("dobD").value.trim();
          data.tglLahir = (dY && dM && dD) ? `${dY.padStart(4, "0")}-${dM.padStart(2, "0")}-${dD.padStart(2, "0")}` : "";

          // Anestesi: pakai free text bila "Lainnya"
          if (data.anestesi === "Lainnya") data.anestesi = (data.anestesiLainnya || "").trim() || "Dalam Konfirmasi";
          delete data.anestesiLainnya;

          data.jenisOperasi = Array.from(document.querySelectorAll(".jenisOperasiChk:checked")).map((x) => x.value);

          // Auto-fill dari tindakan berpaket
          const matched = data.tindakanList.map(findTindakan).find(Boolean);
          if (matched) {
            data.paketBMHP = matched.paket;
            data.paketBMHPItems = matched.bmhp;
            data.hargaPaketUmum = matched.hargaUmum;
            data.hargaPaketBPJS = matched.hargaBPJS;
          } else {
            data.paketBMHP = "Non-Paket";
            data.paketBMHPItems = [];
          }
          data.golongan = document.getElementById("golonganSel").value;
          data.nonPaketBMHP = [];
          data.alatKhusus = alat.filter((a) => a.trim());
          data.tambahanBMHP = tambahan.filter((t) => t.jenis.trim());

          if (!data.dpjpList.length) { toast("Minimal 1 DPJP wajib diisi", "warn"); return; }
          if (!data.tindakanList.length) { toast("Minimal 1 Tindakan wajib diisi", "warn"); return; }

          savePatient(data.rm, data); // simpan ke master pasien
          const c = createCase(data);
          toast(`Case ${c.id} tersimpan sebagai Draft`, "ok");
          state.activeCaseId = c.id;
          state.page = "detail";
          render();
        };
      }

      function renderList(pageType) {
        const all =
          pageType === "queue"
            ? cases.filter((c) => roleQueueMatch(c, state.role))
            : cases.slice();
        let filtered = all
          .filter((c) => {
            const q = state.search.toLowerCase();
            const matchQ =
              !q ||
              c.id.toLowerCase().includes(q) ||
              (c.nama || "").toLowerCase().includes(q) ||
              (c.dpjpList || []).join(" ").toLowerCase().includes(q);
            const matchS =
              !state.statusFilter || c.status === state.statusFilter;
            return matchQ && matchS;
          })
          .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        const title =
          pageType === "queue"
            ? `Antrian untuk role: ${ROLES.find((r) => r.id === state.role).label}`
            : "Semua Case";
        document.getElementById("content").innerHTML =
          `<div class="card"><h3>${title}</h3>
    <div class="search-bar">
      <input id="searchInput" placeholder="Cari Case ID / Nama Pasien / DPJP..." value="${esc(state.search)}">
      <select id="statusFilter"><option value="">Semua Status</option>${CASE_STATUS_LIST.map((s) => `<option value="${s}" ${state.statusFilter === s ? "selected" : ""}>${CASE_STATUS_LABEL[s]}</option>`).join("")}</select>
    </div>
    ${renderTable(filtered)}</div>`;
        attachRowClicks();
        document.getElementById("searchInput").oninput = (e) => {
          state.search = e.target.value;
          renderList(pageType);
        };
        document.getElementById("statusFilter").onchange = (e) => {
          state.statusFilter = e.target.value;
          renderList(pageType);
        };
      }

            const files = Array.from(e.target.files || []);

            if (!pending) return;
            files.forEach((f) => {
              const reader = new FileReader();
              reader.onload = () => {
                vaAction(c, "addAttachment", { file: { name: f.name, size: f.size, data: reader.result } });
                if (--pending === 0) { toast("Lampiran ditambahkan", "ok"); renderDetail(); }
              };
              reader.readAsDataURL(f);
            });
          };
        document.querySelectorAll("[data-rmatt]").forEach((el) => (el.onclick = () => {
          vaAction(c, "removeAttachment", { index: parseInt(el.dataset.rmatt) });
          renderDetail();

        if (document.getElementById("vaMulai"))
          document.getElementById("vaMulai").onclick = () => {

        if (document.getElementById("vaBerkasBL"))

            toast("Ditandai: berkas belum lengkap", "warn");
            renderDetail();
          };
        if (document.getElementById("vaBerkasL"))
          document.getElementById("vaBerkasL").onclick = () => {
            vaAction(c, "berkasLengkap", { note: vaNote2() });
            toast("Berkas ditandai lengkap", "ok");
            renderDetail();
          };
        if (document.getElementById("vaDisetujui"))

            vaAction(c, "disetujui", { note: vaNote2() });
            toast("Disetujui — notifikasi terkirim, diteruskan ke CS", "ok");
            renderDetail();
          };
        if (document.getElementById("vaPending"))
          document.getElementById("vaPending").onclick = () => {
            if (!requireNote2("alasan pending")) return;
            vaAction(c, "pending", { note: vaNote2() });
            toast("Status: Pending", "warn");

        if (document.getElementById("vaDitolak"))

        if (document.getElementById("kMulai"))

        if (document.getElementById("kSelesai1"))

                document.getElementById("kNote").value ||
                "Perlu perbaikan data.",
            });
            toast("Dikembalikan ke Nurse", "warn");
            renderDetail();
          };
        if (document.getElementById("kSelesai2"))
          document.getElementById("kSelesai2").onclick = () => {
            kasirAction(c, "selesai2", {
              note: document.getElementById("kNote2").value,
            });
            toast("Administrasi akhir selesai", "ok");
            renderDetail();
          };

        if (document.getElementById("aMulai"))
          document.getElementById("aMulai").onclick = () => {
            adruAction(c, "mulai", {});
            renderDetail();
          };
        if (document.getElementById("aAjukan"))
          document.getElementById("aAjukan").onclick = () => {
            adruAction(c, "ajukan1", {
              note: document.getElementById("aNote").value,
              estimasi: document.getElementById("aBiaya").value,
            });
            toast("Estimasi diajukan ke Case Manager", "ok");
            renderDetail();
          };
        if (document.getElementById("aRevisi"))
          document.getElementById("aRevisi").onclick = () => {
            adruAction(c, "revisi1", {
              note:
                document.getElementById("aNote").value ||
                "Perlu perbaikan data.",
            });
            toast("Dikembalikan ke Nurse", "warn");
            renderDetail();
          };
        if (document.getElementById("aKonfirm2"))
          document.getElementById("aKonfirm2").onclick = () => {
            adruAction(c, "konfirmasi2", {
              note: document.getElementById("aNote2").value,
            });
            toast("Pasien setuju — diteruskan ke Admin COT", "ok");
            renderDetail();
          };

        if (document.getElementById("nonPaketEdit")) {
          let tmpNonPaket = (c.nonPaketBMHP || []).slice();
          let tmpTambahan = (c.tambahanBMHP || []).map((x) => ({ ...x }));
          document.getElementById("nonPaketEdit").innerHTML =
            NONPAKET_BMHP_DB.map(
              (b) =>
                `<label><input type="checkbox" class="fNonPaketChk" value="${b}" ${tmpNonPaket.includes(b) ? "checked" : ""}> ${b}</label>`,
            ).join("");
          function renderTF() {
            document.getElementById("tambahanFEdit").innerHTML =
              tmpTambahan
                .map(
                  (t, i) => `
        <div class="dyn-row"><input value="${esc(t.jenis)}" data-f="jenis" data-i="${i}" placeholder="Jenis Obat/BMHP"><input value="${esc(t.spesifikasi)}" data-f="spesifikasi" data-i="${i}" placeholder="Spesifikasi"><button type="button" class="btn btn-sm btn-danger" data-rm="${i}">Hapus</button></div>`,
                )
                .join("") ||
              '<span class="footer-hint">Tidak ada item tambahan.</span>';
            document.querySelectorAll("#tambahanFEdit input").forEach(
              (inp) =>
                (inp.oninput = () => {
                  tmpTambahan[inp.dataset.i][inp.dataset.f] = inp.value;
                }),
            );
            document.querySelectorAll("#tambahanFEdit [data-rm]").forEach(
              (btn) =>
                (btn.onclick = () => {
                  tmpTambahan.splice(parseInt(btn.dataset.rm), 1);
                  renderTF();
                }),
            );
          }
          renderTF();
          document.getElementById("addTambahanF").onclick = () => {
            tmpTambahan.push({ jenis: "", spesifikasi: "" });
            renderTF();
          };
          document.getElementById("fMulai").onclick = () => {
            farmasiAction(c, "mulai", {});
            renderDetail();
          };
          document.getElementById("fSetuju").onclick = () => {
            const npk = Array.from(
              document.querySelectorAll(".fNonPaketChk:checked"),
            ).map((x) => x.value);
            farmasiAction(c, "update", {
              nonPaketBMHP: npk,
              tambahanBMHP: tmpTambahan.filter((t) => t.jenis.trim()),
            });
            farmasiAction(c, "setuju", {
              note: document.getElementById("fNote").value,
            });
            toast("Paket BMHP disetujui", "ok");
            renderDetail();
          };
          document.getElementById("fRevisi").onclick = () => {
            const npk = Array.from(
              document.querySelectorAll(".fNonPaketChk:checked"),
            ).map((x) => x.value);
            farmasiAction(c, "update", {
              nonPaketBMHP: npk,
              tambahanBMHP: tmpTambahan.filter((t) => t.jenis.trim()),
            });
            farmasiAction(c, "revisi", {
              note:
                document.getElementById("fNote").value ||
                "Paket BMHP perlu direvisi.",
            });
            toast("Meminta revisi paket BMHP", "warn");
            renderDetail();
          };
        }

        // --- Alat editor (free text + history) ---
        if (document.getElementById("acAlatEditor")) {
          let acAlat = (c.adminCot.alat && c.adminCot.alat.length) ? c.adminCot.alat.slice() : [""];
          const hist = loadAlatHistory();
          const drawAlat = () => {
            const el = document.getElementById("acAlatEditor");
            el.innerHTML = "";
            acAlat.forEach((v, i) => {
              const row = document.createElement("div");
              row.className = "dyn-row";
              row.innerHTML = `<span class="tag">Alat ${i + 1}</span>`;
              const ac = autocompleteInput({ value: v, list: hist, placeholder: "Pilih dari history atau ketik alat baru", onInput: (val) => (acAlat[i] = val), onPick: (val) => (acAlat[i] = val) });
              ac.style.flex = "1";
              row.appendChild(ac);
              if (acAlat.length > 1) {
                const rm = document.createElement("button");
                rm.type = "button"; rm.className = "btn btn-sm btn-danger"; rm.textContent = "Hapus";
                rm.onclick = () => { acAlat.splice(i, 1); drawAlat(); };
                row.appendChild(rm);
              }
              el.appendChild(row);
            });
          };
          drawAlat();
          document.getElementById("acAddAlat").onclick = () => { acAlat.push(""); drawAlat(); };
          document.getElementById("acPrelim").onclick = () => {
            const alat = acAlat.map((x) => x.trim()).filter(Boolean);
            adminCotAction(c, "prelim", { alat });
            toast("Kebutuhan alat awal ditentukan", "ok");
            renderDetail();
          };
        }

        // --- Jadwal: approve / edit / revisi ---
        function acSetJadwal(edited) {
          const tanggal = document.getElementById("acTanggal").value,
            jam = document.getElementById("acJam").value,
            ruang = document.getElementById("acRuang").value,
            note = document.getElementById("acJadwalNote") ? document.getElementById("acJadwalNote").value.trim() : "";
          if (!tanggal || !ruang) { toast("Tanggal & ruang wajib diisi", "warn"); return; }
          if (edited && !note) { toast("Keterangan wajib diisi bila mengubah jadwal", "warn"); return; }
          adminCotAction(c, "final", { tanggal, jam, ruang, edited, note });
          toast(edited ? "Jadwal ditetapkan (diubah)" : "Jadwal disetujui sesuai permintaan", "ok");
          renderDetail();
        }
        if (document.getElementById("acApprove")) document.getElementById("acApprove").onclick = () => acSetJadwal(false);
        if (document.getElementById("acFinal")) document.getElementById("acFinal").onclick = () => acSetJadwal(true);
        if (document.getElementById("acRevisi"))
          document.getElementById("acRevisi").onclick = () => {
            const note = document.getElementById("acJadwalNote") ? document.getElementById("acJadwalNote").value.trim() : "";
            if (!note) { toast("Keterangan revisi wajib diisi", "warn"); return; }
            adminCotAction(c, "revisi", { note, returnTo: c.va.active ? "VA" : "Kasir" });
            toast("Dikembalikan untuk revisi estimasi", "warn");
            renderDetail();
          };

        // --- Setelah jadwal final: reschedule / dalam konfirmasi / revisi ---
        const acNote2 = () => (document.getElementById("acNote2") ? document.getElementById("acNote2").value.trim() : "");
        if (document.getElementById("acReschedule"))
          document.getElementById("acReschedule").onclick = () => {
            const t = prompt("Tanggal baru (YYYY-MM-DD):", c.adminCot.jadwal.tanggal || "");
            if (!t) return;
            adminCotAction(c, "reschedule", { tanggal: t, jam: c.adminCot.jadwal.jam, ruang: c.adminCot.jadwal.ruang, note: acNote2() || "Reschedule oleh Admin COT." });
            toast("Reschedule — status bertahan hingga tanggal lama lewat", "warn");
            renderDetail();
          };
        if (document.getElementById("acDalamKonf"))
          document.getElementById("acDalamKonf").onclick = () => {
            if (!acNote2()) { toast("Keterangan wajib diisi", "warn"); return; }
            adminCotAction(c, "dalamKonfirmasi", { note: acNote2() });
            toast("Status: Dalam Konfirmasi", "ok");
            renderDetail();
          };
        if (document.getElementById("acRevisi2"))
          document.getElementById("acRevisi2").onclick = () => {
            if (!acNote2()) { toast("Keterangan revisi wajib diisi", "warn"); return; }
            adminCotAction(c, "revisi", { note: acNote2(), returnTo: c.va.active ? "VA" : "Kasir" });
            toast("Revisi estimasi diminta", "warn");
            renderDetail();
          };

        if (document.getElementById("cmSetuju"))
          document.getElementById("cmSetuju").onclick = () => {
            caseManagerAction(c, "setuju", {
              note: document.getElementById("cmNote").value,
            });
            toast("Case Manager menyetujui case", "ok");
            renderDetail();
          };
        if (document.getElementById("cmRevisi"))
          document.getElementById("cmRevisi").onclick = () => {
            const note = document.getElementById("cmNote").value.trim();
            if (!note) { toast("Instruksi revisi wajib diisi", "warn"); return; }
            const returnTo = document.getElementById("cmReturnTo").value;
            caseManagerAction(c, "revisi", { note, returnTo });
            toast(`Dikembalikan untuk revisi → ${returnUnitLabel(returnTo)}`, "warn");
            renderDetail();
          };
        if (document.getElementById("cmDokBelum"))
          document.getElementById("cmDokBelum").onclick = () => {
            const note = document.getElementById("cmNote").value.trim();
            if (!note) { toast("Keterangan wajib diisi", "warn"); return; }
            caseManagerAction(c, "dokbelumlengkap", { note });
            toast("Ditandai dokumen belum lengkap", "warn");
            renderDetail();
          };

        const csNote = () => (document.getElementById("csNote") ? document.getElementById("csNote").value.trim() : "");
        function csReq(msg) { if (!csNote()) { toast("Keterangan wajib diisi: " + msg, "warn"); return false; } return true; }
        if (document.getElementById("csDownload"))
          document.getElementById("csDownload").onclick = () => downloadEstimasi(c);
        if (document.getElementById("csHubungi"))
          document.getElementById("csHubungi").onclick = () => {
            if (!csReq("catatan komunikasi")) return;
            csAction(c, "hubungi", { note: csNote() });
            toast("Follow-up dimulai — pengingat aktif", "ok");
            renderDetail();
          };
        if (document.getElementById("csUpdate"))
          document.getElementById("csUpdate").onclick = () => {
            if (!csReq("update negosiasi")) return;
            csAction(c, "updateKeterangan", { note: csNote() });
            toast("Keterangan diperbarui, timer di-reset", "ok");
            renderDetail();
          };
        if (document.getElementById("csDisetujui"))
          document.getElementById("csDisetujui").onclick = () => {
            csAction(c, "disetujui", { note: csNote() });
            toast("Pasien setuju — diteruskan ke Admin COT", "ok");
            renderDetail();
          };
        if (document.getElementById("csReschedule"))
          document.getElementById("csReschedule").onclick = () => {
            if (!csReq("alasan reschedule")) return;
            csAction(c, "reschedule", { note: csNote() });
            toast("Reschedule — notifikasi CM, Admin COT & VA", "warn");
            renderDetail();
          };
        if (document.getElementById("csDalamKonf"))
          document.getElementById("csDalamKonf").onclick = () => {
            if (!csReq("keberatan pasien")) return;
            csAction(c, "dalamKonfirmasi", { note: csNote() });
            toast("Dikembalikan ke Case Manager", "warn");
            renderDetail();
          };
        if (document.getElementById("csBatal"))
          document.getElementById("csBatal").onclick = () => {
            if (!csReq("alasan pembatalan")) return;
            csAction(c, "batal", { note: csNote() });
            toast("Case dibatalkan pasien", "warn");
            renderDetail();
          };
        // countdown timer follow-up
        if (document.getElementById("csTimer")) {
          const timerEl = document.getElementById("csTimer");
          const due = new Date(timerEl.dataset.due).getTime();
          const tick = () => {
            if (!document.getElementById("csTimer")) return; // sudah pindah halaman
            const diff = due - Date.now();
            if (diff <= 0) {
              timerEl.style.background = "var(--red-100)";
              timerEl.innerHTML = "⏰ <strong>Waktu follow-up terlewati.</strong> Segera hubungi & update respon pasien (pergantian shift).";
            } else {
              const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
              timerEl.innerHTML = `⏳ Batas follow-up berikutnya: <strong>${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}</strong> — ingatkan tiap pergantian shift.`;
              setTimeout(tick, 1000);
            }
          };
          tick();
        }

        if (document.getElementById("cancelBtn"))
          document.getElementById("cancelBtn").onclick = () =>
            openCancelModal(c);
      }

      function openEditModal(c) {
        const root = document.getElementById("modalRoot");
        root.innerHTML = `<div class="modal-overlay" id="ovl"><div class="modal">
    <h3>Edit Data Case ${c.id}</h3>
    <form id="editForm">
      <div class="form-grid">
        <div class="field"><label class="req">No. RM</label><input name="rm" value="${esc(c.rm)}" required></div>
        <div class="field"><label class="req">Nama Pasien</label><input name="nama" value="${esc(c.nama)}" required></div>
        <div class="field full"><label class="req">Diagnosis</label><textarea name="diagnosis" required>${esc(c.diagnosis)}</textarea></div>
        <div class="field full"><label>DPJP (pisahkan koma jika lebih dari satu)</label><input name="dpjpStr" value="${esc((c.dpjpList || []).join(", "))}"></div>
        <div class="field full"><label>Operator (pisahkan koma jika lebih dari satu)</label><input name="operatorStr" value="${esc((c.operatorList || []).join(", "))}"></div>
        <div class="field full"><label>Tindakan (pisahkan koma jika lebih dari satu)</label><input name="tindakanStr" value="${esc((c.tindakanList || []).join(", "))}"></div>
        <div class="field"><label class="req">Lokasi Tindakan</label>
          <select name="lokasiTindakan" required><option value="COT" ${c.lokasiTindakan === "COT" ? "selected" : ""}>COT</option><option value="OT IGD" ${c.lokasiTindakan === "OT IGD" ? "selected" : ""}>OT IGD</option><option value="Cathlab" ${c.lokasiTindakan === "Cathlab" ? "selected" : ""}>Cathlab</option><option value="Endoskopi" ${c.lokasiTindakan === "Endoskopi" ? "selected" : ""}>Endoskopi</option><option value="Lainnya" ${c.lokasiTindakan === "Lainnya" ? "selected" : ""}>Lainnya</option></select></div>
        <div class="field"><label class="req">Penjamin</label>
          <select name="penjamin" required><option value="Umum" ${c.penjamin === "Umum" ? "selected" : ""}>Umum</option><option value="Asuransi" ${c.penjamin === "Asuransi" ? "selected" : ""}>Asuransi</option></select></div>
      </div>
      <div class="btn-row"><button type="button" class="btn" id="cancelModal">Batal</button><button type="submit" class="btn btn-primary">Simpan Perubahan</button></div>
    </form>
  </div></div>`;
        document.getElementById("cancelModal").onclick = () =>
          (root.innerHTML = "");
        document.getElementById("editForm").onsubmit = (e) => {
          e.preventDefault();
          const fd = Object.fromEntries(new FormData(e.target).entries());
          fd.dpjpList = fd.dpjpStr
            .split(",")
            .map((s) => s.trim())
            .filter(Boolean);
          fd.operatorList = fd.operatorStr
            .split(",")
            .map((s) => s.trim())
            .filter(Boolean);
          fd.tindakanList = fd.tindakanStr
            .split(",")
            .map((s) => s.trim())
            .filter(Boolean);
          delete fd.dpjpStr;
          delete fd.operatorStr;
          delete fd.tindakanStr;
          updateDraft(c, fd);
          root.innerHTML = "";
          toast("Data diperbarui", "ok");
          renderDetail();
        };
      }
      function openCancelModal(c) {
        const root = document.getElementById("modalRoot");
        root.innerHTML = `<div class="modal-overlay" id="ovl"><div class="modal">
    <h3>Batalkan Case ${c.id}?</h3>
    <p class="footer-hint">Case yang dibatalkan tidak dapat diproses kembali dan akan tercatat di audit log.</p>
    <div class="field"><label>Alasan pembatalan</label><textarea id="cancelNote"></textarea></div>
    <div class="btn-row"><button class="btn" id="cancelNo">Batal</button><button class="btn btn-danger" id="cancelYes">Ya, Batalkan Case</button></div>
  </div></div>`;
        document.getElementById("cancelNo").onclick = () =>
          (root.innerHTML = "");
        document.getElementById("cancelYes").onclick = () => {
          cancelCase(
            c,
            document.getElementById("cancelNote").value ||
              "Tidak ada alasan diberikan.",
          );
          root.innerHTML = "";
          toast("Case dibatalkan", "warn");
          renderDetail();
        };
      }

      function render() {
        renderSidebar();
        const titles = {
          dashboard: "Dashboard",
          newcase: "Buat Case Baru",
          queue: "Antrian Saya",
          allcases: "Semua Case",
          roles: "Role & Status Reference",
          detail: "Detail Case",
        };
        document.getElementById("pageTitle").textContent =
          titles[state.page] || "Dashboard";
        if (state.page === "dashboard") renderDashboard();
        else if (state.page === "newcase") renderNewCase();
        else if (state.page === "queue") renderList("queue");
        else if (state.page === "allcases") renderList("all");
        else if (state.page === "roles") renderRoles();
        else if (state.page === "detail") renderDetail();
      }
      function tickClock() {
        document.getElementById("clock").textContent =
          new Date().toLocaleString("id-ID", {
            weekday: "short",
            day: "2-digit",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
      }
      setInterval(tickClock, 1000);
      tickClock();
      render();
    </script>
  </body>
</html>
