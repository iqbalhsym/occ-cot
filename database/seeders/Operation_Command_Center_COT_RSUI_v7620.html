          if (document.getElementById("emKelas")) document.getElementById("emKelas").onchange = (e) => { kelas = e.target.value; drawPanel(); };
          panel.querySelectorAll(".emJasaKomp").forEach((el) => (el.oninput = () => { jasaRincian[el.dataset.i].komponen = el.value; }));
          panel.querySelectorAll(".emJasaNilai").forEach((el) => (el.oninput = () => { jasaRincian[el.dataset.i].nilai = Number(el.value) || 0; updateTotalsOnly(); }));
          panel.querySelectorAll(".emJasaDel").forEach((el) => (el.onclick = () => { jasaRincian.splice(Number(el.dataset.i), 1); drawPanel(); }));
          panel.querySelectorAll(".emBmhpNama").forEach((el) => (el.oninput = () => { bmhpItems[el.dataset.i].n = el.value; }));
          panel.querySelectorAll(".emBmhpQty").forEach((el) => (el.oninput = () => { const v = Number(el.value); bmhpItems[el.dataset.i].q = isNaN(v) ? el.value : v; updateTotalsOnly(); }));
          panel.querySelectorAll(".emBmhpHarga").forEach((el) => (el.oninput = () => { bmhpItems[el.dataset.i].h = Number(el.value) || 0; updateTotalsOnly(); }));

          panel.querySelectorAll(".emAlatNama").forEach((el) => (el.oninput = () => { alatItems[el.dataset.i].nama = el.value; }));
          panel.querySelectorAll(".emAlatHarga").forEach((el) => (el.oninput = () => { alatItems[el.dataset.i].harga = Number(el.value) || 0; updateTotalsOnly(); }));
          panel.querySelectorAll(".emAlatDel").forEach((el) => (el.onclick = () => { alatItems.splice(Number(el.dataset.i), 1); drawPanel(); }));

          document.getElementById("emBmhpAdd").onclick = () => { bmhpItems.push({ n: "", h: 0, q: 1 }); drawPanel(); };

          document.getElementById("emDownloadBtn").onclick = () => {
            if (!ec.nama.trim()) { toast("Isi Nama Pasien dulu sebelum mengunduh estimasi", "warn"); return; }
            const golonganFinal = (cmMulti && ec.operatorGolonganFinal && ec.operatorGolonganFinal.length)
              ? ec.operatorGolonganFinal.reduce((best, g) => (golonganRank(g) > golonganRank(best) ? g : best), ec.operatorGolonganFinal[0])
              : golongan;
            const docCase = Object.assign({}, ec, {
              id: "MANDIRI-" + Date.now(),
              golongan: golonganFinal,
              kelasPerawatan: kelas,
              lokasiTindakan: "",
              paketBMHPItems: bmhpItems.filter((it) => it.n),
              tambahanBMHP: [],
              va: { active: isAsuransi, golongan: golonganFinal, kelas, estimasiRincian: jasaRincian.filter((r) => r.komponen), estimasiTotal: jasaTotal },
              adru: { estimasi: "" }, kasir: { estimasi: "" },
              adminCot: { alat: alatItems.filter((a) => a.nama) },

          };
        }
        drawPanel();
      }

        const roleNow = effectiveRole();

        function compressImageFile(file, maxDim, quality) {
          return new Promise((resolve) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
              let { width, height } = img;
              if (width > maxDim || height > maxDim) {
                if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
                else { width = Math.round((width * maxDim) / height); height = maxDim; }
              }
              const canvas = document.createElement("canvas");
              canvas.width = width; canvas.height = height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, width, height);
              URL.revokeObjectURL(url);
              resolve(canvas.toDataURL("image/jpeg", quality));

            img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };

        if (document.getElementById("cmSaveDataBtn"))
          document.getElementById("cmSaveDataBtn").onclick = () => {
            const before = { nama: c.nama, rm: c.rm, tglLahir: c.tglLahir, diagnosis: c.diagnosis, tindakanList: (c.tindakanList || []).slice() };
            c.nama = document.getElementById("cmNama").value.trim();
            c.rm = document.getElementById("cmRm").value.trim();
            c.tglLahir = document.getElementById("cmTglLahir").value.trim();
            c.diagnosis = document.getElementById("cmDiagnosis").value.trim();
            c.tindakanList = document.getElementById("cmTindakan").value.split("\n").map((x) => x.trim()).filter(Boolean);
            addAudit(c, "Case Manager mengedit data pasien/tindakan (akses penuh)",
              `Sebelum: ${before.nama} / RM ${before.rm} / [${before.tindakanList.join(", ")}] → Sesudah: ${c.nama} / RM ${c.rm} / [${c.tindakanList.join(", ")}]`);
            saveCases();
            toast("Data pasien & tindakan diperbarui oleh Case Manager", "ok");
            renderDetail();
          };

        const csNote = () => (document.getElementById("csNote") ? document.getElementById("csNote").value.trim() : "");
        function csReq(msg) { if (!csNote()) { toast("Keterangan wajib diisi: " + msg, "warn"); return false; } return true; }
        if (document.getElementById("csHubungi"))
          document.getElementById("csHubungi").onclick = () => {
            if (!csReq("catatan komunikasi")) return;
            csAction(c, "hubungi", { note: csNote() });
            toast("Follow-up dimulai — pengingat aktif", "ok");
            renderDetail();
          };
        if (document.getElementById("csDisetujui"))
          document.getElementById("csDisetujui").onclick = () => {
            csAction(c, "disetujui", { note: csNote() });
            toast("Pasien setuju — diteruskan ke Admin COT", "ok");
            renderDetail();
          };
        if (document.getElementById("csRevisi"))
          document.getElementById("csRevisi").onclick = () => {
            if (!csReq("alasan revisi")) return;
            const returnTo = document.getElementById("csReturnTo") ? document.getElementById("csReturnTo").value : "CaseManager";
            csAction(c, "revisi", { note: csNote(), returnTo });
            toast(`Dikembalikan untuk revisi → ${returnTo === "CaseManager" ? "Case Manager" : returnUnitLabel(returnTo)}`, "warn");
            renderDetail();
          };
        if (document.getElementById("csBatal"))
          document.getElementById("csBatal").onclick = () => {
            if (!csReq("alasan pembatalan")) return;
            csAction(c, "batal", { note: csNote() });
            toast("Case dibatalkan pasien", "warn");
            renderDetail();
          };

      }

      // Popup ringkas saat blok operasi di Monitoring Penjadwalan COT diklik (sesuai spesifikasi brief),
      // dengan tombol untuk lanjut ke halaman Detail Case penuh bila diperlukan.
      function openOpDetailModal(c) {
        const root = document.getElementById("modalRoot");
        const [sMs, eMs] = slotRange(c);
        const st = deriveOpStatus(c);
        const alatList = (c.adminCot.alat || []).map((a) => (typeof a === "string" ? a : a.nama)).filter(Boolean);
        root.innerHTML = `<div class="modal-overlay" id="ovl"><div class="modal" style="max-width:520px;">
    <h3>${esc(c.nama)} <span class="badge-status ${OP_STATUS_COLOR[st] || "st-Menunggu"}" style="font-size:11px;">${esc(st)}</span></h3>
    <table style="width:100%;">
      <tr><td class="footer-hint">No. RM</td><td>${esc(c.rm)}</td></tr>
      <tr><td class="footer-hint">Dokter Operator</td><td>${listOrDash(c.operatorList)}</td></tr>
      <tr><td class="footer-hint">Dokter Anestesi</td><td>${esc(c.dokterAnestesi) || "-"} (${esc(c.anestesi) || "-"})</td></tr>
      <tr><td class="footer-hint">Diagnosis</td><td>${esc(c.diagnosis) || "-"}</td></tr>
      <tr><td class="footer-hint">Jenis Tindakan</td><td>${listOrDash(c.tindakanList)}</td></tr>
      <tr><td class="footer-hint">Golongan Operasi</td><td>${esc(c.golongan) || "-"}</td></tr>
      <tr><td class="footer-hint">Tanggal</td><td>${esc(c.adminCot.jadwal.tanggal)}</td></tr>
      <tr><td class="footer-hint">Jam Mulai</td><td>${esc(c.adminCot.jadwal.jam)}</td></tr>
      <tr><td class="footer-hint">Estimasi Operasi</td><td>${getEffectiveDurasiJam(c)} jam</td></tr>
      <tr><td class="footer-hint">Turn Over Time</td><td>${getTOT()} menit</td></tr>
      <tr><td class="footer-hint">Jam Selesai Dashboard</td><td><strong>${fmtHHMM(eMs)}</strong> (${fmtHHMM(sMs)}–${fmtHHMM(eMs)} termasuk TOT)</td></tr>
      <tr><td class="footer-hint">Kamar Operasi</td><td>${esc(c.adminCot.jadwal.ruang) || "-"}</td></tr>
      <tr><td class="footer-hint">Penjamin</td><td>${esc(c.penjamin)}</td></tr>
      <tr><td class="footer-hint">Alat Khusus</td><td>${alatList.length ? alatList.map((a) => `<span class="chip">${esc(a)}</span>`).join(" ") : "-"}</td></tr>
      <tr><td class="footer-hint">Catatan</td><td>${esc(c.adminCot.decisionNote) || "-"}</td></tr>
    </table>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn" id="opModalClose">Tutup</button>
      ${state.role === "AdminCOT" ? `<button class="btn btn-revisi" id="opModalEditJadwal">✏️ Revisi</button>` : ""}
      ${state.role === "AdminCOT" && !c.adminCot.tindakanSelesai ? `<button class="btn btn-primary" id="opModalSelesai">✅ Sudah Tindakan</button>` : ""}
      <button class="btn btn-primary" id="opModalDetail">Buka Detail Lengkap</button>
    </div>
  </div></div>`;
        document.getElementById("opModalClose").onclick = () => (root.innerHTML = "");
        if (document.getElementById("opModalEditJadwal"))
          document.getElementById("opModalEditJadwal").onclick = () => {
            root.innerHTML = "";
            state.page = "detail";
            state.activeCaseId = c.id;
            render();
            toast('Gulir ke "Aksi Role: Admin COT" → klik "Reschedule" (ubah tanggal/jam/ruang) atau "Revisi" (ubah alat/kebutuhan)', "ok");
          };
        if (document.getElementById("opModalSelesai"))
          document.getElementById("opModalSelesai").onclick = () => {
            if (!confirm(`Tandai tindakan untuk ${c.nama} (${c.id}) sudah dilakukan?`)) return;
            c.adminCot.tindakanSelesai = true;
            c.adminCot.tindakanSelesaiAt = new Date().toISOString();
            addAudit(c, "Admin COT menandai tindakan sudah dilakukan", `Operasi untuk ${c.nama} ditandai selesai dilakukan.`);
            saveCases();
            root.innerHTML = "";
            toast("Tindakan ditandai sudah dilakukan", "ok");
            if (state.page === "monitoring") renderMonitoringPage();
          };
        document.getElementById("opModalDetail").onclick = () => {
          root.innerHTML = "";
          state.page = "detail";
          state.activeCaseId = c.id;
          render();
        };
      }
      function openCancelModal(c) {
        const root = document.getElementById("modalRoot");
        root.innerHTML = `<div class="modal-overlay" id="ovl"><div class="modal">
    <h3>Batalkan Case ${c.id}?</h3>
    <p class="footer-hint">Case yang dibatalkan tidak dapat diproses kembali dan akan tercatat di audit log.</p>
    <div class="field"><label>Alasan pembatalan</label><textarea id="cancelNote"></textarea></div>
    <div class="btn-row"><button class="btn" id="cancelNo">Batal</button><button class="btn btn-danger" id="cancelYes">Ya, Batalkan Case</button></div>
  </div></div>`;
        document.getElementById("cancelNo").onclick = () =>
          (root.innerHTML = "");
        document.getElementById("cancelYes").onclick = () => {
          cancelCase(
            c,
            document.getElementById("cancelNote").value ||
              "Tidak ada alasan diberikan.",
          );
          root.innerHTML = "";
          toast("Case dibatalkan", "warn");
          renderDetail();
        };
      }

      function render() {
        // Pengaman: kalau halaman aktif tidak lagi diizinkan untuk role saat ini (mis. akses dicabut lewat
        // Manajemen Role, atau tersisa dari role sebelumnya), kembalikan ke Dashboard.
        const allowed = visibleMenusForRole(state.role);
        if (["dashboard", "newcase", "queue", "monitoring", "estimasiMandiri", "roleManagement", "roles"].includes(state.page) && !allowed.includes(state.page)) {
          state.page = "dashboard";
        }
        renderSidebar();
        const titles = {
          dashboard: "Dashboard",
          newcase: "Buat Case Baru",
          queue: "Antrian Saya",
          monitoring: "Monitoring Penjadwalan COT",
          estimasiMandiri: "Estimasi Mandiri",
          roleManagement: "Manajemen Role",
          roles: "Penafian",
          detail: "Detail Case",
        };
        document.getElementById("pageTitle").textContent =
          titles[state.page] || "Dashboard";
        if (state.page === "dashboard") renderDashboard();
        else if (state.page === "newcase") renderNewCase(state.editCaseId ? cases.find((x) => x.id === state.editCaseId) : null);
        else if (state.page === "queue") renderList("queue");
        else if (state.page === "monitoring") renderMonitoringPage();
        else if (state.page === "estimasiMandiri") renderEstimasiMandiri();
        else if (state.page === "guarantorMapping") renderGuarantorMapping();
        else if (state.page === "estimasiHistory") renderEstimasiHistory();
        else if (state.page === "roleManagement") renderRoleManagement();
        else if (state.page === "roles") renderRoles();
        else if (state.page === "detail") renderDetail();
      }
      function tickClock() {
        document.getElementById("clock").textContent =
          new Date().toLocaleString("id-ID", {
            weekday: "short",
            day: "2-digit",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
      }
      setInterval(tickClock, 1000);
      tickClock();
      render();
    </script>
  </body>
</html>
