      function nurseUsulanBelumLengkap(c) {
        const alatKosong = (c.adminCot.alat || []).filter((a) => !((typeof a === "string" ? 0 : a.harga) > 0)).map((a) => (typeof a === "string" ? a : a.nama));
        const bmhpKosong = (c.tambahanBMHP || []).filter((t) => !(t.harga > 0)).map((t) => t.jenis);
        return { alatKosong, bmhpKosong, total: alatKosong.length + bmhpKosong.length };
      }
      // Penanda peringatan mencolok (bukan cuma teks kecil) — dipakai di kartu unit Farmasi/Admin COT & Dashboard.
      function usulanWarningBadge(c) {
        const u = nurseUsulanBelumLengkap(c);
        if (!u.total) return "";
        const items = [...u.alatKosong, ...u.bmhpKosong].filter(Boolean).join(", ");
        return `<div class="usulan-warning">⚠️ ${u.total} item usulan Nurse belum ada harga${items ? ` (${esc(items)})` : ""} — mohon dilengkapi</div>`;
      }
      // Badge "Menunggu" untuk unit tujuan revisi Case Manager — tampilkan catatan/instruksi CM langsung terlihat
      function pendingUnitBadge(c, targetId) {
        const isReturnTarget = c.caseManager.decision === "Revisi" && c.caseManager.returnTo === targetId && c.caseManager.instruksi;
        if (isReturnTarget) {
          return `<span class="badge-status st-Menunggu">Menunggu</span>${noteInline("Catatan Case Manager: " + c.caseManager.instruksi)}`;
        }
        return statusBadge("Menunggu");
      }
      function caseStatusBadge(status) {
        return statusBadge(status, CASE_STATUS_LABEL[status] || status);
      }
      function flowChip(flow) {
        return `<span class="chip chip-flow">${esc(flow)}</span>`;
      }
      const VA_DECISION_LABEL = { Disetujui: "Disetujui", Pending: "Pending", Ditolak: "Ditolak", DalamKonfirmasi: "Dalam Konfirmasi" };
      // Badge keputusan VA + keterangan langsung terlihat di bawahnya
      function vaDecisionBadge(c) {
        if (!c.va.decision) return statusBadge("Menunggu");
        const lbl = VA_DECISION_LABEL[c.va.decision] || c.va.decision;
        return `<span class="badge-status st-${c.va.decision}">${lbl}</span>${noteInline(c.va.decisionNote)}`;
      }
      const CM_DECISION_LABEL = { Disetujui: "Disetujui", Revisi: "Revisi", DokumenBelumLengkap: "Dokumen Belum Lengkap" };
      function cmDecisionBadge(c) {
        if (!c.caseManager.decision) return statusBadge("Menunggu");
        const lbl = CM_DECISION_LABEL[c.caseManager.decision] || c.caseManager.decision;
        let tip = c.caseManager.instruksi || "";
        if (c.caseManager.decision === "Revisi" && c.caseManager.returnTo) tip = `→ ${returnUnitLabel(c.caseManager.returnTo)}. ${tip}`;
        return `<span class="badge-status st-${c.caseManager.decision}">${lbl}</span>${noteInline(tip)}`;
      }
      const ADMINCOT_LABEL = { Terjadwal: "Terjadwal", Reschedule: "Reschedule", DalamKonfirmasi: "Dalam Konfirmasi", Revisi: "Revisi" };
      function adminCotBadge(c) {
        if (!c.adminCot.required) return statusBadge("Belum", "Tidak diperlukan");
        if (!c.adminCot.finalDone) {
          if (c.adminCot.decision === "Revisi") return `<span class="badge-status st-Revisi">Revisi</span>${noteInline(c.adminCot.decisionNote)}`;
          if (c.adminCot.prelimDone) return statusBadge("DalamKonfirmasi", "Dalam Konfirmasi");
          return pendingUnitBadge(c, "AdminCOT");
        }
        const eff = adminCotEffectiveStatus(c); // Terjadwal / Reschedule / DalamKonfirmasi
        const lbl = ADMINCOT_LABEL[eff] || eff;
        return `<span class="badge-status st-${eff}">${lbl}</span>${noteInline(c.adminCot.decisionNote)}`;
      }
      const CS_DECISION_LABEL = { Disetujui: "Disetujui", Reschedule: "Reschedule", DalamKonfirmasi: "Dalam Konfirmasi", Batal: "Batal", Pending: "Pending" };
      function csDecisionBadge(c) {
        if (!c.cs.decision) return statusBadge("Menunggu");
        const lbl = CS_DECISION_LABEL[c.cs.decision] || c.cs.decision;
        return `<span class="badge-status st-${c.cs.decision}">${lbl}</span>${noteInline(c.cs.decisionNote)}`;
      }
      // Hitung estimasi jasa medis dari DB dan render tabel yang bisa diedit
      function renderVaEstimasi(c, golongan, kelas) {
        const efektif = golonganEfektif(golongan, { cito: isCitoChecked(c), penyulit: false });
        // Sumber utama: Master Tarif via Mapping Guarantor (computeEstimasiOtomatis) — otomatis, tanpa perlu
        // klik tombol apa pun. Untuk kasus multi-operator (>=2 golongan berbeda), tetap pakai
        // computeMultiOperatorJasaRincian() seperti sebelumnya karena Master Tarif per Kelompok belum
        // mendukung perhitungan lintas-operator/lintas-golongan.
        const multiEst = computeMultiOperatorJasaRincian(c, golongan, kelas);
        const est = multiEst ? { rincian: multiEst.rincian, total: multiEst.total, sumber: "multiOperator" } : computeEstimasiOtomatis(c, golongan, kelas);
        const box = document.getElementById("vaEstimasiBox");
        if (!box) return;
        // Panel Kelompok Tarif (Mapping Guarantor) — menampilkan Kelompok Tarif yang otomatis diresolusi dari
        // Nama Guarantor/Asuransi case ini (dipakai otomatis di atas bila ada barisnya), plus tombol untuk
        // memaksa hitung ulang manual bila VA mengubah data lain yang memengaruhi tarif.
        const resolvedKt = resolveKelompokTarif(c.namaGuarantor);
        const ktPanel = `<div class="permission-note" style="margin-bottom:10px;">
            <strong>Kelompok Tarif (Mapping Guarantor):</strong> "${esc(c.namaGuarantor || "-")}" → <strong>${esc(resolvedKt.kelompokTarif)}</strong>${resolvedKt.cob ? " (Tarif COB)" : ""}${resolvedKt.matched ? ` (cocok pola "${esc(resolvedKt.matched)}")` : " (fallback tahun berjalan)"}.
            ${est.sumber === "legacy" ? ` <span class="hint">Golongan "${esc(efektif)}" tidak ada di Master Tarif Kelompok "${esc(resolvedKt.kelompokTarif)}" — memakai tabel tarif lama sebagai fallback.</span>` : ""}
            <button type="button" class="btn btn-sm" id="vaPakaiMasterTarifBtn" style="margin-left:8px;">Hitung Ulang dari Master Tarif</button>
          </div>`;
        if (!est.rincian.length) {
          box.innerHTML = ktPanel + `<div class="autofill-box"><span class="hint">Golongan <strong>${esc(efektif)}</strong> tidak ada di Master Tarif maupun database tarif lama. Isi estimasi manual di bawah.</span>
            <div class="field" style="margin-top:8px;"><label>Total Estimasi (Rp)</label><input id="vaTotalManual" value="${c.va.estimasiTotal || ""}"></div></div>`;
          wireVaMasterTarifButton(c, efektif, kelas);
          return;
        }
        const rows = est.rincian
          .map((r, i) => `<tr><td>${esc(r.komponen)}</td><td style="text-align:right;"><input class="vaKomp" data-i="${i}" data-komp="${esc(r.komponen)}" value="${r.nilai}" style="width:130px; text-align:right; padding:4px 6px;"></td></tr>`)
          .join("");
        box.innerHTML = ktPanel + `<div class="autofill-box"><table class="af-table">
            <tr style="font-weight:700;"><td>Komponen Jasa Medis</td><td style="text-align:right;">Nilai (Rp)</td></tr>${rows}
            <tr style="font-weight:800;"><td>TOTAL</td><td style="text-align:right;" id="vaTotalCell">${rupiah(est.total)}</td></tr>
          </table><span class="hint">Nilai dapat diedit VA. Total dihitung ulang otomatis.${efektif !== String(golongan || "").toUpperCase() ? ` Tarif mengikuti golongan "${esc(efektif)}".` : ""}</span></div>`;
        box.querySelectorAll(".vaKomp").forEach((inp) => (inp.oninput = () => {
          let t = 0;
          box.querySelectorAll(".vaKomp").forEach((x) => (t += Number(x.value) || 0));
          document.getElementById("vaTotalCell").textContent = rupiah(t);
        }));
        wireVaMasterTarifButton(c, efektif, kelas);
      }
      // Tombol "Pakai Master Tarif Kelompok Ini" — menimpa tabel rincian yang bisa diedit VA dengan hasil
      // computeTarifRincianBaru() (Mapping Guarantor + Master Tarif), lalu mencatat perubahan ke History
      // Estimasi. Tetap opsional: VA boleh tetap memakai tabel golongan/kelas lama tanpa menekan tombol ini.
      function wireVaMasterTarifButton(c, efektif, kelas) {
        const btn = document.getElementById("vaPakaiMasterTarifBtn");
        if (!btn) return;
        btn.onclick = () => {
          const sebelum = (() => { let t = 0; document.querySelectorAll(".vaKomp").forEach((x) => (t += Number(x.value) || 0)); const m = document.getElementById("vaTotalManual"); return m ? Number(m.value) || 0 : t; })();
          const opII = operatorCountFor(c) >= 2;
          const hasil = computeTarifRincianBaru(c.namaGuarantor, efektif, kelas, c.jenisOperasi, opII);
          if (!hasil.rincian.length) { toast(`Tidak ada baris tarif untuk golongan "${efektif}" pada Kelompok Tarif "${hasil.kelompokTarif}".`, "warn"); return; }
          c.va.estimasiRincian = hasil.rincian;
          c.va.estimasiTotal = hasil.total;
          c.va.estimasi = rupiah(hasil.total);
          c.va.kelompokTarif = hasil.kelompokTarif;
          addEstimasiHistory(c.id, "Diedit (Master Tarif)", sebelum, hasil.total);
          saveCases();
          toast(`Rincian dimuat dari Kelompok Tarif "${hasil.kelompokTarif}" — Total ${rupiah(hasil.total)}`, "ok");
          renderDetail();
        };
      }
      function collectVaEstimasi() {
        const box = document.getElementById("vaEstimasiBox");
        const manual = document.getElementById("vaTotalManual");
        if (manual) { const t = Number(manual.value) || 0; return { rincian: [{ komponen: "Estimasi Manual", nilai: t }], total: t }; }
        const rincian = [];
        let total = 0;
        box.querySelectorAll(".vaKomp").forEach((x) => { const v = Number(x.value) || 0; rincian.push({ komponen: x.dataset.komp, nilai: v }); total += v; });
        return { rincian, total };
      }

      /* Case Manager — akses penuh untuk edit Golongan, Kelas, Estimasi Jasa Medis, BMHP, dan Alat (super admin). */
      const CM_KELAS_OPSI_LIST = ["VVIP", "VIP", "Kelas 1", "Kelas 2", "Kelas 3"];
      // Perhitungan estimasi OTOMATIS untuk kasus 1-golongan (non multi-operator): Master Tarif (Mapping
      // Guarantor) dipakai sebagai sumber UTAMA; bila Kelompok Tarif hasil resolusi tidak punya baris untuk
      // golongan tsb. (mis. golongan yang hanya ada di tabel lama), otomatis jatuh ke tabel lama
      // (estimasiJasaMedis/COT_DB.estimasi) supaya tetap ada estimasi, bukan kosong.
      function computeEstimasiOtomatis(c, golonganInput, kelas) {
        const efektif = golonganEfektif(golonganInput, { cito: isCitoChecked(c), penyulit: false });
        const opII = operatorCountFor(c) >= 2;
        const viaMasterTarif = computeTarifRincianBaru(c.namaGuarantor, efektif, kelas, c.jenisOperasi, opII);
        if (viaMasterTarif.rincian.length) {
          return { rincian: viaMasterTarif.rincian, total: viaMasterTarif.total, kelompokTarif: viaMasterTarif.kelompokTarif, sumber: "masterTarif" };
        }
        const legacy = estimasiJasaMedis(efektif, kelas, operatorCountFor(c));
        if (legacy) return { rincian: legacy.rincian, total: legacy.total, kelompokTarif: null, sumber: "legacy" };
        return { rincian: [], total: 0, kelompokTarif: null, sumber: "kosong" };
      }
      function renderCmEstimasiPanel(c, panel) {
        let golongan = c.va.golongan || c.golongan || "";
        let kelas = c.va.kelas || c.kelasPerawatan || "";
        let penyulitOn = !!c.penyulitMultiTindakan; // saran sistem dari Nurse (>=2 tindakan oleh 1 operator) — CM konfirmasi/ubah di sini
        const cmMulti = isMultiGolonganCase(c);
        if (cmMulti && !c.operatorGolonganFinal) c.operatorGolonganFinal = pairOperatorGolongan(c).map((e) => e.golongan);
        let jasaRincian = sortJasaRincianForDisplay(
          (c.va.active && c.va.estimasiRincian && c.va.estimasiRincian.length)
            ? c.va.estimasiRincian.map((r) => ({ komponen: r.komponen, nilai: Number(r.nilai) || 0 }))
            : cmMulti
              ? (() => { const est = computeMultiOperatorJasaRincian(c, golongan, kelas); return est ? est.rincian : []; })()
              : computeEstimasiOtomatis(c, golongan, kelas).rincian
        );
        let bmhpItems = (c.paketBMHPItems || []).map((it) => ({ n: it.n, h: Number(it.h) || 0, q: it.q }))
          .concat((c.tambahanBMHP || []).map((t) => ({ n: `${t.jenis}${t.spesifikasi ? " (" + t.spesifikasi + ")" : ""} [Tambahan usulan Nurse]`, h: Number(t.harga) || 0, q: t.qty || 1 })));
        let alatItems = ((c.adminCot && c.adminCot.alat) || []).map((a) => (typeof a === "string" ? { nama: a, harga: 0 } : { nama: a.nama, harga: Number(a.harga) || 0 }));
        // Simpan default hasil hitung otomatis ke c.va.*/c.adru.estimasi/c.kasir.estimasi SEKALIGUS saat panel
        // dibuka (bukan cuma saat klik Simpan), supaya tombol Ajukan tetap benar walau user tidak mengubah apa pun.
        if (c.va.active && (!c.va.estimasiRincian || !c.va.estimasiRincian.length) && jasaRincian.length) {
          c.va.golongan = golongan;
          c.va.kelas = kelas;
          c.va.estimasiRincian = jasaRincian.map((r) => ({ komponen: r.komponen, nilai: Number(r.nilai) || 0 }));
          c.va.estimasiTotal = jasaRincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
          c.va.estimasi = rupiah(c.va.estimasiTotal);
          saveCases();
        } else if (!c.va.active && jasaRincian.length) {
          const totalNow = jasaRincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
          if (c.adru.active && !c.adru.estimasi) { c.adru.estimasi = String(totalNow); saveCases(); }
          else if (c.kasir.active && !c.kasir.estimasi) { c.kasir.estimasi = String(totalNow); saveCases(); }
        }
        // Tombol Simpan hanya muncul setelah benar-benar ada perubahan — tidak perlu klik Simpan kalau cuma melihat.
        let dirty = false;
        function markDirty() {
          dirty = true;
          const btn = document.getElementById("cmEstimasiSave");
          if (btn) btn.style.display = "";
        }

        function draw() {
          const jasaTotal = jasaRincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
          const bmhpTotal = bmhpItems.reduce((s, it) => s + (Number(it.h) || 0) * (typeof it.q === "number" ? it.q : (Number(it.q) || 1)), 0);
          const alatTotal = alatItems.reduce((s, a) => s + (Number(a.harga) || 0), 0);
          panel.innerHTML = `
      <div class="permission-note">Mengubah Golongan / Kelas akan menghitung ulang Estimasi Jasa Medis otomatis dari database tarif.</div>
      <div class="form-grid">
        ${cmMulti
          ? `<div class="field full"><label>Golongan per Operator <span class="hint">(operator berbeda spesialisasi — Case Manager menentukan golongan final tiap operator)</span></label>
              ${pairOperatorGolongan(c).map((e, i) => `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
                <span style="min-width:220px;">${esc(e.role)}${e.tindakanNama ? " — " + esc(e.tindakanNama) : ""}</span>
                <select class="cmOpGolongan" data-i="${i}">${golonganOptionsExpanded().map((g) => `<option value="${g}" ${e.golongan === g ? "selected" : ""}>${g}</option>`).join("")}</select>
              </div>`).join("")}
              <span class="hint">Biaya fasilitas (Sewa Kamar/Anestesi/Jasa Layanan) memakai golongan tertinggi di antara operator di atas. Penyulit tidak berlaku pada skenario operator berbeda (Catatan No.6).</span>
            </div>`
          : `<div class="field"><label>Golongan</label><select id="cmEstGolongan">${golonganOptionsExpanded().map((g) => `<option value="${g}" ${golongan === g ? "selected" : ""}>${g}</option>`).join("")}</select>
              ${c.penyulitMultiTindakan ? `<div class="hint">💡 Sistem mendeteksi kemungkinan Penyulit (≥2 tindakan oleh 1 operator) — pilih varian "... PENYULIT" di atas bila sesuai, konfirmasi Case Manager.</div>` : ""}
            </div>`}
        <div class="field"><label>Kelas Perawatan</label><select id="cmEstKelas">${CM_KELAS_OPSI_LIST.map((k) => `<option value="${k}" ${kelas === k ? "selected" : ""}>${k}</option>`).join("")}</select></div>
      </div>
      <div class="section-lbl" style="margin-top:10px;">Estimasi Jasa Medis</div>
      <div class="btn-row" style="margin-bottom:6px;">
        <select id="cmTemplateLoad" style="max-width:220px;"><option value="">📂 Muat dari Template…</option>${loadEstimasiTemplates().map((t, i) => `<option value="${i}">${esc(t.nama)}</option>`).join("")}</select>
        <button type="button" class="btn btn-sm" id="cmTemplateSave">💾 Simpan sebagai Template</button>
      </div>
      <table class="af-table">${jasaRincian.map((r, i) => `<tr><td><input class="cmJasaKomp" data-i="${i}" value="${esc(r.komponen)}" style="width:100%;"></td><td style="text-align:right;"><input class="cmJasaNilai" data-i="${i}" value="${r.nilai}" style="width:130px; text-align:right;"></td><td><button type="button" class="btn btn-sm btn-danger cmJasaDel" data-i="${i}">×</button></td></tr>`).join("")}
        <tr style="font-weight:800;"><td colspan="2">Total Jasa Medis</td><td id="cmJasaTotalCell">${rupiah(jasaTotal)}</td></tr></table>
      <button type="button" class="btn btn-sm" id="cmJasaAdd">+ Tambah Komponen</button>

      <div class="section-lbl" style="margin-top:14px;">BMHP</div>
      <table class="af-table">${bmhpItems.map((it, i) => `<tr><td><input class="cmBmhpNama" data-i="${i}" value="${esc(it.n)}" style="width:100%;"></td><td><input class="cmBmhpQty" data-i="${i}" value="${it.q == null ? 1 : it.q}" style="width:70px;"></td><td style="text-align:right;"><input class="cmBmhpHarga" data-i="${i}" value="${it.h}" style="width:120px; text-align:right;"></td><td><button type="button" class="btn btn-sm btn-danger cmBmhpDel" data-i="${i}">×</button></td></tr>`).join("")}
        <tr style="font-weight:800;"><td colspan="2">Total BMHP</td><td colspan="2" id="cmBmhpTotalCell">${rupiah(bmhpTotal)}</td></tr></table>
      <button type="button" class="btn btn-sm" id="cmBmhpAdd">+ Tambah Item BMHP</button>

      <div class="section-lbl" style="margin-top:14px;">Alat</div>
      <table class="af-table">${alatItems.map((a, i) => `<tr><td><input class="cmAlatNama" data-i="${i}" value="${esc(a.nama)}" style="width:100%;"></td><td style="text-align:right;"><input class="cmAlatHarga" data-i="${i}" value="${a.harga}" style="width:130px; text-align:right;"></td><td><button type="button" class="btn btn-sm btn-danger cmAlatDel" data-i="${i}">×</button></td></tr>`).join("")}
        <tr style="font-weight:800;"><td>Total Alat</td><td id="cmAlatTotalCell">${rupiah(alatTotal)}</td></tr></table>
      <button type="button" class="btn btn-sm" id="cmAlatAdd">+ Tambah Alat</button>

      <div style="margin-top:6px; font-weight:800;" id="cmGrandTotalRow">TOTAL ESTIMASI: <span id="cmGrandTotalCell">${rupiah(jasaTotal + bmhpTotal + alatTotal)}</span></div>
      <div style="margin-top:14px;"><button type="button" class="btn btn-primary" id="cmEstimasiSave" style="${dirty ? "" : "display:none;"}">Simpan Golongan, Kelas, Estimasi, BMHP &amp; Alat</button></div>`;

          // Update total tampilan tanpa render ulang seluruh panel (supaya fokus/kursor input harga tidak hilang saat mengetik).
          function updateTotalsOnly() {
            const jt = jasaRincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
            const bt = bmhpItems.reduce((s, it) => s + (Number(it.h) || 0) * (typeof it.q === "number" ? it.q : (Number(it.q) || 1)), 0);
            const at = alatItems.reduce((s, a) => s + (Number(a.harga) || 0), 0);
            const jc = document.getElementById("cmJasaTotalCell"); if (jc) jc.textContent = rupiah(jt);
            const bc = document.getElementById("cmBmhpTotalCell"); if (bc) bc.textContent = rupiah(bt);
            const ac = document.getElementById("cmAlatTotalCell"); if (ac) ac.textContent = rupiah(at);
            const gc = document.getElementById("cmGrandTotalCell"); if (gc) gc.textContent = rupiah(jt + bt + at);
          }

          if (document.getElementById("cmEstGolongan"))
            document.getElementById("cmEstGolongan").onchange = (e) => {
              markDirty();
              golongan = e.target.value;
              const est = computeEstimasiOtomatis(c, golongan, kelas);
              if (est.rincian.length) {
                jasaRincian = sortJasaRincianForDisplay(est.rincian);
                toast(est.sumber === "masterTarif" ? `Estimasi dihitung ulang dari Kelompok Tarif "${est.kelompokTarif}" (Mapping Guarantor)` : "Estimasi jasa medis dihitung ulang mengikuti Golongan baru (tabel lama)", "ok");
              } else toast("Golongan ini tidak ada di Master Tarif maupun database tarif lama — isi manual komponen jasa medis", "warn");
              draw();
            };
          document.querySelectorAll(".cmOpGolongan").forEach((sel) => {
            sel.onchange = () => {
              markDirty();
              if (!c.operatorGolonganFinal) c.operatorGolonganFinal = pairOperatorGolongan(c).map((e) => e.golongan);
              c.operatorGolonganFinal[Number(sel.dataset.i)] = sel.value;
              const est = computeMultiOperatorJasaRincian(c, golongan, kelas);
              if (est) { jasaRincian = sortJasaRincianForDisplay(est.rincian); toast("Golongan operator diperbarui — tarif dihitung ulang", "ok"); }
              draw();
            };
          });
          document.getElementById("cmEstKelas").onchange = (e) => {
            markDirty();
            kelas = e.target.value;
            if (cmMulti) {
              const est = computeMultiOperatorJasaRincian(c, golongan, kelas);
              if (est) { jasaRincian = sortJasaRincianForDisplay(est.rincian); toast("Estimasi jasa medis dihitung ulang mengikuti Kelas baru", "ok"); }
            } else {
              const est = computeEstimasiOtomatis(c, golongan, kelas);
              if (est.rincian.length) {
                jasaRincian = sortJasaRincianForDisplay(est.rincian);
                toast(est.sumber === "masterTarif" ? `Estimasi dihitung ulang dari Kelompok Tarif "${est.kelompokTarif}" (Mapping Guarantor)` : "Estimasi jasa medis dihitung ulang mengikuti Kelas baru (tabel lama)", "ok");
              }
            }
            draw();
          };
          panel.querySelectorAll(".cmJasaKomp").forEach((el) => (el.oninput = () => { markDirty(); jasaRincian[el.dataset.i].komponen = el.value; }));
          panel.querySelectorAll(".cmJasaNilai").forEach((el) => (el.oninput = () => { markDirty(); jasaRincian[el.dataset.i].nilai = Number(el.value) || 0; updateTotalsOnly(); }));
          panel.querySelectorAll(".cmJasaDel").forEach((el) => (el.onclick = () => { markDirty(); jasaRincian.splice(Number(el.dataset.i), 1); draw(); }));
          panel.querySelectorAll(".cmBmhpNama").forEach((el) => (el.oninput = () => { markDirty(); bmhpItems[el.dataset.i].n = el.value; }));
          panel.querySelectorAll(".cmBmhpQty").forEach((el) => (el.oninput = () => { markDirty(); const v = Number(el.value); bmhpItems[el.dataset.i].q = isNaN(v) ? el.value : v; updateTotalsOnly(); }));
          panel.querySelectorAll(".cmBmhpHarga").forEach((el) => (el.oninput = () => { markDirty(); bmhpItems[el.dataset.i].h = Number(el.value) || 0; updateTotalsOnly(); }));
          panel.querySelectorAll(".cmBmhpDel").forEach((el) => (el.onclick = () => { markDirty(); bmhpItems.splice(Number(el.dataset.i), 1); draw(); }));
          panel.querySelectorAll(".cmAlatNama").forEach((el) => (el.oninput = () => { markDirty(); alatItems[el.dataset.i].nama = el.value; }));
          panel.querySelectorAll(".cmAlatHarga").forEach((el) => (el.oninput = () => { markDirty(); alatItems[el.dataset.i].harga = Number(el.value) || 0; updateTotalsOnly(); }));
          panel.querySelectorAll(".cmAlatDel").forEach((el) => (el.onclick = () => { markDirty(); alatItems.splice(Number(el.dataset.i), 1); draw(); }));

          document.getElementById("cmJasaAdd").onclick = () => { markDirty(); jasaRincian.push({ komponen: "", nilai: 0 }); draw(); };
          if (document.getElementById("cmTemplateSave"))
            document.getElementById("cmTemplateSave").onclick = () => {
              if (!jasaRincian.length) { toast("Belum ada komponen jasa medis untuk disimpan sebagai template", "warn"); return; }
              const nama = prompt("Nama template (mis. \"Estimasi ORIF non-golongan\"):", "");
              if (!nama || !nama.trim()) return;
              const templates = loadEstimasiTemplates();
              templates.push({ nama: nama.trim(), jasaRincian: jasaRincian.map((r) => ({ komponen: r.komponen, nilai: Number(r.nilai) || 0 })), savedAt: new Date().toISOString() });
              saveEstimasiTemplates(templates);
              toast(`Template "${nama.trim()}" disimpan`, "ok");
              draw();
            };
          if (document.getElementById("cmTemplateLoad"))
            document.getElementById("cmTemplateLoad").onchange = (e) => {
              const idx = e.target.value;
              if (idx === "") return;
              const templates = loadEstimasiTemplates();
              const t = templates[Number(idx)];
              if (!t) return;
              markDirty();
              jasaRincian = t.jasaRincian.map((r) => ({ komponen: r.komponen, nilai: Number(r.nilai) || 0 }));
              toast(`Template "${t.nama}" dimuat — ${jasaRincian.length} komponen. Sesuaikan lagi bila perlu.`, "ok");
              draw();
            };
          document.getElementById("cmBmhpAdd").onclick = () => { markDirty(); bmhpItems.push({ n: "", h: 0, q: 1 }); draw(); };
          document.getElementById("cmAlatAdd").onclick = () => { markDirty(); alatItems.push({ nama: "", harga: 0 }); draw(); };

          document.getElementById("cmEstimasiSave").onclick = () => {
            const total = jasaRincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
            const golonganLama = c.golongan, kelasLama = c.va.kelas || c.kelasPerawatan;
            let golonganFinal = golongan;
            if (cmMulti && c.operatorGolonganFinal && c.operatorGolonganFinal.length) {
              golonganFinal = c.operatorGolonganFinal[0];
              c.operatorGolonganFinal.forEach((g) => { if (golonganRank(g) > golonganRank(golonganFinal)) golonganFinal = g; });
            }
            c.golongan = golonganFinal;
            c.kelasPerawatan = kelas;
            if (c.va.active) { c.va.golongan = golonganFinal; c.va.kelas = kelas; c.va.estimasiRincian = jasaRincian.filter((r) => r.komponen); c.va.estimasiTotal = total; c.va.estimasi = rupiah(total); }
            else if (c.adru.active) c.adru.estimasi = String(total);
            else c.kasir.estimasi = String(total);
            c.paketBMHPItems = bmhpItems.filter((it) => it.n);
            c.tambahanBMHP = [];
            c.adminCot.alat = alatItems.filter((a) => a.nama);
            addAudit(c, "Case Manager mengedit Golongan/Kelas/Estimasi/BMHP/Alat (akses penuh)",
              `Golongan ${golonganLama || "-"} → ${golonganFinal}, Kelas ${kelasLama || "-"} → ${kelas}. Total Jasa ${rupiah(total)}, ${c.paketBMHPItems.length} item BMHP, ${c.adminCot.alat.length} alat.`);
            saveCases();
            toast("Golongan, Kelas, Estimasi, BMHP & Alat diperbarui oleh Case Manager", "ok");
            renderDetail();
          };
        }
        draw();
      }

      function caseRow(c) {
        return `<tr data-id="${c.id}">
    <td><strong>${c.id}</strong><br><span class="footer-hint">${fmtDateTime(c.createdAt)}</span></td>
    <td>${esc(c.nama)}<br><span class="footer-hint">RM ${esc(c.rm)}</span></td>
    <td>${listOrDash(c.dpjpList)}</td>
    <td>${listOrDash(c.tindakanList)}</td>
    <td><span class="chip">${esc(c.penjamin)}</span></td>
    <td>${esc(c.lokasiTindakan)}</td>
    <td>${flowChip(c.currentFlow)}</td>
    <td>${caseStatusBadge(c.status)}</td>
  </tr>`;
      }
      function renderTable(list) {
        const head = `<thead><tr><th>Case ID</th><th>Pasien</th><th>DPJP</th><th>Tindakan</th><th>Penjamin</th><th>Lokasi</th><th>Modul Aktif</th><th>Status</th></tr></thead>`;
        if (list.length === 0)
          return `<table>${head}<tbody><tr class="empty-row"><td colspan="8">Belum ada data case.</td></tr></tbody></table>`;
        return `<table>${head}<tbody>${list.map(caseRow).join("")}</tbody></table>`;
      }
      // PRIORITAS: 1 baris universal untuk semua role — menampilkan TAT (Turn Around Time) countdown milik
      // role yang sedang login (dari getUnitDeadline), ditambah catatan spesifik per role (follow-up CS,
      // atau peringatan usulan Nurse untuk Farmasi/Admin COT).
      function prioritasRow(c) {
        const role = state.role;
        const isCito = (c.jenisOperasi || []).includes("CITO");
        const dl = getUnitDeadline(c, role);
        const tatCell = dl
          ? `<span class="tat-countdown${dl.cito ? " tat-cito" : ""}" data-due="${new Date(dl.deadlineMs).toISOString()}">…</span>`
          : `<span class="footer-hint">-</span>`;
        let catatan = `<span class="footer-hint">-</span>`;
        if (role === "CS" && c.cs.followUpDue) {
          catatan = `<span class="cs-countdown" data-due="${c.cs.followUpDue}">…</span> <div class="footer-hint">follow-up pasien</div>`;
        } else if (role === "VA" && c.va.followUpDue) {
          catatan = `<span class="cs-countdown" data-due="${c.va.followUpDue}">…</span> <div class="footer-hint">update status asuransi (maks 7 hari)</div>`;
        } else if (role === "Farmasi" || role === "AdminCOT") {
          const u = nurseUsulanBelumLengkap(c);
          if (u.total) catatan = usulanWarningBadge(c);
        }
        return `<tr data-id="${c.id}">
    <td><strong>${c.id}</strong>${isCito ? ' <span class="badge-status st-op-merah">CITO</span>' : ""}<br><span class="footer-hint">${fmtDateTime(c.createdAt)}</span></td>
    <td>${esc(c.nama)}<br><span class="footer-hint">RM ${esc(c.rm)}</span></td>
    <td>${listOrDash(c.dpjpList)}</td>
    <td>${listOrDash(c.tindakanList)}</td>
    <td><span class="chip">${esc(c.penjamin)}</span></td>
    <td>${caseStatusBadge(c.status)}</td>
    <td>${tatCell}</td>
    <td>${catatan}</td>
  </tr>`;
      }
      // Urutan Prioritas: deadline TERDEKAT/TERLEWATI duluan (case CITO otomatis paling atas karena
      // deadline 12 jamnya jauh lebih cepat dari TAT normal manapun). Case tanpa deadline (belum masuk
      // antrian unit manapun) ditaruh paling bawah, diurutkan berdasarkan yang paling lama menunggu.
      function sortByPrioritas(list, role) {
        return list.slice().sort((a, b) => {
          const da = getUnitDeadline(a, role);
          const db = getUnitDeadline(b, role);
          const ta = da ? da.deadlineMs : Infinity;
          const tb = db ? db.deadlineMs : Infinity;
          if (ta !== tb) return ta - tb;
          return new Date(a.createdAt) - new Date(b.createdAt);
        });
      }
      function renderPrioritasTable(list) {
        const sorted = sortByPrioritas(list, state.role);
        const head = `<thead><tr><th>Case ID</th><th>Pasien</th><th>DPJP</th><th>Tindakan</th><th>Penjamin</th><th>Status</th><th>TAT</th><th>Catatan</th></tr></thead>`;
        if (!sorted.length) return `<table>${head}<tbody><tr class="empty-row"><td colspan="8">Belum ada data case.</td></tr></tbody></table>`;
        return `<table>${head}<tbody>${sorted.map(prioritasRow).join("")}</tbody></table>`;
      }
      // Satu interval untuk semua countdown (TAT & follow-up CS) yang tampil di Dashboard.
      function startAllCountdowns() {
        const tick = () => {
          const tatEls = document.querySelectorAll(".tat-countdown");
          const csEls = document.querySelectorAll(".cs-countdown");
          if (!tatEls.length && !csEls.length) return;
          tatEls.forEach((el) => {
            const r = fmtCountdown(new Date(el.dataset.due).getTime());
            el.innerHTML = r.breached ? `⏰ <strong style="color:var(--red-500);">Terlewati</strong>` : `⏳ ${r.text}`;
            if (el.classList.contains("tat-cito")) el.style.cssText = "color:#dc2626;font-weight:700;";
          });
          csEls.forEach((el) => {
            const r = fmtCountdown(new Date(el.dataset.due).getTime());
            el.innerHTML = r.breached ? `⏰ <strong style="color:var(--red-500);">Terlewati</strong>` : `⏳ ${r.text}`;
          });
          setTimeout(tick, 1000);
        };
        tick();
      }
      function attachRowClicks() {
        document.querySelectorAll("tbody tr[data-id]").forEach(
          (tr) =>
            (tr.onclick = () => {
              state.activeCaseId = tr.dataset.id;
              state.page = "detail";
              render();
            }),
        );
      }

      function renderDashboard() {
        const total = cases.length;
        const aktif = cases.filter(
          (c) => c.status === "InProgress" || c.status === "Submitted",
        ).length;
        const selesai = cases.filter((c) => c.status === "Completed").length;
        const returned = cases.filter((c) => c.status === "Returned").length;
        const byPenjamin = {
          Asuransi: cases.filter((c) => c.penjamin === "Asuransi").length,
          Umum: cases.filter((c) => c.penjamin === "Umum").length,
          BPJS: cases.filter((c) => c.penjamin === "BPJS").length,
        };
        let html = `<div class="stat-grid">
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Case</div></div>
    <div class="stat-card"><div class="num">${aktif}</div><div class="lbl">Sedang Berjalan</div></div>
    <div class="stat-card"><div class="num">${returned}</div><div class="lbl">Returned / Revisi</div></div>
    <div class="stat-card"><div class="num">${selesai}</div><div class="lbl">Completed</div></div>
    <div class="stat-card"><div class="num">${byPenjamin.Asuransi} / ${byPenjamin.Umum} / ${byPenjamin.BPJS}</div><div class="lbl">Asuransi / Umum / BPJS</div></div>
  </div>`;
        // Sama untuk semua role (kecuali Viewer) — daftar case yang perlu tindakan ROLE INI SEKARANG,
        // diurutkan berdasarkan PRIORITAS (deadline TAT/CITO paling dekat di atas), bukan sekadar terbaru.
        if (state.role !== "Viewer") {
          const needsAction = cases.filter((c) => roleQueueMatch(c, state.role));
          const desc = state.role === "Nurse"
            ? "Draft yang belum di-submit, atau case yang dikembalikan (Returned) dan menunggu revisi Anda. Diurutkan yang paling lama menunggu di atas. Klik baris untuk melanjutkan."
            : "Diurutkan berdasarkan prioritas — case CITO atau yang mendekati/melewati batas waktu (TAT) muncul paling atas. Kolom TAT menghitung mundur sisa waktu unit Anda merespon. Klik baris untuk melanjutkan.";
          html += `<div class="card">
    <h3>Prioritas (${needsAction.length})</h3>
    <p class="footer-hint">${desc}</p>
    ${needsAction.length ? renderPrioritasTable(needsAction) : '<p class="footer-hint">Tidak ada case yang perlu ditindaklanjuti saat ini.</p>'}
  </div>`;
        }
        // Timeline semua pasien — bisa dicari & difilter statusnya.
        function computeFilteredTimeline() {
          const q = state.dashSearch.toLowerCase();
          return cases
            .filter((c) => {
              const matchQ = !q || c.id.toLowerCase().includes(q) || (c.nama || "").toLowerCase().includes(q) || (c.dpjpList || []).join(" ").toLowerCase().includes(q) || (c.rm || "").toLowerCase().includes(q);
              const matchS = !state.dashStatusFilter || c.status === state.dashStatusFilter;
              return matchQ && matchS;
            })
            .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        }
        html += `<div class="card"><h3>Timeline Semua Pasien</h3>
    <div class="search-bar">
      <input id="dashSearchInput" placeholder="Cari Case ID / Nama Pasien / RM / DPJP..." value="${esc(state.dashSearch)}">
      <select id="dashStatusFilter"><option value="">Semua Status</option>${CASE_STATUS_LIST.map((s) => `<option value="${s}" ${state.dashStatusFilter === s ? "selected" : ""}>${CASE_STATUS_LABEL[s]}</option>`).join("")}</select>
    </div>
    <div id="dashTimelineWrap">${renderTable(computeFilteredTimeline())}</div></div>`;
        document.getElementById("content").innerHTML = html;
        attachRowClicks();
        // Update HANYA tabel (bukan seluruh dashboard) saat mengetik/filter, supaya fokus & kursor
        // di kolom pencarian tidak hilang tiap ketik 1 huruf (dashboard tidak digambar ulang total).
        const refreshTimelineTable = () => {
          document.getElementById("dashTimelineWrap").innerHTML = renderTable(computeFilteredTimeline());
          attachRowClicks();
        };
        document.getElementById("dashSearchInput").oninput = (e) => {
          state.dashSearch = e.target.value;
          refreshTimelineTable();
        };
        document.getElementById("dashStatusFilter").onchange = (e) => {
          state.dashStatusFilter = e.target.value;
          refreshTimelineTable();
        };
        if (state.role !== "Viewer") startAllCountdowns();
      }

        /* --- Alat Khusus usulan Nurse (sesuai instruksi DPJP) — harga opsional, dilengkapi Farmasi/Admin COT --- */

        /* --- DPJP: autocomplete nama (list bebas, sementara belum ada DB nama) --- */
        function renderDpjpRows() {

        /* --- Operator: nama + spesialisasi (autocomplete dari master spesialisasi) --- */
        const OPERATOR_ROLE_OPTS = ["Operator I", "Operator II", "Operator III", "Operator IV", "Operator V", "Asisten Operasi", "Intensivis"];
        function renderOpRows() {

        /* --- Tindakan: baris pertama = dropdown paket (auto-fill), baris tambahan = free text --- */
        function renderTindakanRows() {

        /* --- Auto-fill golongan, spesialisasi, paket BMHP dari tindakan pertama yang cocok --- */
        function applyTindakan() {
          const golSel = document.getElementById("golonganSel");
          const spesInput = document.getElementById("spesialisasiInput");
          const bmhpBox = document.getElementById("bmhpAutofill");
          const afBox = document.getElementById("tindakanAutofill");
          const resolved = resolveGolonganMultiTindakan(tindakanList);
          const matched = resolved.highest;

          if (matched) {
            golSel.value = matched.golongan;
            if (!spesInput.value.trim()) spesInput.value = matched.spesialisasi;
            const citoNow = isCitoChecked();
            // Deteksi skenario "operator berbeda, golongan sendiri-sendiri" (Catatan No.6): >=2 Operator (peran
            // apa pun, boleh sama2 "Operator I") yang jika dipasangkan berurutan ke Tindakan menghasilkan golongan berbeda.
            const roleReOp = /^Operator (I|II|III|IV|V)$/;
            const opEntries = opRoleList.filter((r) => roleReOp.test(r || ""));
            const tindakanGolongans = tindakanList.map(findTindakan).map((t) => (t ? t.golongan : null));
            const pairedGolongans = opEntries.map((_, i) => tindakanGolongans[i]).filter(Boolean);
            const multiOperatorMode = opEntries.length >= 2 && new Set(pairedGolongans).size >= 2;
            const efektifLabel = golonganEfektif(matched.golongan, { cito: citoNow, penyulit: false });
            // BRD: Nurse hanya boleh melihat golongan, paket BMHP, dan alat — bukan rincian item/harga.
            const perTindakanPills = resolved.matched.map((m) => `<span class="af-pill gol" style="opacity:.85;">${esc(m.nama)}: ${esc(m.golongan)}</span>`).join(" ");
            // Keputusan Penyulit (Catatan No.7/8, 1 operator dengan >1 tindakan) BUKAN kewenangan Nurse — golongan akhir
            // (apakah dikenakan Penyulit atau tidak) menunggu konfirmasi Case Manager. Nurse hanya menampilkan golongan
            // tertinggi sebagai tarif sementara.
            const penyulitNote = resolved.matched.length > 1 && !multiOperatorMode
              ? `<div style="margin-top:6px;"><span class="af-pill" style="background:var(--amber-100,#fef3c7);color:var(--amber-700,#b45309);">ℹ️ ${resolved.matched.length} Tindakan — Tarif Golongan tertinggi (${esc(matched.golongan)}) dipakai sementara, golongan akhir menunggu konfirmasi Case Manager</span></div>`
              : "";
            const multiOpNote = multiOperatorMode
              ? `<div style="margin-top:6px;"><span class="af-pill" style="background:var(--blue-100,#dbeafe);color:var(--blue-700,#1d4ed8);">ℹ️ ${opEntries.length} Operator berbeda — biaya fasilitas pakai golongan tertinggi (tanpa Penyulit), tiap operator dapat jasa sesuai golongan tindakannya sendiri</span></div>`
              : "";
            const citoNote = citoNow
              ? `<div style="margin-top:6px;"><span class="af-pill" style="background:var(--amber-100,#fef3c7);color:var(--amber-700,#b45309);">⏱️ Operasi CITO — tarif otomatis mengikuti "${esc(efektifLabel)}"</span></div>`
              : "";
            afBox.innerHTML = `<div class="autofill-box"><div class="af-head">
                <span class="af-pill gol">Golongan: ${esc(efektifLabel)}</span>
                <span class="af-pill spes">${esc(matched.spesialisasi)}</span>
                <span class="af-pill harga">Paket: ${esc(matched.paket)}</span>
              </div>${resolved.matched.length > 1 ? `<div style="margin-top:4px;">${perTindakanPills}</div>` : ""}${citoNote}${multiOpNote}${penyulitNote}<span class="hint">Rincian item &amp; harga BMHP hanya dapat dilihat oleh Farmasi, Case Manager, dan Admin COT.</span></div>`;
            bmhpBox.innerHTML = `<div class="autofill-box">
              <div class="section-lbl">Golongan Operasi</div><div><span class="chip">${esc(efektifLabel)}</span></div>
              <div class="section-lbl">Nama Paket BMHP</div><div><span class="chip">${esc(matched.paket)}</span></div>
              <div class="section-lbl">Alat</div><div class="footer-hint">Belum ada data alat khusus. (Dikelola Admin COT)</div>
            </div>`;
          } else {
            const anyText = tindakanList.some((x) => x && x.trim());
            if (anyText) {
              golSel.value = "NON GOLONGAN";
              afBox.innerHTML = `<div class="autofill-box"><span class="hint">Tindakan tidak terdaftar di database paket → <strong>Non Golongan</strong>. Estimasi biaya akan diproses oleh unit terkait.</span></div>`;
            } else {
              afBox.innerHTML = "";
            }
            bmhpBox.innerHTML = `<span class="af-empty">Pilih Tindakan berpaket untuk menampilkan golongan &amp; paket BMHP.</span>`;
          }
        }

        /* --- No. RM lookup dari master pasien --- */
        function doRmLookup() {

        anestesiSel.onchange = toggleAnestesiLainnya;

        function toggleWrap(selId, wrapId, triggerValue) {

          e.preventDefault();
          const fd = new FormData(e.target);
          const data = Object.fromEntries(fd.entries());
          data.dpjpList = dpjpList.filter((x) => x.trim());

          data.operatorList = opList.map((n) => n.trim()).filter(Boolean);

          data.penyulitMultiTindakan = resolveGolonganMultiTindakan(data.tindakanList).penyulit;

          // Tanggal lahir dari 3 kolom ketik -> ISO yyyy-mm-dd
          const dY = document.getElementById("dobY").value.trim();
          const dM = document.getElementById("dobM").value.trim();
          const dD = document.getElementById("dobD").value.trim();
          data.tglLahir = (dY && dM && dD) ? `${dY.padStart(4, "0")}-${dM.padStart(2, "0")}-${dD.padStart(2, "0")}` : "";

          // Anestesi: pakai free text bila "Lainnya"
          if (data.anestesi === "Lainnya") data.anestesi = (data.anestesiLainnya || "").trim() || "Dalam Konfirmasi";
          delete data.anestesiLainnya;

          data.jenisOperasi = Array.from(document.querySelectorAll(".jenisOperasiChk:checked")).map((x) => x.value);

          // Auto-fill dari tindakan berpaket
          const matched = data.tindakanList.map(findTindakan).find(Boolean);
          if (matched) {
            data.paketBMHP = matched.paket;
            data.paketBMHPItems = matched.bmhp;
            data.hargaPaketUmum = matched.hargaUmum;
            data.hargaPaketBPJS = matched.hargaBPJS;
          } else {
            data.paketBMHP = "Non-Paket";
            data.paketBMHPItems = [];
          }
          data.golongan = document.getElementById("golonganSel").value;
          data.nonPaketBMHP = [];
          // Nurse TIDAK mengedit paket BMHP standar / rincian harga — tapi BOLEH mengusulkan Alat/BMHP
          // KHUSUS sesuai instruksi DPJP (harga opsional, dilengkapi Farmasi & Admin COT kemudian).
          data.alatKhusus = (isEdit && editCase.alatKhusus) ? editCase.alatKhusus : [];
          const nurseAlatUsulan = nurseAlatList.filter((a) => a.nama && a.nama.trim()).map((a) => ({ nama: a.nama.trim(), harga: Number(a.harga) || 0 }));
          const nurseBmhpUsulan = nurseBmhpList.filter((t) => t.jenis && t.jenis.trim()).map((t) => ({ jenis: t.jenis.trim(), spesifikasi: "", harga: Number(t.harga) || 0, qty: 1 }));
          data.tambahanBMHP = nurseBmhpUsulan.length ? nurseBmhpUsulan : ((isEdit && editCase.tambahanBMHP) ? editCase.tambahanBMHP : []);

          if (!data.dpjpList.length) { toast("Minimal 1 DPJP wajib diisi", "warn"); return; }
          if (!data.operatorList.length) { toast("Minimal 1 Operator wajib diisi", "warn"); return; }
          if (!data.tindakanList.length) { toast("Minimal 1 Tindakan wajib diisi", "warn"); return; }
          if (!data.jenisOperasi.length) { toast("Minimal 1 Jenis Operasi (CITO/Elektif/ODC) wajib dipilih", "warn"); return; }

          savePatient(data.rm, data); // simpan ke master pasien

          function applyNurseUsulan(targetCase) {
            if (!nurseAlatUsulan.length && !nurseBmhpUsulan.length) return;
            if (nurseAlatUsulan.length) targetCase.adminCot.alat = nurseAlatUsulan;
            const belumLengkap = [...nurseAlatUsulan, ...nurseBmhpUsulan].filter((x) => !x.harga);
            addAudit(targetCase, "Nurse mengusulkan Alat/BMHP khusus sesuai instruksi DPJP",
              `Alat: ${nurseAlatUsulan.map((a) => a.nama).join(", ") || "-"}. BMHP Khusus: ${nurseBmhpUsulan.map((t) => t.jenis).join(", ") || "-"}.${belumLengkap.length ? ` ⚠️ ${belumLengkap.length} item harga belum diisi — mohon dilengkapi Farmasi & Admin COT.` : ""}`);
            saveCases();
          }

          if (isEdit) {
            const wasReturned = editCase.status === "Returned";
            updateDraft(editCase, data);
            applyNurseUsulan(editCase);
            toast(wasReturned ? `Case ${editCase.id} diperbarui — status kembali ke Draft, silakan Submit ulang.` : `Perubahan case ${editCase.id} disimpan.`, "ok");
            state.activeCaseId = editCase.id;
            state.editCaseId = null;
            state.page = "detail";
            render();
          } else {
            const c = createCase(data);
            applyNurseUsulan(c);
            toast(`Case ${c.id} tersimpan sebagai Draft`, "ok");
            state.activeCaseId = c.id;
            state.page = "detail";
            render();
          }
        };
      }

      function renderList(pageType) {
        function computeFiltered() {
          const all =
            pageType === "queue"
              ? cases.filter((c) => roleQueueMatch(c, state.role))
              : cases.slice();
          return all
            .filter((c) => {
              const q = state.search.toLowerCase();
              const matchQ =
                !q ||
                c.id.toLowerCase().includes(q) ||
                (c.nama || "").toLowerCase().includes(q) ||
                (c.dpjpList || []).join(" ").toLowerCase().includes(q);
              const matchS =
                !state.statusFilter || c.status === state.statusFilter;
              return matchQ && matchS;
            })
            .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        }
        const title =
          pageType === "queue"
            ? `Antrian untuk role: ${roleLabel(state.role)}`
            : "Semua Case";
        document.getElementById("content").innerHTML =
          `<div class="card"><h3>${title}</h3>
    <div class="search-bar">
      <input id="searchInput" placeholder="Cari Case ID / Nama Pasien / DPJP..." value="${esc(state.search)}">
      <select id="statusFilter"><option value="">Semua Status</option>${CASE_STATUS_LIST.map((s) => `<option value="${s}" ${state.statusFilter === s ? "selected" : ""}>${CASE_STATUS_LABEL[s]}</option>`).join("")}</select>
    </div>
    <div id="listTableWrap">${renderTable(computeFiltered())}</div></div>`;
        attachRowClicks();
        // Update HANYA tabel (bukan seluruh halaman) saat mengetik/filter, supaya fokus & kursor
        // di kolom pencarian tidak hilang tiap ketik 1 huruf.
        const refreshTable = () => {
          document.getElementById("listTableWrap").innerHTML = renderTable(computeFiltered());
          attachRowClicks();
        };
        document.getElementById("searchInput").oninput = (e) => {
          state.search = e.target.value;
          refreshTable();
        };
        document.getElementById("statusFilter").onchange = (e) => {
          state.statusFilter = e.target.value;
          refreshTable();
        };
      }

      /* ============================= MONITORING PENJADWALAN COT ============================= */
      function todayISO() {
        const d = new Date();
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      }
      // Durasi efektif (jam): prioritaskan angka pasti dari Admin COT (c.adminCot.estimasiJam), fallback ke
      // parsing teks bebas Nurse (c.estimasiLamaOperasi) untuk case lama yang belum punya field numerik ini.
      function getEffectiveDurasiJam(c) {
        const n = Number(c.adminCot && c.adminCot.estimasiJam);
        if (n && n > 0) return Math.min(n, 12);
        return parseDurasiJam(c.estimasiLamaOperasi);
      }
      // Slot ruang OK = durasi operasi + Turn Over Time (TOT) — ruang dianggap terpakai/​locked selama ini.
      function getSlotMinutes(c) {
        return getEffectiveDurasiJam(c) * 60 + getTOT();
      }
      // Rentang waktu OPERASI saja (tanpa TOT) — dipakai untuk status Berlangsung/Selesai.
      function operationRange(c) {
        const j = c.adminCot.jadwal;
        const start = new Date(`${j.tanggal}T${(j.jam || "00:00")}:00`).getTime();
        return [start, start + getEffectiveDurasiJam(c) * 3600000];
      }
      // Rentang SLOT RUANG (operasi + TOT) — dipakai untuk kunci ruang, deteksi bentrok, dan panjang blok di Gantt.
      function slotRange(c) {
        const j = c.adminCot.jadwal;
        const start = new Date(`${j.tanggal}T${(j.jam || "00:00")}:00`).getTime();
        return [start, start + getSlotMinutes(c) * 60000];
      }
      function fmtHHMM(ms) {
        const d = new Date(ms);
        return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
      }
      // Ekstrak angka jam dari teks bebas seperti "2 jam" / "±3 jam" -> dipakai untuk memperkirakan panjang blok di timeline.
      function parseDurasiJam(text) {
        const m = String(text || "").match(/(\d+(\.\d+)?)/);
        const n = m ? parseFloat(m[1]) : 1;
        return Math.max(1, Math.min(6, Math.round(n) || 1));
      }
      // Status operasi yang ditampilkan di timeline — kombinasi dari flag manual (tindakanSelesai) dan waktu sekarang vs jadwal
      // OPERASI (tanpa TOT), karena aplikasi ini belum punya sensor/​input waktu mulai-selesai riil.
      function deriveOpStatus(c) {
        if (c.status === "Cancelled") return "Batal";
        if (c.adminCot.tindakanSelesai) return "Selesai";
        const eff = adminCotEffectiveStatus(c);
        if (eff === "Reschedule") return "Reschedule";
        if (c.adminCot.decision === "DalamKonfirmasi") return "Ditunda";
        try {
          const [start, end] = operationRange(c);
          const now = Date.now();
          if (now >= start && now <= end) return "Berlangsung";
          if (now > end) return "Selesai";
        } catch (e) { /* abaikan, fallback ke Belum Mulai */ }
        return "Belum Mulai";
      }
      // Sesuai spesifikasi warna: Belum Mulai=Abu, Berlangsung=Hijau, Selesai=Biru, Ditunda=Kuning, Batal=Merah
      // (Reschedule dipetakan mirip Ditunda/oranye karena bukan bagian dari 5 warna baku yang diminta).
      const OP_STATUS_COLOR = {
        "Belum Mulai": "st-Menunggu",
        "Berlangsung": "st-op-hijau",
        "Selesai": "st-op-biru",
        "Ditunda": "st-op-kuning",
        "Reschedule": "st-Reschedule",
        "Batal": "st-op-merah",
      };
      // Deteksi konflik sumber daya pada tanggal yang sama: ruang OK yang sama dengan SLOT (operasi+TOT) tumpang tindih,
      // operator yang sama dijadwalkan di 2 tempat bersamaan, atau alat khusus yang sama dibutuhkan bersamaan.
      function computeConflicts(list) {
        const conflicts = {};
        const addC = (id, msg) => { if (!conflicts[id]) conflicts[id] = []; if (!conflicts[id].includes(msg)) conflicts[id].push(msg); };
        const overlap = (a, b) => a[0] < b[1] && b[0] < a[1];
        for (let i = 0; i < list.length; i++) {
          for (let k = i + 1; k < list.length; k++) {
            const a = list[i], b = list[k];
            let ra, rb;
            try { ra = slotRange(a); rb = slotRange(b); } catch (e) { continue; }
            if (!overlap(ra, rb)) continue;
            if (a.adminCot.jadwal.ruang && a.adminCot.jadwal.ruang === b.adminCot.jadwal.ruang) {
              addC(a.id, `⚠️ Bentrok ruang ${a.adminCot.jadwal.ruang} dengan ${b.nama} (${b.adminCot.jadwal.jam})`);
              addC(b.id, `⚠️ Bentrok ruang ${b.adminCot.jadwal.ruang} dengan ${a.nama} (${a.adminCot.jadwal.jam})`);
            }
            const opsA = (a.operatorList || []).map((x) => (x || "").trim().toLowerCase()).filter(Boolean);
            const opsB = (b.operatorList || []).map((x) => (x || "").trim().toLowerCase()).filter(Boolean);
            const sharedOp = opsA.find((o) => opsB.includes(o));
            if (sharedOp) {
              addC(a.id, `⚠️ Operator "${sharedOp}" bentrok jadwal dengan ${b.nama} (${b.adminCot.jadwal.ruang || "-"}, ${b.adminCot.jadwal.jam})`);
              addC(b.id, `⚠️ Operator "${sharedOp}" bentrok jadwal dengan ${a.nama} (${a.adminCot.jadwal.ruang || "-"}, ${a.adminCot.jadwal.jam})`);
            }
            const anesA = (a.dokterAnestesi || "").trim().toLowerCase();
            const anesB = (b.dokterAnestesi || "").trim().toLowerCase();
            if (anesA && anesA === anesB) {
              addC(a.id, `⚠️ Dokter Anestesi "${a.dokterAnestesi}" bentrok jadwal dengan ${b.nama} (${b.adminCot.jadwal.ruang || "-"}, ${b.adminCot.jadwal.jam})`);
              addC(b.id, `⚠️ Dokter Anestesi "${b.dokterAnestesi}" bentrok jadwal dengan ${a.nama} (${a.adminCot.jadwal.ruang || "-"}, ${a.adminCot.jadwal.jam})`);
            }
            const alatA = (a.adminCot.alat || []).map((x) => (typeof x === "string" ? x : x.nama || "").trim().toLowerCase()).filter(Boolean);
            const alatB = (b.adminCot.alat || []).map((x) => (typeof x === "string" ? x : x.nama || "").trim().toLowerCase()).filter(Boolean);
            const sharedAlat = alatA.find((x) => alatB.includes(x));
            if (sharedAlat) {
              addC(a.id, `⚠️ Alat "${sharedAlat}" dibutuhkan bersamaan dengan ${b.nama} (${b.adminCot.jadwal.ruang || "-"}, ${b.adminCot.jadwal.jam})`);
              addC(b.id, `⚠️ Alat "${sharedAlat}" dibutuhkan bersamaan dengan ${a.nama} (${a.adminCot.jadwal.ruang || "-"}, ${a.adminCot.jadwal.jam})`);
            }
          }
        }
        return conflicts;
      }
      // Cari slot 30-menit berikutnya yang kosong untuk ruang tertentu pada tanggal tertentu, dimulai dari jam yang diminta.
      // Dipakai untuk validasi bentrok + auto-suggest saat Admin COT menetapkan jadwal.
      function findNextAvailableSlot(tanggal, ruang, jamMulai, slotMinutes, excludeCaseId, allCases) {
        const others = allCases.filter((c) => c.id !== excludeCaseId && c.adminCot.finalDone && c.adminCot.jadwal.tanggal === tanggal && c.adminCot.jadwal.ruang === ruang);
        const otherRanges = others.map(slotRange);
        let cursor = new Date(`${tanggal}T${jamMulai}:00`).getTime();
        const dayEnd = new Date(`${tanggal}T23:30:00`).getTime();
        while (cursor < dayEnd) {
          const candidateEnd = cursor + slotMinutes * 60000;
          const clash = otherRanges.some(([s, e]) => cursor < e && s < candidateEnd);
          if (!clash) return fmtHHMM(cursor);
          cursor += 30 * 60000;
        }
        return null;
      }
      function renderMonitoringPage() {
        if (!state.monitorFilter.tanggal) state.monitorFilter.tanggal = todayISO();
        const f = state.monitorFilter;
        const allScheduled = cases.filter((c) => c.adminCot && c.adminCot.finalDone && c.adminCot.jadwal && c.adminCot.jadwal.tanggal);

        function buildBody() {
          const forDate = allScheduled.filter((c) => c.adminCot.jadwal.tanggal === f.tanggal);
          const conflicts = computeConflicts(forDate);

          let filtered = forDate.filter((c) => {
            if (f.ruang && c.adminCot.jadwal.ruang !== f.ruang) return false;
            if (f.penjamin && c.penjamin !== f.penjamin) return false;
            if (f.opStatus && deriveOpStatus(c) !== f.opStatus) return false;
            if (f.search) {
              const q = f.search.toLowerCase();
              const hay = [c.nama, c.rm, c.diagnosis, ...(c.operatorList || []), ...(c.tindakanList || [])].join(" ").toLowerCase();
              if (!hay.includes(q)) return false;
            }
            return true;
          });

          // Ringkasan harian
          const total = forDate.length;
          const elektif = forDate.filter((c) => (c.jenisOperasi || []).includes("Elektif")).length;
          const cito = forDate.filter((c) => (c.jenisOperasi || []).includes("CITO")).length;
          const selesai = forDate.filter((c) => deriveOpStatus(c) === "Selesai").length;
          const belumOK = cases.filter((c) => c.status !== "Cancelled" && c.status !== "Returned" && c.adminCot.required && !c.adminCot.finalDone).length;
          const konflikCount = Object.keys(conflicts).length;

          const rooms = f.ruang ? [f.ruang] : OK_ROOM_LIST;
          const slotMin = 30, startHour = 6, endHour = 22;
          const totalSlots = ((endHour - startHour) * 60) / slotMin;
          const gridStartMs = new Date(`${f.tanggal}T00:00:00`).getTime() + startHour * 3600000;
          const slotIndexForMs = (ms) => Math.round((ms - gridStartMs) / (slotMin * 60000));

          const roomBlocks = {}; rooms.forEach((r) => (roomBlocks[r] = []));
          filtered.forEach((c) => {
            const ruang = c.adminCot.jadwal.ruang || "";
            if (!roomBlocks[ruang]) return; // ruang tidak termasuk kolom yang sedang ditampilkan (mis. hasil filter 1 ruang)
            let sMs, eMs;
            try { [sMs, eMs] = slotRange(c); } catch (e) { return; } // slot = durasi operasi + TOT
            let startIdx = slotIndexForMs(sMs);
            let span = Math.max(1, Math.ceil((eMs - sMs) / (slotMin * 60000)));
            if (startIdx < 0) { span += startIdx; startIdx = 0; }
            span = Math.min(span, totalSlots - startIdx);
            if (span <= 0 || startIdx >= totalSlots) return;
            roomBlocks[ruang].push({ startIdx, span, c });
          });
          // Konfigurasi Alokasi Slot Operasi untuk tanggal ini — ditampilkan di grid yang sama sebagai penanda
          // alat & status yang dikonfigurasi Admin COT. Hanya ditampilkan pada slot yang belum ada case
          // terjadwal (case asli selalu diutamakan tampil), supaya tidak menutupi operasi yang sudah berjalan.
          const cfgForDate = loadSlotConfig().filter((cfg) => cfg.tanggalMulai <= f.tanggal && f.tanggal <= (cfg.tanggalSelesai || cfg.tanggalMulai));
          cfgForDate.forEach((cfg) => {
            const room = cfg.ruang;
            if (!roomBlocks[room]) return;
            const sMs = new Date(`${f.tanggal}T${cfg.jamMulai}:00`).getTime();
            const eMs = new Date(`${f.tanggal}T${cfg.jamSelesai}:00`).getTime();
            let startIdx = slotIndexForMs(sMs);
            let span = Math.max(1, Math.ceil((eMs - sMs) / (slotMin * 60000)));
            if (startIdx < 0) { span += startIdx; startIdx = 0; }
            span = Math.min(span, totalSlots - startIdx);
            if (span <= 0 || startIdx >= totalSlots) return;
            const overlapsCase = roomBlocks[room].some((b) => b.c && startIdx < b.startIdx + b.span && b.startIdx < startIdx + span);
            if (overlapsCase) return; // sudah ada case terjadwal di slot ini — tidak perlu tampilkan penanda konfigurasi
            roomBlocks[room].push({ startIdx, span, cfg });
          });
          // Utilisasi per ruang = (total menit slot terpakai) / (menit operasional grid) x 100%
          const utilisasi = {};
          rooms.forEach((r) => {
            const usedMin = roomBlocks[r].reduce((s, b) => s + (b.c ? b.span * slotMin : 0), 0);
            utilisasi[r] = Math.min(100, Math.round((usedMin / (totalSlots * slotMin)) * 100));
          });
          const coverage = {};
          rooms.forEach((r) => { coverage[r] = new Array(totalSlots).fill(null); });
          Object.keys(roomBlocks).forEach((r) => {
            roomBlocks[r].forEach((b) => {
              for (let i = b.startIdx; i < b.startIdx + b.span && i < totalSlots; i++) coverage[r][i] = i === b.startIdx ? b : "covered";
            });
          });

          function cfgBlock(cfg) {
            const statusClass = cfg.status === "Tidak Digunakan" ? "st-Cancelled" : cfg.status === "Standby / Buffer" ? "st-Menunggu" : "st-Disetujui";
            return `<div class="op-block op-lock" title="Konfigurasi Alokasi Slot Operasi — master acuan sistem, bukan jadwal pasien">
              <div class="op-block-time">🗂️ ${esc(cfg.jamMulai)}–${esc(cfg.jamSelesai)}</div>
              <div class="op-block-name">Konfigurasi Slot</div>
              <div style="margin-top:2px;"><span class="badge-status ${statusClass}" style="font-size:9px;">${esc(cfg.status)}</span></div>
              ${cfg.alat && cfg.alat.length ? `<div class="op-block-sub">Alat: ${esc(cfg.alat.join(", "))}</div>` : `<div class="op-block-sub">Tidak ada alat dialokasikan</div>`}
              ${cfg.keterangan ? `<div class="op-block-sub">${esc(cfg.keterangan)}</div>` : ""}
              ${state.role === "AdminCOT" ? `<button type="button" class="btn btn-sm btn-danger slotConfigDelBtn" data-id="${esc(cfg.id)}" style="margin-top:4px;">Hapus Konfigurasi</button>` : ""}
            </div>`;
          }

          function opBlock(c) {
            const st = deriveOpStatus(c);
            const hasConflict = !!conflicts[c.id];
            const [sMs, eMs] = slotRange(c);
            const canDrag = state.role === "AdminCOT" && st !== "Selesai" && st !== "Batal";
            const alatChips = (c.adminCot.alat || []).slice(0, 3).map((a) => `<span class="chip" style="font-size:9px;">${esc(typeof a === "string" ? a : a.nama)}</span>`).join("");
            return `<div class="op-block ${hasConflict ? "op-conflict" : ""} ${canDrag ? "op-draggable" : ""}" data-id="${c.id}" ${canDrag ? 'draggable="true"' : ""} title="Klik untuk detail${canDrag ? " — geser (drag) blok ini untuk memindah jadwal" : ""}">
              <div class="op-block-time">${fmtHHMM(sMs)}–${fmtHHMM(eMs)} <span class="footer-hint" style="font-weight:400;">(termasuk buffer ${getTOT()}m)</span></div>
              <div class="op-block-name">${esc(c.nama)}</div>
              <div class="op-block-sub">${esc((c.operatorList || [])[0] || "-")}</div>
              <div class="op-block-sub">${esc((c.tindakanList || [])[0] || "-")}</div>
              <div class="op-block-sub">${esc(c.anestesi || "-")}${c.dokterAnestesi ? " — " + esc(c.dokterAnestesi) : ""}</div>
              <div style="margin-top:3px;"><span class="badge-status ${OP_STATUS_COLOR[st] || "st-Menunggu"}" style="font-size:9.5px;">${esc(st)}</span></div>
              ${alatChips ? `<div style="margin-top:3px;">${alatChips}</div>` : ""}
              ${hasConflict ? conflicts[c.id].map((m) => `<div class="note-inline" style="color:var(--red-500);">${esc(m)}</div>`).join("") : ""}
            </div>`;
          }

          const ganttHeader = `<tr><th style="width:56px;">Jam</th>${rooms.map((r) => `<th>${esc(r)}<div class="footer-hint" style="font-weight:400;">Utilisasi ${utilisasi[r]}%</div></th>`).join("")}</tr>`;
          const ganttRows = [];
          for (let i = 0; i < totalSlots; i++) {
            const ms = gridStartMs + i * slotMin * 60000;
            const label = fmtHHMM(ms);
            const cells = rooms.map((r) => {
              const cell = coverage[r][i];
              if (cell === "covered") return "";
              if (cell === null) return `<td class="gantt-cell" data-room="${esc(r)}" data-jam="${esc(label)}" style="height:24px;"></td>`;
              if (cell.cfg) return `<td class="gantt-cell" data-room="${esc(r)}" data-jam="${esc(label)}" rowspan="${cell.span}">${cfgBlock(cell.cfg)}</td>`;
              return `<td class="gantt-cell" data-room="${esc(r)}" data-jam="${esc(label)}" rowspan="${cell.span}">${opBlock(cell.c)}</td>`;
            }).join("");
            ganttRows.push(`<tr><td class="gantt-hour">${label}</td>${cells}</tr>`);
          }
          const ganttRowsHtml = ganttRows.join("");

          // Monitoring ICU/PACU
          const icuList = forDate.filter((c) => c.ruangPascaOperasi === "ICU");
          const icuHtml = icuList.length

        // Resource Monitor — dipindah jadi tampilan tersendiri (bukan lagi bagian dari Timeline).

        // filter Tanggal sengaja TIDAK dipakai di sini karena tujuannya menampilkan daftar lintas tanggal.
        function buildTableView() {
          const isAdminCot = state.role === "AdminCOT";
          let list = allScheduled.filter((c) => {
            if (f.ruang && c.adminCot.jadwal.ruang !== f.ruang) return false;
            if (f.penjamin && c.penjamin !== f.penjamin) return false;
            if (f.opStatus && deriveOpStatus(c) !== f.opStatus) return false;
            if (f.search) {
              const q = f.search.toLowerCase();
              const hay = [c.nama, c.rm, c.diagnosis, ...(c.operatorList || []), ...(c.tindakanList || [])].join(" ").toLowerCase();
              if (!hay.includes(q)) return false;
            }
            return true;
          });
          list.sort((a, b) => {
            const doneA = a.adminCot.tindakanSelesai ? 1 : 0;
            const doneB = b.adminCot.tindakanSelesai ? 1 : 0;
            if (doneA !== doneB) return doneA - doneB;
            const ta = `${a.adminCot.jadwal.tanggal} ${a.adminCot.jadwal.jam || ""}`;
            const tb = `${b.adminCot.jadwal.tanggal} ${b.adminCot.jadwal.jam || ""}`;

                ${!selesai && !batal ? `<button type="button" class="btn btn-sm btn-danger jadwalBatalBtn" data-id="${c.id}">🛑 Batal Tindakan</button>` : ""}

    <table style="margin-top:10px;">
      <thead><tr><th>Tanggal</th><th>Jam</th><th>Ruang</th><th>Pasien</th><th>Tindakan</th><th>Operator</th><th>Golongan/Kelas</th><th>Status Administrasi</th><th>Status Tindakan</th>${isAdminCot ? "<th>Aksi</th>" : ""}</tr></thead>
      <tbody>${rows || `<tr><td colspan="${colCount}" class="footer-hint">Belum ada case yang terjadwal.</td></tr>`}</tbody>
    </table>
  </div>`;
        }
        function buildActiveView() {

          if (f.view === "konfigurasi") return buildKonfigurasiView();

        }

        document.getElementById("content").innerHTML = `
  <div class="card">

        function wireActions() {
          document.querySelectorAll(".op-block").forEach((el) => (el.onclick = () => {
            const cc = cases.find((x) => x.id === el.dataset.id);
            if (cc) openOpDetailModal(cc);
          }));
          // Drag & drop reschedule di Timeline (khusus Admin COT): geser blok operasi ke sel jam/ruang lain.
          document.querySelectorAll(".op-block.op-draggable").forEach((el) => {
            el.ondragstart = (ev) => {
              ev.dataTransfer.effectAllowed = "move";
              ev.dataTransfer.setData("text/plain", el.dataset.id);
              el.classList.add("op-dragging");
            };
            el.ondragend = () => el.classList.remove("op-dragging");
          });
          document.querySelectorAll(".gantt-cell[data-room]").forEach((td) => {
            td.ondragover = (ev) => { ev.preventDefault(); ev.dataTransfer.dropEffect = "move"; td.classList.add("drag-over"); };
            td.ondragleave = () => td.classList.remove("drag-over");
            td.ondrop = (ev) => {
              ev.preventDefault();
              td.classList.remove("drag-over");
              const caseId = ev.dataTransfer.getData("text/plain");
              if (caseId) performDragReschedule(caseId, td.dataset.room, td.dataset.jam);
            };
          });
          // Eksekusi pemindahan jadwal hasil drag & drop. Tetap tunduk pada business rule Konfigurasi
          // Alokasi Slot Operasi (alat/jam/status) yang sama seperti penjadwalan manual — bedanya, kalau
          // penyebab satu-satunya adalah bentrok dengan case lain (bukan pelanggaran konfigurasi), Admin
          // COT ditawari opsi geser otomatis seluruh case yang bertabrakan ke slot kosong berikutnya.
          function performDragReschedule(caseId, ruang, jamStr) {
            const cc = cases.find((x) => x.id === caseId);
            if (!cc || !cc.adminCot.finalDone) return;
            if (ruang === cc.adminCot.jadwal.ruang && jamStr === cc.adminCot.jadwal.jam) return; // dijatuhkan di sel semula, tidak ada perubahan
            const tanggal = cc.adminCot.jadwal.tanggal;
            const estimasiJam = Number(cc.adminCot.jadwal.estimasiJam || cc.adminCot.estimasiJam) || 1;
            const durasiSlotMenit = estimasiJam * 60 + getTOT();
            const alatNames = (cc.adminCot.alat || []).map((a) => (typeof a === "string" ? a : a.nama)).filter(Boolean);
            const v = validasiAlokasiSlot(ruang, tanggal, alatNames, jamStr, durasiSlotMenit, cc.id);
            const clashOnly = !v.ok && /sudah terpakai case lain/.test(v.alasan || "");
            if (!v.ok && !clashOnly) {
              toast(`⛔ Tidak bisa memindah ke ${ruang} ${jamStr}: ${v.alasan}`, "warn");
              return;
            }
            const mintaAlasan = (pesan, def) => {
              const note = prompt(pesan, def);
              if (note === null) return null;
              if (!note.trim()) { toast("Alasan wajib diisi — pemindahan dibatalkan", "warn"); return null; }
              return note.trim();
            };
            if (v.ok) {
              if (!confirm(`Pindahkan jadwal ${cc.nama} ke ${ruang} pukul ${jamStr}?`)) return;
              const note = mintaAlasan(`Alasan pemindahan jadwal (drag & drop) untuk ${cc.nama}:`, "Digeser via drag-and-drop Timeline");
              if (note === null) return;
              adminCotAction(cc, "reschedule", { tanggal, jam: jamStr, ruang, estimasiJam, note });
              toast("Jadwal dipindahkan", "ok");
              renderMonitoringPage();
              return;
            }
            // Konfigurasi (alat/jam/status) sudah sesuai — satu-satunya masalah adalah bentrok case lain di slot tujuan.
            const startMs = new Date(`${tanggal}T${jamStr}:00`).getTime();
            const endMs = startMs + durasiSlotMenit * 60000;
            const bentrok = cases.filter((x) => {
              if (x.id === cc.id || !x.adminCot.finalDone || x.adminCot.jadwal.tanggal !== tanggal || x.adminCot.jadwal.ruang !== ruang) return false;
              try { const [s, e] = slotRange(x); return startMs < e && s < endMs; } catch (er) { return false; }
            });
            const namaBentrok = bentrok.map((x) => x.nama).join(", ") || "case lain";
            if (!confirm(`Slot ${ruang} ${jamStr} bentrok dengan: ${namaBentrok}.\n\nGeser otomatis SELURUH jadwal yang bertabrakan ke slot kosong berikutnya di ruang yang sama (sesuai Konfigurasi Alokasi Slot Operasi)?\n\nKlik Batal untuk membatalkan pemindahan ini.`)) return;
            const note = mintaAlasan(`Alasan pemindahan jadwal (drag & drop, memicu geser otomatis case lain) untuk ${cc.nama}:`, "Digeser via drag-and-drop Timeline");
            if (note === null) return;
            adminCotAction(cc, "reschedule", { tanggal, jam: jamStr, ruang, estimasiJam, note });
            // Cascade: geser tiap case yang bertabrakan ke slot kosong berikutnya di ruang yang sama.
            const gagalGeser = [];
            let iter = 0;
            const antrean = bentrok.slice();
            while (antrean.length && iter < 30) {
              iter++;
              const cur = antrean.shift();
              const curEstimasi = Number(cur.adminCot.jadwal.estimasiJam || cur.adminCot.estimasiJam) || 1;
              const curDurasi = curEstimasi * 60 + getTOT();
              const curAlat = (cur.adminCot.alat || []).map((a) => (typeof a === "string" ? a : a.nama)).filter(Boolean);
              const r = cariSlotDiRuang(ruang, tanggal, curAlat, jamStr, curDurasi, cur.id);
              if (r.ok) {
                adminCotAction(cur, "reschedule", { tanggal, jam: r.jam, ruang, estimasiJam: curEstimasi, note: `Digeser otomatis karena penjadwalan ulang ${cc.nama} (drag & drop Timeline)` });
              } else {
                gagalGeser.push(cur.nama);
              }
            }
            if (gagalGeser.length) toast(`Jadwal ${cc.nama} dipindahkan. ${gagalGeser.length} case tidak bisa digeser otomatis (${gagalGeser.join(", ")}) — perlu dijadwalkan ulang manual.`, "warn");
            else toast(`Jadwal ${cc.nama} dipindahkan — case yang bentrok berhasil digeser otomatis ke slot berikutnya.`, "ok");
            renderMonitoringPage();

        // --- Panel Golongan/Kelas/Jasa/BMHP/Alat/Total — mengikuti pola renderCmEstimasiPanel, dipakai ulang di sini ---
        function drawPanel() {
          const panel = document.getElementById("emEstimasiPanel");

          recalcJasa();
          const cmMulti = isMultiGolonganCase(ec);

          const jasaTotal = jasaRincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
          const bmhpTotal = bmhpItems.reduce((s, it) => s + (Number(it.h) || 0) * (typeof it.q === "number" ? it.q : (Number(it.q) || 1)), 0);
          const alatTotal = alatItems.reduce((s, a) => s + (Number(a.harga) || 0), 0);

                <select class="emOpGolongan" data-i="${i}">${golonganOptionsExpanded().map((g) => `<option value="${g}" ${e.golongan === g ? "selected" : ""}>${g}</option>`).join("")}</select>
              </div>`).join("")}
            </div>`
          : `<div class="field"><label>Golongan</label><select id="emGolongan">${golonganOptionsExpanded().map((g) => `<option value="${g}" ${golongan === g ? "selected" : ""}>${g}</option>`).join("")}</select></div>`}
        ${isAsuransi ? `<div class="field"><label>Kelas Perawatan</label><select id="emKelas">${CM_KELAS_OPSI_LIST.map((k) => `<option value="${k}" ${kelas === k ? "selected" : ""}>${k}</option>`).join("")}</select></div>` : ""}
      </div>

      ${isAsuransi ? `
      <table class="af-table" style="margin-top:10px;">${jasaRincian.map((r, i) => `<tr><td><input class="emJasaKomp" data-i="${i}" value="${esc(r.komponen)}" style="width:100%;"></td><td style="text-align:right;"><input class="emJasaNilai" data-i="${i}" value="${r.nilai}" style="width:130px; text-align:right;"></td><td><button type="button" class="btn btn-sm btn-danger emJasaDel" data-i="${i}">×</button></td></tr>`).join("")}
        <tr style="font-weight:800;"><td colspan="2">Total Jasa Medis</td><td id="emJasaTotalCell">${rupiah(jasaTotal)}</td></tr></table>
      <button type="button" class="btn btn-sm" id="emJasaAdd">+ Tambah Komponen</button>
      ` : `
      <div style="overflow-x:auto;margin-top:10px;">
        <table class="af-table"><tr style="font-weight:700;"><td>Komponen</td><td style="text-align:center;">Kelas 3</td><td style="text-align:center;">Kelas 2</td><td style="text-align:center;">Kelas 1</td><td style="text-align:center;">VIP</td><td style="text-align:center;">VVIP</td></tr>
        ${multiKelasRows.map((r) => `<tr><td>${esc(r.komponen)}</td>${r.vals.map((v) => `<td style="text-align:right;">${v ? rupiah(v) : "-"}</td>`).join("")}</tr>`).join("") || `<tr><td colspan="6" class="footer-hint">Golongan "${esc(golongan)}" tidak ditemukan di database tarif Umum.</td></tr>`}
        </table>
      </div>`}

      <div class="section-lbl" style="margin-top:14px;">BMHP / Item Tambahan</div>
      <table class="af-table">${bmhpItems.map((it, i) => `<tr><td><input class="emBmhpNama" data-i="${i}" value="${esc(it.n)}" style="width:100%;" placeholder="Nama item"></td><td><input class="emBmhpQty" data-i="${i}" value="${it.q == null ? 1 : it.q}" style="width:70px;"></td><td style="text-align:right;"><input class="emBmhpHarga" data-i="${i}" value="${it.h}" style="width:120px; text-align:right;"></td><td><button type="button" class="btn btn-sm btn-danger emBmhpDel" data-i="${i}">×</button></td></tr>`).join("")}

      <div class="section-lbl" style="margin-top:14px;">Alat</div>
      <table class="af-table">${alatItems.map((a, i) => `<tr><td><input class="emAlatNama" data-i="${i}" value="${esc(a.nama)}" style="width:100%;" placeholder="Nama alat"></td><td style="text-align:right;"><input class="emAlatHarga" data-i="${i}" value="${a.harga}" style="width:130px; text-align:right;"></td><td><button type="button" class="btn btn-sm btn-danger emAlatDel" data-i="${i}">×</button></td></tr>`).join("")}

      <div style="margin-top:10px; font-weight:800;" id="emGrandTotalRow">${isAsuransi ? `TOTAL ESTIMASI: <span id="emGrandTotalCell">${rupiah(jasaTotal + bmhpTotal + alatTotal)}</span>` : `Total BMHP + Alat (di luar jasa medis per kelas di atas): <span id="emGrandTotalCell">${rupiah(bmhpTotal + alatTotal)}</span>`}</div>
      <div class="btn-row" style="margin-top:14px;"><button type="button" class="btn btn-primary" id="emDownloadBtn">⬇️ Unduh Estimasi</button></div>`;

          const updateTotalsOnly = () => {
            const jt = jasaRincian.reduce((s, r) => s + (Number(r.nilai) || 0), 0);
            const bt = bmhpItems.reduce((s, it) => s + (Number(it.h) || 0) * (typeof it.q === "number" ? it.q : (Number(it.q) || 1)), 0);
            const at = alatItems.reduce((s, a) => s + (Number(a.harga) || 0), 0);
            const jc = document.getElementById("emJasaTotalCell"); if (jc) jc.textContent = rupiah(jt);
            const bc = document.getElementById("emBmhpTotalCell"); if (bc) bc.textContent = rupiah(bt);
            const ac = document.getElementById("emAlatTotalCell"); if (ac) ac.textContent = rupiah(at);

          if (document.getElementById("emGolongan"))
            document.getElementById("emGolongan").onchange = (e) => { golonganTouched = true; golongan = e.target.value; drawPanel(); };
          document.querySelectorAll(".emOpGolongan").forEach((sel) => {
            sel.onchange = () => {
              if (!ec.operatorGolonganFinal) ec.operatorGolonganFinal = pairOperatorGolongan(ec).map((e) => e.golongan);
              ec.operatorGolonganFinal[Number(sel.dataset.i)] = sel.value;
              drawPanel();
            };
